name: MooMooAU Patch Lifecycle zero-production-secret policy preflight

on:
  push:
    paths:
      - ".github/workflows/moomooau-patch-lifecycle.yml"
      - ".github/workflows/moomooau-stage7-ci.yml"
      - "LinzeDatabase/MooMooAU/**"
  pull_request:
    paths:
      - ".github/workflows/moomooau-patch-lifecycle.yml"
      - ".github/workflows/moomooau-stage7-ci.yml"
      - "LinzeDatabase/MooMooAU/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: moomooau-patch-policy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  patch-policy-preflight:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Reject fork pull requests before protected dependency checkout
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: |
          echo "::error::Fork pull requests cannot access the protected read-only Governance dependency."
          exit 1

      - name: Configure ephemeral test state
        shell: bash
        run: |
          set -euo pipefail
          printf 'HYPOTHESIS_STORAGE_DIRECTORY=%s\n' \
            "$RUNNER_TEMP/hypothesis" >> "$GITHUB_ENV"
          printf 'RUFF_CACHE_DIR=%s\n' \
            "$RUNNER_TEMP/ruff-cache" >> "$GITHUB_ENV"

      - name: Check out public policy without retained credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Check out pinned shared Governance read-only
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: LinzeColin/Governance
          ref: ebc6c2e4884edc959118cfc56d0e18a86c49460f # pragma: allowlist secret -- immutable commit, not a credential
          path: .governance
          persist-credentials: false
          ssh-key: ${{ secrets.MOOMOOAU_GOVERNANCE_DEPLOY_KEY }}

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install hash-verified official age
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/age.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz
          echo "bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377  $archive" \
            | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/age" >> "$GITHUB_PATH"

      - name: Install cumulative immutable hash lock
        working-directory: LinzeDatabase/MooMooAU
        run: python -m pip install --require-hashes -r requirements/stage6.lock

      - name: Verify patch policy and cumulative tests
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m ruff format --check src tests/tasks/test_t0708.py machine/stages/S7/tools
          python -m ruff check --no-cache src tests/tasks/test_t0708.py machine/stages/S7/tools
          python -m mypy --no-incremental --cache-dir "$RUNNER_TEMP/mypy-cache" src machine/stages/S7/tools
          python -m pytest -q tests/tasks

      - name: Verify package publication Governance and truthful Stage 7 state
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python machine/tools/validate_package.py
          python machine/tools/validate_publication.py
          python machine/tools/validate_governance.py \
            --governance-root "$GITHUB_WORKSPACE/.governance"
          python machine/stages/S7/tools/validate_stage7.py \
            --governance-root "$GITHUB_WORKSPACE/.governance" --preflight

      - name: Verify dependency vulnerability and reproducible SBOM gates
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m pip_audit -r requirements/stage6.lock \
            --require-hashes --no-deps --disable-pip --progress-spinner=off
          cyclonedx-py requirements requirements/stage6.lock --pyproject pyproject.toml \
            --output-reproducible --validate --output-format JSON \
            --output-file "$RUNNER_TEMP/stage7-patch-sbom.raw.cdx.json"
          python machine/stages/S2/tools/sanitize_sbom.py \
            --input "$RUNNER_TEMP/stage7-patch-sbom.raw.cdx.json" \
            --lock requirements/stage6.lock \
            --output "$RUNNER_TEMP/stage7-patch-sbom.cdx.json"
          cmp "$RUNNER_TEMP/stage7-patch-sbom.cdx.json" \
            machine/stages/S6/supply-chain/sbom.cdx.json

      - name: Scan policy closure without retaining a report
        run: |
          detect-secrets scan --all-files \
            --exclude-lines 'baseline_commit|baseline_manifest_sha256|BASELINE_COMMIT|BASELINE_MANIFEST_SHA256|GOVERNANCE_PIN|failed_attempt_receipt_sha256|prior_failed_attempt_ledger_sha256|beta_receipt_sha256|m3_gate_sha256|merge_commit_sha|workflow_head_sha|FAILED_BETA_RECEIPT_SHA256|"const": "[0-9a-f]{40}"' \
            LinzeDatabase/MooMooAU/src/moomooau_archive/patch_lifecycle.py \
            LinzeDatabase/MooMooAU/src/moomooau_archive/stage7_ops.py \
            LinzeDatabase/MooMooAU/tests/tasks/test_t0708.py \
            LinzeDatabase/MooMooAU/machine/stages/S7 \
            .github/workflows/moomooau-patch-lifecycle.yml \
            .github/workflows/moomooau-stage7-ci.yml \
            > "$RUNNER_TEMP/detect-secrets-patch-policy.json"
          python -c 'import json,sys; value=json.load(open(sys.argv[1], encoding="utf-8")); raise SystemExit(any(value.get("results", {}).values()))' "$RUNNER_TEMP/detect-secrets-patch-policy.json"

      - name: Hold all protected patch effects outside this policy workflow
        run: >-
          test "${MOOMOOAU_PATCH_APPLIED:-false}" = "false" &&
          test "${MOOMOOAU_ROLLBACK_EXECUTED:-false}" = "false"
