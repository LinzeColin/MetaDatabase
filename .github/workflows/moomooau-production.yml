name: MooMooAU protected production archive

on:
  schedule:
    - cron: "30 4 * * *"
      timezone: "Australia/Sydney"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: moomooau-production-single-writer
  cancel-in-progress: false

jobs:
  production-archive:
    if: vars.MOOMOOAU_PRODUCTION_ENABLED == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: moomooau-production
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out the production composition without retained credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install hash-verified official age
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/age.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz
          echo "bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377  $archive" \
            | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/age" >> "$GITHUB_PATH"

      - name: Install the cumulative hash lock and local composition
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m pip install --require-hashes -r requirements/stage6.lock
          python -m pip install --no-build-isolation --no-deps .

      - name: Run the unique fail-closed production composition
        working-directory: LinzeDatabase/MooMooAU
        env:
          EVENT_NAME: ${{ github.event_name }}
          MOOMOOAU_PRODUCTION_CONFIG: ${{ secrets.MOOMOOAU_PRODUCTION_CONFIG }}
          MOOMOOAU_SENDER_REGISTRY: ${{ secrets.MOOMOOAU_SENDER_REGISTRY }}
          MOOMOOAU_CLASSIFICATION_REGISTRY: ${{ secrets.MOOMOOAU_CLASSIFICATION_REGISTRY }}
          MOOMOOAU_PARSER_REGISTRY: ${{ secrets.MOOMOOAU_PARSER_REGISTRY }}
          MOOMOOAU_GITHUB_APP_PRIVATE_KEY: ${{ secrets.MOOMOOAU_GITHUB_APP_PRIVATE_KEY }}
          MOOMOOAU_AGE_IDENTITY: ${{ secrets.MOOMOOAU_AGE_IDENTITY }}
          MOOMOOAU_OPAQUE_ID_KEY: ${{ secrets.MOOMOOAU_OPAQUE_ID_KEY }}
          MOOMOOAU_GMAIL_OAUTH: ${{ secrets.MOOMOOAU_GMAIL_OAUTH }}
        run: >-
          python -m moomooau_archive.production
          --execute-protected
          --event-name "$EVENT_NAME"
