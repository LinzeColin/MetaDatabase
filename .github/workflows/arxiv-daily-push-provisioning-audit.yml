name: arXiv Daily Push provisioning audit

on:
  workflow_dispatch:
    inputs:
      generated_at:
        description: "Optional ISO timestamp for deterministic evidence. Empty uses current UTC."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: arxiv-daily-push-provisioning-audit-${{ github.ref }}
  cancel-in-progress: false

jobs:
  provisioning-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      INPUT_GENERATED_AT: ${{ inputs.generated_at }}
      ADP_SMTP_HOST: ${{ secrets.ADP_SMTP_HOST }}
      ADP_SMTP_PORT: ${{ secrets.ADP_SMTP_PORT }}
      ADP_SMTP_USERNAME: ${{ secrets.ADP_SMTP_USERNAME }}
      ADP_SMTP_PASSWORD: ${{ secrets.ADP_SMTP_PASSWORD }}
      ADP_RELEASE_TARGET: ${{ vars.ADP_RELEASE_TARGET }}
      ADP_ALLOW_SMTP_SEND: ${{ vars.ADP_ALLOW_SMTP_SEND }}
      ADP_ALLOW_RELEASE_UPLOAD: ${{ vars.ADP_ALLOW_RELEASE_UPLOAD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
      - name: Resolve generated_at
        id: generated_at
        shell: bash
        run: |
          if [ -n "$INPUT_GENERATED_AT" ]; then
            printf 'value=%s\n' "$INPUT_GENERATED_AT" >> "$GITHUB_OUTPUT"
          else
            printf 'value=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          fi
      - name: Discover production refs readiness
        id: production_refs
        shell: bash
        run: |
          set +e
          output="$RUNNER_TEMP/adp-production-provisioning-audit.json"
          readiness_input="$RUNNER_TEMP/adp-production-provisioning-audit-input.json"
          python3 - "$readiness_input" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          repo = "${{ github.repository }}"
          run_id = "${{ github.run_id }}"
          release_target = os.environ.get("ADP_RELEASE_TARGET", "")
          Path(sys.argv[1]).write_text(json.dumps({
              "runner": {
                  "ready": True,
                  "label": "ubuntu-latest",
                  "evidence_ref": f"github-hosted://{repo}/actions/runs/{run_id}/ubuntu-latest",
              },
              "smtp_secrets": {
                  "ready": all(os.environ.get(name) for name in (
                      "ADP_SMTP_HOST",
                      "ADP_SMTP_PORT",
                      "ADP_SMTP_USERNAME",
                      "ADP_SMTP_PASSWORD",
                  )),
                  "secret_names": [
                      "ADP_SMTP_HOST",
                      "ADP_SMTP_PORT",
                      "ADP_SMTP_USERNAME",
                      "ADP_SMTP_PASSWORD",
                  ],
                  "evidence_ref": f"github-actions://{repo}/actions/runs/{run_id}/secrets/smtp-names-only",
              },
              "release_target": {
                  "ready": bool(release_target),
                  "var_name": "ADP_RELEASE_TARGET",
                  "target": release_target,
                  "evidence_ref": f"github-actions://{repo}/actions/runs/{run_id}/vars/ADP_RELEASE_TARGET",
              },
              "workflow_vars": {
                  "ready": True,
                  "var_names": [
                      "ADP_RELEASE_TARGET",
                      "ADP_ALLOW_SMTP_SEND",
                      "ADP_ALLOW_RELEASE_UPLOAD",
                  ],
                  "evidence_ref": f"github-actions://{repo}/actions/runs/{run_id}/vars/delivery-gates",
              },
          }, ensure_ascii=False, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_provisioning_audit" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push plan-production-refs \
              --readiness-input "$readiness_input" \
              --generated-at "${{ steps.generated_at.outputs.value }}" \
              --json > "$output"
          code=$?
          cat "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
          printf 'exit_code=%s\n' "$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload provisioning audit artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-production-provisioning-audit
          path: ${{ steps.production_refs.outputs.path }}
          if-no-files-found: error
          retention-days: 35
      - name: Stop if provisioning audit blocked
        if: steps.production_refs.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "production provisioning audit blocked; inspect adp-production-provisioning-audit before trial start"
          exit "${{ steps.production_refs.outputs.exit_code }}"
      - name: Write provisioning audit summary
        if: always()
        run: |
          {
            echo "## arXiv Daily Push provisioning audit"
            echo "- generated_at: ${{ steps.generated_at.outputs.value }}"
            echo "- runner: ubuntu-latest"
            echo "- production_refs_exit_code: ${{ steps.production_refs.outputs.exit_code || 'not_run' }}"
            echo "- artifact: adp-production-provisioning-audit"
            echo "- next: dispatch trial-start only after this artifact reports production_refs_ready=true"
          } >> "$GITHUB_STEP_SUMMARY"
