name: arXiv Daily Push manual B1 text SMTP test

on:
  workflow_dispatch:
    inputs:
      confirm_manual_delivery_test:
        description: "Type SEND_TEST_EMAIL_TO_LINZEZHANG35_GMAIL_COM to send one Gmail SMTP Stage 1 text test email."
        required: true
        type: string
      generated_at:
        description: "Optional ISO timestamp for deterministic evidence. Empty uses current UTC."
        required: false
        type: string
      max_results_per_category:
        description: "Small live arXiv fetch window per primary archive."
        required: true
        default: "1"
        type: choice
        options: ["1", "2", "3"]

permissions:
  contents: read

concurrency:
  group: arxiv-daily-push-manual-b1-text-smtp-test
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CONFIRM_MANUAL_DELIVERY_TEST: ${{ inputs.confirm_manual_delivery_test }}
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
    steps:
      - name: Resolve manual test guard
        id: guard
        shell: bash
        run: |
          should_run="false"
          if [ "$CONFIRM_MANUAL_DELIVERY_TEST" = "SEND_TEST_EMAIL_TO_LINZEZHANG35_GMAIL_COM" ]; then
            should_run="true"
          fi
          printf 'should_run=%s\n' "$should_run" >> "$GITHUB_OUTPUT"
          {
            echo "## arXiv Daily Push manual B1 text SMTP test"
            echo "- status: $should_run"
            echo "- runner: ubuntu-latest"
            echo "- recipient: linzezhang35@gmail.com"
            echo "- production schedule: not enabled"
            echo "- video delivery: not required for Stage 1"
          } >> "$GITHUB_STEP_SUMMARY"

  manual-delivery-test:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INPUT_GENERATED_AT: ${{ inputs.generated_at }}
      INPUT_MAX_RESULTS_PER_CATEGORY: ${{ inputs.max_results_per_category }}
      CURRENT_REF_NAME: ${{ github.ref_name }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      ADP_PRODUCTION_ENABLED: "false"
      ADP_SCHEDULED_RUN_ENABLED: "true"
      ADP_ALLOW_SMTP_SEND: "true"
      ADP_SMTP_HOST: ${{ secrets.ADP_SMTP_HOST || 'smtp.gmail.com' }}
      ADP_SMTP_PORT: ${{ secrets.ADP_SMTP_PORT || '587' }}
      ADP_SMTP_USERNAME: ${{ secrets.ADP_SMTP_USERNAME || 'linzezhang35@gmail.com' }}
      ADP_SMTP_PASSWORD: ${{ secrets.ADP_SMTP_PASSWORD }}
      ADP_ARXIV_POLITE_DELAY_SECONDS: "3"
      ADP_ARXIV_TRANSIENT_RETRY_COUNT: "2"
      ADP_ARXIV_TRANSIENT_RETRY_DELAY_SECONDS: "20"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Stop unless default branch
        shell: bash
        run: |
          if [ "$CURRENT_REF_NAME" != "$DEFAULT_BRANCH" ]; then
            echo "manual delivery test must run from the default branch after PR CI and merge"
            exit 2
          fi
      - name: Resolve generated_at
        id: generated_at
        shell: bash
        run: |
          if [ -n "$INPUT_GENERATED_AT" ]; then value="$INPUT_GENERATED_AT"; else value="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; fi
          service_date="$(python3 - "$value" <<'PY'
          from __future__ import annotations

          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          import sys

          raw = sys.argv[1]
          text = raw[:-1] + "+00:00" if raw.endswith("Z") else raw
          dt = datetime.fromisoformat(text)
          if dt.tzinfo is None:
              dt = dt.replace(tzinfo=timezone.utc)
          print(dt.astimezone(ZoneInfo("Australia/Sydney")).date().isoformat())
          PY
          )"
          printf 'value=%s\n' "$value" >> "$GITHUB_OUTPUT"
          printf 'date=%s\n' "$service_date" >> "$GITHUB_OUTPUT"
      - name: Run production preflight for manual test
        id: preflight
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-manual-delivery-preflight.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_manual_delivery_preflight" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push preflight-production --path . --generated-at "${{ steps.generated_at.outputs.value }}" --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Upload manual preflight evidence
        if: always() && steps.preflight.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-manual-delivery-preflight
          path: ${{ steps.preflight.outputs.path }}
          if-no-files-found: error
      - name: Build all-arXiv Stage 1 text input
        id: daily_input
        shell: bash
        run: |
          artifact_dir="$RUNNER_TEMP/adp-phase12-delivery-artifacts"
          report="$RUNNER_TEMP/adp-manual-delivery-daily-input.json"
          queue="$RUNNER_TEMP/adp-candidate-queue.json"
          mkdir -p "$artifact_dir"
          set +e
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_manual_delivery_input" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push build-all-arxiv-daily-input --date "${{ steps.generated_at.outputs.date }}" --generated-at "${{ steps.generated_at.outputs.value }}" --max-results-per-category "$INPUT_MAX_RESULTS_PER_CATEGORY" --polite-delay-seconds "${ADP_ARXIV_POLITE_DELAY_SECONDS}" --transient-retry-count "${ADP_ARXIV_TRANSIENT_RETRY_COUNT}" --transient-retry-delay-seconds "${ADP_ARXIV_TRANSIENT_RETRY_DELAY_SECONDS}" --artifact-dir "$artifact_dir" --queue-output "$queue" --json > "$report"
          code="$?"
          set -e
          python3 - "$report" "$code" <<'PY'
          import json
          import pathlib
          import sys

          report = pathlib.Path(sys.argv[1])
          code = sys.argv[2]
          print(f"daily_input_build_exit_code={code}")
          if not report.is_file() or report.stat().st_size == 0:
              print("daily_input_report=missing_or_empty")
              raise SystemExit(0)
          try:
              data = json.loads(report.read_text(encoding="utf-8"))
          except json.JSONDecodeError as exc:
              print(f"daily_input_report=invalid_json:{exc}")
              raise SystemExit(0)
          scan = data.get("scan") if isinstance(data.get("scan"), dict) else {}
          print(f"daily_input_status={data.get('status')}")
          print(f"daily_input_ready={data.get('daily_input_ready')}")
          print(f"scan_status={scan.get('status')}")
          print(f"archive_count={scan.get('archive_count')}")
          print(f"blocked_archive_count={scan.get('blocked_archive_count')}")
          print(f"candidate_count={scan.get('candidate_count')}")
          for reason in (data.get("blocking_reasons") or [])[:10]:
              print(f"blocking_reason={reason}")
          blocked = [
              item for item in (scan.get("category_reports") or [])
              if isinstance(item, dict) and item.get("status") == "blocked"
          ]
          for item in blocked[:8]:
              reason = "; ".join(str(reason) for reason in (item.get("blocking_reasons") or [])[:2])
              print(f"blocked_archive={item.get('archive_id')}:{reason}")
          PY
          printf 'report=%s\n' "$report" >> "$GITHUB_OUTPUT"
          printf 'artifact_dir=%s\n' "$artifact_dir" >> "$GITHUB_OUTPUT"
          printf 'queue=%s\n' "$queue" >> "$GITHUB_OUTPUT"
          printf 'exit_code=%s\n' "$code" >> "$GITHUB_OUTPUT"
      - name: Upload Stage 1 build report
        if: always() && steps.daily_input.outputs.report != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-manual-delivery-daily-input-build-report
          path: ${{ steps.daily_input.outputs.report }}
          if-no-files-found: error
      - name: Stop if Stage 1 text input blocked
        if: steps.daily_input.outputs.exit_code != '0'
        shell: bash
        run: exit "${{ steps.daily_input.outputs.exit_code }}"
      - name: Verify Stage 1 text artifacts
        if: steps.daily_input.outputs.exit_code == '0'
        shell: bash
        run: |
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-daily-input.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-candidate-queue.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-text-delivery-policy.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-email-brief.json"
      - name: Upload Stage 1 text artifacts
        if: steps.daily_input.outputs.exit_code == '0'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-phase12-delivery-artifacts
          path: |
            ${{ steps.daily_input.outputs.report }}
            ${{ steps.daily_input.outputs.artifact_dir }}
            ${{ steps.daily_input.outputs.queue }}
          if-no-files-found: error
      - name: Run scheduled production driver for manual SMTP test
        if: steps.daily_input.outputs.exit_code == '0'
        id: scheduled
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-manual-delivery-scheduled-execution.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_manual_delivery_scheduled" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push run-scheduled-production --mode daily-run --generated-at "${{ steps.generated_at.outputs.value }}" --preflight-report "${{ steps.preflight.outputs.path }}" --daily-input "${{ steps.daily_input.outputs.report }}" --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Upload manual scheduled execution evidence
        if: always() && steps.scheduled.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-manual-delivery-scheduled-execution
          path: ${{ steps.scheduled.outputs.path }}
          if-no-files-found: error
