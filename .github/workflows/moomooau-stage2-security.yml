name: MooMooAU Stage 2 security

on:
  push:
    paths:
      - ".github/workflows/moomooau-stage2-security.yml"
      - "LinzeDatabase/MooMooAU/**"
  pull_request:
    paths:
      - ".github/workflows/moomooau-stage2-security.yml"
      - "LinzeDatabase/MooMooAU/**"

permissions:
  contents: read

jobs:
  stage2-gates:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Reject fork pull requests before protected dependency checkout
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        shell: bash
        run: |
          echo "::error::Fork pull requests cannot access the protected read-only Governance dependency."
          exit 1

      - name: Check out project without retained credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Check out pinned shared Governance read-only
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: LinzeColin/Governance
          ref: ebc6c2e4884edc959118cfc56d0e18a86c49460f # pragma: allowlist secret -- immutable commit, not a credential
          path: .governance
          persist-credentials: false
          ssh-key: ${{ secrets.MOOMOOAU_GOVERNANCE_DEPLOY_KEY }}

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install hash-verified official age
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/age.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz
          echo "bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377  $archive" \
            | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/age" >> "$GITHUB_PATH"

      - name: Install transitive hash lock
        working-directory: LinzeDatabase/MooMooAU
        run: python -m pip install --require-hashes -r requirements/stage2.lock

      - name: Lint type and Stage 0-2 tests
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m ruff check --no-cache src tests/tasks/test_t01*.py tests/tasks/test_t02*.py machine/stages/S1/tools machine/stages/S2/tools
          python -m mypy --no-incremental --cache-dir "$RUNNER_TEMP/mypy-cache" src
          python -m pytest -q tests/tasks/test_t01*.py tests/tasks/test_t02*.py

      - name: Cumulative contracts and publication gates
        working-directory: LinzeDatabase/MooMooAU
        run: >-
          python machine/stages/S2/tools/validate_stage2.py
          --governance-root "$GITHUB_WORKSPACE/.governance"

      - name: Dependency vulnerability gate
        working-directory: LinzeDatabase/MooMooAU
        run: python -m pip_audit -r requirements/stage2.lock --require-hashes --progress-spinner=off

      - name: Reproducible SBOM gate
        working-directory: LinzeDatabase/MooMooAU
        run: |
          cyclonedx-py requirements requirements/stage2.lock --pyproject pyproject.toml \
            --output-reproducible --validate --output-format JSON \
            --output-file "$RUNNER_TEMP/sbom.raw.cdx.json"
          python machine/stages/S2/tools/sanitize_sbom.py \
            --input "$RUNNER_TEMP/sbom.raw.cdx.json" \
            --lock requirements/stage2.lock \
            --output "$RUNNER_TEMP/sbom.cdx.json"
          cmp machine/stages/S2/supply-chain/sbom.cdx.json "$RUNNER_TEMP/sbom.cdx.json"

      - name: Secret scan without committed report
        run: |
          detect-secrets scan --all-files \
            LinzeDatabase/MooMooAU/src \
            LinzeDatabase/MooMooAU/tests/tasks/test_t02*.py \
            .github/workflows/moomooau-stage2-security.yml \
            > "$RUNNER_TEMP/detect-secrets.json"
          python -c 'import json,sys; value=json.load(open(sys.argv[1], encoding="utf-8")); raise SystemExit(any(value.get("results", {}).values()))' "$RUNNER_TEMP/detect-secrets.json"

      - name: Build digest-pinned validation container
        working-directory: LinzeDatabase/MooMooAU
        run: docker build --no-cache --file container/Dockerfile.stage2-ci .

      - name: Build package without publishing
        working-directory: LinzeDatabase/MooMooAU
        run: python -m build --no-isolation --outdir "$RUNNER_TEMP/moomooau-dist"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high

  codeql:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26
        with:
          languages: python
      - uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26
