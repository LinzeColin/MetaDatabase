name: Dual-Plane Governance

# 全仓强制：本仓每个双平面项目都必须就位七文件架构并过门。
#
# 刻意跳过 EEI/**：EEI 仍在活跃开发且尚未纳入双平面（等它停下来后在最终批补治理）。
# 只改 EEI 的推送/PR 不触发本校验，避免干扰活跃线；EEI 自己的 eei-validation.yml 照常跑。
on:
  push:
    branches: [main]
    paths-ignore:
      - "EEI/**"
  pull_request:
    paths-ignore:
      - "EEI/**"
  workflow_dispatch:

jobs:
  dual-plane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 安装 PyYAML（渲染 config.yaml / data_contract.yaml 需要，保证渲染确定性）
        run: python3 -m pip install --quiet pyyaml
      - name: 运行全仓双平面合规校验
        run: |
          set -euo pipefail
          SCRIPT="$(find . -path '*/machine/tools/check_dual_plane_ci.py' | sort | head -1)"
          if [ -z "$SCRIPT" ]; then
            echo "FAIL: 未找到 check_dual_plane_ci.py（本仓应至少有一个双平面项目）"
            exit 1
          fi
          echo "runner: $SCRIPT"
          python3 "$SCRIPT" --root . --require-projects
