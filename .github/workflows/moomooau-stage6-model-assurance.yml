name: MooMooAU Stage 6 Codex policy assurance

on:
  push:
    paths:
      - ".github/workflows/moomooau-stage6-model-assurance.yml"
      - "LinzeDatabase/MooMooAU/machine/stages/S6/model/**"
      - "LinzeDatabase/MooMooAU/machine/stages/S6/reviews/**"
      - "LinzeDatabase/MooMooAU/machine/stages/S6/schemas/**"
      - "LinzeDatabase/MooMooAU/machine/stages/S6/tools/validate_stage6.py"
      - "LinzeDatabase/MooMooAU/machine/contracts/delivery_status_model.json"
      - "LinzeDatabase/MooMooAU/machine/tools/build_delivery_status.py"
      - "LinzeDatabase/MooMooAU/machine/tools/build_governance_facts.py"
      - "LinzeDatabase/MooMooAU/machine/tools/build_package_manifest.py"
      - "LinzeDatabase/MooMooAU/machine/tools/capture_candidate_gates.py"
      - "LinzeDatabase/MooMooAU/machine/tools/validate_assurance_reviews.py"
      - "LinzeDatabase/MooMooAU/machine/tools/validate_delivery_status.py"
      - "LinzeDatabase/MooMooAU/machine/tools/validate_package.py"
      - "LinzeDatabase/MooMooAU/schemas/delivery-status-v1.schema.json"
      - "LinzeDatabase/MooMooAU/src/moomooau_archive/model_boundary.py"
      - "LinzeDatabase/MooMooAU/tests/remediation/**"
      - "LinzeDatabase/MooMooAU/tests/tasks/test_t0605.py"
      - "LinzeDatabase/MooMooAU/tests/tasks/test_t0606.py"
  pull_request:
    paths:
      - ".github/workflows/moomooau-stage6-model-assurance.yml"
      - "LinzeDatabase/MooMooAU/machine/stages/S6/model/**"
      - "LinzeDatabase/MooMooAU/machine/stages/S6/reviews/**"
      - "LinzeDatabase/MooMooAU/machine/stages/S6/schemas/**"
      - "LinzeDatabase/MooMooAU/machine/stages/S6/tools/validate_stage6.py"
      - "LinzeDatabase/MooMooAU/machine/contracts/delivery_status_model.json"
      - "LinzeDatabase/MooMooAU/machine/tools/build_delivery_status.py"
      - "LinzeDatabase/MooMooAU/machine/tools/build_governance_facts.py"
      - "LinzeDatabase/MooMooAU/machine/tools/build_package_manifest.py"
      - "LinzeDatabase/MooMooAU/machine/tools/capture_candidate_gates.py"
      - "LinzeDatabase/MooMooAU/machine/tools/validate_assurance_reviews.py"
      - "LinzeDatabase/MooMooAU/machine/tools/validate_delivery_status.py"
      - "LinzeDatabase/MooMooAU/machine/tools/validate_package.py"
      - "LinzeDatabase/MooMooAU/schemas/delivery-status-v1.schema.json"
      - "LinzeDatabase/MooMooAU/src/moomooau_archive/model_boundary.py"
      - "LinzeDatabase/MooMooAU/tests/remediation/**"
      - "LinzeDatabase/MooMooAU/tests/tasks/test_t0605.py"
      - "LinzeDatabase/MooMooAU/tests/tasks/test_t0606.py"

permissions:
  contents: read

jobs:
  codex-policy-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Configure ephemeral test state
        shell: bash
        run: |
          set -euo pipefail
          printf 'HYPOTHESIS_STORAGE_DIRECTORY=%s\n' \
            "$RUNNER_TEMP/hypothesis" >> "$GITHUB_ENV"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install immutable test lock
        working-directory: LinzeDatabase/MooMooAU
        run: python -m pip install --require-hashes -r requirements/stage6.lock
      - name: Enforce System Card evals and independent-review records
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m pytest -q tests/tasks/test_t0605.py tests/tasks/test_t0606.py
          python machine/tools/validate_assurance_reviews.py
