name: MooMooAU protected Beta Raw-only

on:
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: Exact main commit to execute
        required: true
        type: string
      confirm_raw_only:
        description: Confirm that this run may archive Raw only
        required: true
        type: choice
        options:
          - BETA_RAW_ONLY

permissions:
  contents: read

concurrency:
  group: moomooau-beta-raw-only-single-writer
  cancel-in-progress: false

jobs:
  alpha-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      alpha_gate_sha256: ${{ steps.alpha-contract.outputs.alpha_gate_sha256 }}
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Fail closed on invalid protected dispatch context
        shell: bash
        env:
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          RAW_ONLY_CONFIRMATION: ${{ inputs.confirm_raw_only }}
        run: |
          set -euo pipefail
          test "$GITHUB_ACTIONS" = "true"
          test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
          test "$GITHUB_REPOSITORY_ID" = "1300525906"
          test "$GITHUB_REPOSITORY_OWNER_ID" = "68840188"
          test "$GITHUB_ACTOR_ID" = "68840188"
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$RUNNER_ENVIRONMENT" = "github-hosted"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_WORKFLOW_REF" = \
            "LinzeColin/MetaDatabase/.github/workflows/moomooau-beta.yml@refs/heads/main"
          test "$EXPECTED_HEAD_SHA" = "$GITHUB_SHA"
          test "$RAW_ONLY_CONFIRMATION" = "BETA_RAW_ONLY"
          [[ "$EXPECTED_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]

      - name: Check out exact main tree without retained credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install hash-verified official age for the task oracle
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/age.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz
          echo "bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377  $archive" \
            | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/age" >> "$GITHUB_PATH"

      - name: Install cumulative immutable dependencies and package
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m pip install --require-hashes -r requirements/stage6.lock
          python -m pip install --no-build-isolation --no-deps .

      - name: Revalidate same-tree Alpha and Beta boundaries without protected inputs
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m ruff format --check \
            src/moomooau_archive/release_control.py \
            src/moomooau_archive/protected_beta.py \
            src/moomooau_archive/protected_beta_entrypoint.py \
            tests/tasks/test_t0701.py \
            tests/tasks/test_t0702.py \
            machine/stages/S7/tools/validate_stage7.py
          python -m ruff check --no-cache \
            src/moomooau_archive/release_control.py \
            src/moomooau_archive/protected_beta.py \
            src/moomooau_archive/protected_beta_entrypoint.py \
            tests/tasks/test_t0701.py \
            tests/tasks/test_t0702.py \
            machine/stages/S7/tools/validate_stage7.py
          python -m mypy --no-incremental --cache-dir "$RUNNER_TEMP/mypy-cache" \
            src/moomooau_archive/release_control.py \
            src/moomooau_archive/protected_beta.py \
            src/moomooau_archive/protected_beta_entrypoint.py
          python -m pytest -q tests/tasks/test_t0701.py tests/tasks/test_t0702.py
          python machine/tools/validate_package.py
          python machine/tools/validate_delivery_status.py
          python machine/tools/validate_publication.py

      - name: Bind the protected dispatch to the same-tree Alpha gate
        id: alpha-contract
        working-directory: LinzeDatabase/MooMooAU
        shell: bash
        run: |
          set -euo pipefail
          contract="$RUNNER_TEMP/moomooau-beta-contract.json"
          python -m moomooau_archive.protected_beta_entrypoint \
            --contract-only --project-root "$PWD" > "$contract"
          python -c \
            'import json,sys; value=json.load(open(sys.argv[1], encoding="utf-8")); print("alpha_gate_sha256="+value["alpha_gate_sha256"], file=open(sys.argv[2], "a", encoding="utf-8"))' \
            "$contract" "$GITHUB_OUTPUT"

  beta-raw-only:
    needs: alpha-gate
    environment: moomooau-beta
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Fail closed on non-cloud protected runner
        shell: bash
        run: |
          set -euo pipefail
          test "$RUNNER_ENVIRONMENT" = "github-hosted"

      - name: Check out exact main tree without retained credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install hash-verified official age
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/age.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz
          echo "bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377  $archive" \
            | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/age" >> "$GITHUB_PATH"

      - name: Install cumulative immutable dependencies and package
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m pip install --require-hashes -r requirements/stage6.lock
          python -m pip install --no-build-isolation --no-deps .

      - name: Execute exactly one protected Raw-only Beta run
        working-directory: LinzeDatabase/MooMooAU
        env:
          MOOMOOAU_PROTECTED_ENVIRONMENT: moomooau-beta
          MOOMOOAU_BETA_CONFIG: ${{ secrets.MOOMOOAU_BETA_CONFIG }}
          MOOMOOAU_SENDER_REGISTRY: ${{ secrets.MOOMOOAU_SENDER_REGISTRY }}
          MOOMOOAU_GITHUB_APP_PRIVATE_KEY: ${{ secrets.MOOMOOAU_GITHUB_APP_PRIVATE_KEY }}
          MOOMOOAU_AGE_IDENTITY: ${{ secrets.MOOMOOAU_AGE_IDENTITY }}
          MOOMOOAU_OPAQUE_ID_KEY: ${{ secrets.MOOMOOAU_OPAQUE_ID_KEY }}
          MOOMOOAU_GMAIL_OAUTH: ${{ secrets.MOOMOOAU_GMAIL_OAUTH }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          ALPHA_GATE_SHA256: ${{ needs.alpha-gate.outputs.alpha_gate_sha256 }}
          RAW_ONLY_CONFIRMATION: ${{ inputs.confirm_raw_only }}
        run: >-
          python -m moomooau_archive.protected_beta_entrypoint
          --execute-protected
          --project-root "$PWD"
          --expected-head-sha "$EXPECTED_HEAD_SHA"
          --alpha-gate-sha256 "$ALPHA_GATE_SHA256"
          --confirm "$RAW_ONLY_CONFIRMATION"

      - name: Verify protected identity plaintext was removed
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if find /dev/shm -mindepth 1 -maxdepth 1 -type d \
            -name 'moomooau-protected-beta-*' -print -quit | grep -q .; then
            echo "::error::Protected Beta identity directory remains in tmpfs."
            exit 1
          fi
