name: arXiv Daily Push live all-arXiv cloud dry-run

on:
  pull_request:
    paths:
      - ".github/workflows/arxiv-daily-push-phase12-cloud-dry-run.yml"
      - "arxiv-daily-push/**"
  workflow_dispatch:
    inputs:
      max_results_per_category:
        description: "Live arXiv Atom results per primary archive bucket."
        required: true
        default: "3"
        type: string
      polite_delay_seconds:
        description: "Delay between arXiv primary archive requests."
        required: true
        default: "3"
        type: string
      generated_at:
        description: "Optional ISO timestamp for deterministic evidence. Empty uses current UTC."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: arxiv-daily-push-live-all-arxiv-cloud-dry-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  runtime-change-scope:
    name: classify-arxiv-runtime-change
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.scope.outputs.should_run }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - name: Check out repository for path diff
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          event_name="${{ github.event_name }}"
          should_run="false"
          reason="governance-only change"
          changed_files=""

          if [ "$event_name" = "workflow_dispatch" ]; then
            should_run="true"
            reason="manual dispatch"
          else
            if [ "$event_name" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            else
              base=""
              head=""
              should_run="true"
              reason="non-PR event"
            fi

            if [ "$should_run" != "true" ]; then
              changed_files="$(git diff --name-only "$base" "$head")"
              runtime_regex='^(arxiv-daily-push/(src|tests|config|schemas)/|arxiv-daily-push/(pyproject\.toml|VERSION|\.gitignore))'
              if printf '%s\n' "$changed_files" | grep -E "$runtime_regex" >/dev/null; then
                should_run="true"
                reason="runtime-relevant arxiv-daily-push change"
              fi
            fi
          fi

          printf 'should_run=%s\n' "$should_run" >> "$GITHUB_OUTPUT"
          printf 'reason=%s\n' "$reason" >> "$GITHUB_OUTPUT"
          {
            echo "## arXiv Daily Push runtime change scope"
            echo "- should_run: $should_run"
            echo "- reason: $reason"
            echo "- runtime_paths: src, tests, config, schemas, pyproject.toml, VERSION, .gitignore"
            echo "- governance-only paths do not run this external/runtime check"
            if [ -n "$changed_files" ]; then
              echo ""
              echo "Changed files:"
              printf '%s\n' "$changed_files" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  live-all-arxiv-dry-run:
    needs: runtime-change-scope
    if: needs.runtime-change-scope.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      INPUT_GENERATED_AT: ${{ inputs.generated_at }}
      INPUT_MAX_RESULTS_PER_CATEGORY: ${{ inputs.max_results_per_category || '3' }}
      INPUT_POLITE_DELAY_SECONDS: ${{ inputs.polite_delay_seconds || '3' }}
      ADP_PRODUCTION_ENABLED: "false"
      ADP_SCHEDULED_RUN_ENABLED: "false"
      ADP_ALLOW_SMTP_SEND: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve dry-run parameters
        id: params
        shell: bash
        run: |
          generated_at="$INPUT_GENERATED_AT"
          if [ -z "$generated_at" ]; then generated_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; fi
          service_date="$(python3 - "$generated_at" <<'PY'
          from __future__ import annotations

          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          import sys

          raw = sys.argv[1]
          text = raw[:-1] + "+00:00" if raw.endswith("Z") else raw
          dt = datetime.fromisoformat(text)
          if dt.tzinfo is None:
              dt = dt.replace(tzinfo=timezone.utc)
          print(dt.astimezone(ZoneInfo("Australia/Sydney")).date().isoformat())
          PY
          )"
          printf 'generated_at=%s\n' "$generated_at" >> "$GITHUB_OUTPUT"
          printf 'date=%s\n' "$service_date" >> "$GITHUB_OUTPUT"
          printf 'max_results=%s\n' "$INPUT_MAX_RESULTS_PER_CATEGORY" >> "$GITHUB_OUTPUT"
          printf 'polite_delay=%s\n' "$INPUT_POLITE_DELAY_SECONDS" >> "$GITHUB_OUTPUT"
      - name: Run live all-arXiv dry-run
        id: dry_run
        shell: bash
        run: |
          artifact_dir="$RUNNER_TEMP/adp-phase12-cloud-dry-run"
          report="$artifact_dir/adp-live-all-arxiv-dry-run.json"
          mkdir -p "$artifact_dir"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_live_all_arxiv" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push run-live-all-arxiv-dry-run --date "${{ steps.params.outputs.date }}" --generated-at "${{ steps.params.outputs.generated_at }}" --max-results-per-category "${{ steps.params.outputs.max_results }}" --fetcher curl --polite-delay-seconds "${{ steps.params.outputs.polite_delay }}" --artifact-dir "$artifact_dir" --json > "$report"
          printf 'artifact_dir=%s\n' "$artifact_dir" >> "$GITHUB_OUTPUT"
          printf 'report=%s\n' "$report" >> "$GITHUB_OUTPUT"
      - name: Build Stage 1 accelerated acceptance evidence
        id: accelerated_acceptance
        shell: bash
        run: |
          artifact_dir="${{ steps.dry_run.outputs.artifact_dir }}"
          report="$artifact_dir/adp-live-all-arxiv-dry-run.json"
          stdout_report="$RUNNER_TEMP/adp-stage1-accelerated-acceptance-stdout.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_stage1_accelerated_acceptance" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push build-stage1-accelerated-acceptance --live-dry-run "$report" --controlled-smtp-manifest governance/run_manifests/ADP-S1P5T04-CONTROLLED-SMTP-EVIDENCE-20260623.json --generated-at "${{ steps.params.outputs.generated_at }}" --expected-samples 30 --live-dry-run-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/adp-phase12-cloud-dry-run" --controlled-smtp-ref "governance/run_manifests/ADP-S1P5T04-CONTROLLED-SMTP-EVIDENCE-20260623.json" --scheduler-ref ".github/workflows/arxiv-daily-push-scheduled.yml@${{ github.sha }}" --resource-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}" --artifact-dir "$artifact_dir" --json > "$stdout_report"
          cp "$stdout_report" "$artifact_dir/adp-stage1-accelerated-acceptance-stdout.json"
          printf 'report=%s\n' "$stdout_report" >> "$GITHUB_OUTPUT"
      - name: Upload live all-arXiv dry-run evidence
        if: always() && steps.dry_run.outputs.artifact_dir != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-phase12-cloud-dry-run
          path: ${{ steps.dry_run.outputs.artifact_dir }}
          if-no-files-found: error
