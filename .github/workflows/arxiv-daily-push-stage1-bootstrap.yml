name: arXiv Daily Push Stage 1 bootstrap

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/arxiv-daily-push-stage1-bootstrap.yml"
      - "arxiv-daily-push/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/arxiv-daily-push-stage1-bootstrap.yml"
      - "arxiv-daily-push/**"

permissions:
  contents: read

concurrency:
  group: arxiv-daily-push-stage1-bootstrap-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  runtime-change-scope:
    name: classify-arxiv-runtime-change
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.scope.outputs.should_run }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - name: Check out repository for path diff
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: scope
        shell: bash
        run: |
          set -euo pipefail
          event_name="${{ github.event_name }}"
          should_run="false"
          reason="governance-only change"
          changed_files=""

          if [ "$event_name" = "workflow_dispatch" ]; then
            should_run="true"
            reason="manual dispatch"
          else
            if [ "$event_name" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            elif [ "$event_name" = "push" ]; then
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
              if [[ "$base" =~ ^0+$ ]]; then
                should_run="true"
                reason="push without comparable base"
              fi
            else
              base=""
              head=""
              should_run="true"
              reason="non-PR event"
            fi

            if [ "$should_run" != "true" ]; then
              changed_files="$(git diff --name-only "$base" "$head")"
              runtime_regex='^(arxiv-daily-push/(src|tests|config|schemas)/|arxiv-daily-push/(pyproject\.toml|VERSION|\.gitignore))'
              if printf '%s\n' "$changed_files" | grep -E "$runtime_regex" >/dev/null; then
                should_run="true"
                reason="runtime-relevant arxiv-daily-push change"
              fi
            fi
          fi

          printf 'should_run=%s\n' "$should_run" >> "$GITHUB_OUTPUT"
          printf 'reason=%s\n' "$reason" >> "$GITHUB_OUTPUT"
          {
            echo "## arXiv Daily Push runtime change scope"
            echo "- should_run: $should_run"
            echo "- reason: $reason"
            echo "- runtime_paths: src, tests, config, schemas, pyproject.toml, VERSION, .gitignore"
            echo "- governance-only paths do not run this external/runtime check"
            if [ -n "$changed_files" ]; then
              echo ""
              echo "Changed files:"
              printf '%s\n' "$changed_files" | sed 's/^/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  stage1-bootstrap:
    needs: runtime-change-scope
    if: needs.runtime-change-scope.outputs.should_run == 'true'
    name: stage1-bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ADP_PRODUCTION_ENABLED: "false"
      ADP_SCHEDULED_RUN_ENABLED: "false"
      ADP_ALLOW_SMTP_SEND: "false"
      ADP_ALLOW_RELEASE_UPLOAD: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Run Stage 1 post-migration bootstrap
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/adp-stage1-bootstrap"
          generated_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp-pycache" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push storage migrate \
              --db "$RUNNER_TEMP/adp-stage1-bootstrap/adp.sqlite3" \
              --json \
            | tee "$RUNNER_TEMP/adp-stage1-bootstrap/storage-migrate.json"
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp-pycache" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push migration export \
              --project-root "." \
              --db "$RUNNER_TEMP/adp-stage1-bootstrap/adp.sqlite3" \
              --output-dir "$RUNNER_TEMP/adp-stage1-bootstrap/migration-package" \
              --generated-at "$generated_at" \
              --json \
            | tee "$RUNNER_TEMP/adp-stage1-bootstrap/migration-export.json"
          PYTHONDONTWRITEBYTECODE=1 \
          PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp-pycache" \
          PYTHONPATH=arxiv-daily-push/src \
            python3 -m arxiv_daily_push post-migration-bootstrap \
              --project-root "." \
              --migration-manifest "$RUNNER_TEMP/adp-stage1-bootstrap/migration-package/migration_manifest.json" \
              --state-dir "$RUNNER_TEMP/adp-stage1-bootstrap/state" \
              --db "$RUNNER_TEMP/adp-stage1-bootstrap/adp.sqlite3" \
              --generated-at "$generated_at" \
              --target-environment github_actions_cloud_runner \
              --workflow-path ".github/workflows/arxiv-daily-push-stage1-bootstrap.yml" \
              --require-github-actions \
              --require-network-probe \
              --network-timeout-seconds 30 \
              --network-max-attempts 3 \
              --json \
            | tee "$RUNNER_TEMP/adp-stage1-bootstrap/adp-stage1-bootstrap-report.json"
          python3 -m json.tool "$RUNNER_TEMP/adp-stage1-bootstrap/storage-migrate.json" >/dev/null
          python3 -m json.tool "$RUNNER_TEMP/adp-stage1-bootstrap/migration-export.json" >/dev/null
          python3 -m json.tool "$RUNNER_TEMP/adp-stage1-bootstrap/adp-stage1-bootstrap-report.json" >/dev/null

      - name: Upload Stage 1 bootstrap evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-stage1-bootstrap-report
          path: ${{ runner.temp }}/adp-stage1-bootstrap/*.json
          if-no-files-found: error
