name: arXiv Daily Push Liveness

# 长期稳定 watchdog: make a SILENT ZERO loud. Probes the live ADP endpoints on a schedule and goes
# RED when the system is up but silently producing nothing (P08's disease: a green cron enriching 0
# rows for weeks). Read-only, retries absorb transient edge timeouts. The decision logic is unit-tested
# network-free by tests/governance/test_adp_liveness_check.py.
#
# To stop scheduled alerts, delete the `schedule:` block below (workflow_dispatch stays for manual runs).

on:
  schedule:
    - cron: "0 22 * * *"   # 22:00 UTC, ~1.5h after the 20:30 daily cron has finished
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: adp-liveness
  cancel-in-progress: false

jobs:
  liveness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: ADP liveness + silent-zero watchdog
        run: python3 scripts/adp_liveness_check.py --max-run-age-days 3
