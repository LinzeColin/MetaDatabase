name: arXiv Daily Push scheduled Stage 1 text gate

on:
  schedule:
    - cron: "45 4 * * *"
      timezone: "Australia/Sydney"
    - cron: "0 5 * * *"
      timezone: "Australia/Sydney"
    - cron: "10 5 * * *"
      timezone: "Australia/Sydney"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scheduled mode to probe."
        required: true
        default: "health-check"
        type: choice
        options: ["health-check", "daily-run", "watchdog"]
      confirm_scheduled_production:
        description: "Set true only after Stage 1 text SMTP and all-arXiv prerequisites are verified."
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      generated_at:
        description: "Optional ISO timestamp for deterministic evidence. Empty uses current UTC."
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: arxiv-daily-push-scheduled-stage1-text
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      INPUT_MODE: ${{ inputs.mode }}
      INPUT_CONFIRM_SCHEDULED_PRODUCTION: ${{ inputs.confirm_scheduled_production }}
    outputs:
      mode: ${{ steps.mode.outputs.value }}
      should_run: ${{ steps.mode.outputs.should_run }}
    steps:
      - name: Resolve scheduled mode
        id: mode
        shell: bash
        run: |
          mode="$INPUT_MODE"
          should_run="false"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "45 4 * * *") mode="health-check" ;;
              "0 5 * * *") mode="daily-run" ;;
              "10 5 * * *") mode="watchdog" ;;
              *) mode="unknown" ;;
            esac
            if [ "${{ vars.ADP_PRODUCTION_ENABLED }}" = "true" ]; then should_run="true"; fi
          elif [ "$INPUT_CONFIRM_SCHEDULED_PRODUCTION" = "true" ]; then
            should_run="true"
          fi
          printf 'value=%s\n' "$mode" >> "$GITHUB_OUTPUT"
          printf 'should_run=%s\n' "$should_run" >> "$GITHUB_OUTPUT"

  scheduled:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      INPUT_GENERATED_AT: ${{ inputs.generated_at }}
      GH_TOKEN: ${{ github.token }}
      ADP_SMTP_HOST: ${{ secrets.ADP_SMTP_HOST }}
      ADP_SMTP_PORT: ${{ secrets.ADP_SMTP_PORT }}
      ADP_SMTP_USERNAME: ${{ secrets.ADP_SMTP_USERNAME }}
      ADP_SMTP_PASSWORD: ${{ secrets.ADP_SMTP_PASSWORD }}
      ADP_SCHEDULED_RUN_ENABLED: ${{ vars.ADP_SCHEDULED_RUN_ENABLED }}
      ADP_DAILY_INPUT_PATH: ${{ vars.ADP_DAILY_INPUT_PATH }}
      ADP_ARXIV_MAX_RESULTS_PER_CATEGORY: ${{ vars.ADP_ARXIV_MAX_RESULTS_PER_CATEGORY }}
      ADP_ARXIV_POLITE_DELAY_SECONDS: ${{ vars.ADP_ARXIV_POLITE_DELAY_SECONDS }}
      ADP_CANDIDATE_QUEUE_INPUT_PATH: ${{ vars.ADP_CANDIDATE_QUEUE_INPUT_PATH }}
      ADP_RECENT_SOURCE_IDS: ${{ vars.ADP_RECENT_SOURCE_IDS }}
      ADP_TRIAL_EVIDENCE_INPUT_PATH: ${{ vars.ADP_TRIAL_EVIDENCE_INPUT_PATH }}
      ADP_TRIAL_ID: ${{ vars.ADP_TRIAL_ID }}
      ADP_TRIAL_REF: ${{ vars.ADP_TRIAL_REF }}
      ADP_TEXT_DEGRADATION_VERIFIED: ${{ vars.ADP_TEXT_DEGRADATION_VERIFIED }}
      ADP_ALLOW_SMTP_SEND: ${{ vars.ADP_ALLOW_SMTP_SEND }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Resolve generated_at
        id: generated_at
        shell: bash
        run: |
          if [ -n "$INPUT_GENERATED_AT" ]; then value="$INPUT_GENERATED_AT"; else value="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; fi
          service_date="$(python3 - "$value" <<'PY'
          from __future__ import annotations

          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          import sys

          raw = sys.argv[1]
          text = raw[:-1] + "+00:00" if raw.endswith("Z") else raw
          dt = datetime.fromisoformat(text)
          if dt.tzinfo is None:
              dt = dt.replace(tzinfo=timezone.utc)
          print(dt.astimezone(ZoneInfo("Australia/Sydney")).date().isoformat())
          PY
          )"
          printf 'value=%s\n' "$value" >> "$GITHUB_OUTPUT"
          printf 'date=%s\n' "$service_date" >> "$GITHUB_OUTPUT"
      - name: Run production preflight
        id: preflight
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-scheduled-preflight.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_scheduled_preflight" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push preflight-production --path . --generated-at "${{ steps.generated_at.outputs.value }}" --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Upload scheduled preflight
        if: always() && steps.preflight.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-scheduled-preflight
          path: ${{ steps.preflight.outputs.path }}
          if-no-files-found: error
      - name: Resolve candidate queue state
        if: needs.gate.outputs.mode == 'daily-run'
        id: queue
        shell: bash
        run: |
          queue="$RUNNER_TEMP/adp-candidate-queue-input.json"
          gh run download --name adp-candidate-queue --dir "$RUNNER_TEMP/adp-candidate-queue-restore" || true
          restored="$(find "$RUNNER_TEMP/adp-candidate-queue-restore" -name 'adp-candidate-queue.json' -print -quit 2>/dev/null || true)"
          if [ -n "$restored" ]; then cp "$restored" "$queue"; fi
          printf 'path=%s\n' "$queue" >> "$GITHUB_OUTPUT"
      - name: Build all-arXiv scheduled daily input
        if: needs.gate.outputs.mode == 'daily-run'
        id: daily_input
        shell: bash
        run: |
          artifact_dir="$RUNNER_TEMP/adp-phase12-delivery-artifacts"
          report="$RUNNER_TEMP/adp-scheduled-daily-input.json"
          queue_out="$RUNNER_TEMP/adp-candidate-queue.json"
          mkdir -p "$artifact_dir"
          queue_args=(); if [ -s "${{ steps.queue.outputs.path }}" ]; then queue_args+=(--queue-path "${{ steps.queue.outputs.path }}"); fi
          max_results="${ADP_ARXIV_MAX_RESULTS_PER_CATEGORY:-3}"
          polite_delay="${ADP_ARXIV_POLITE_DELAY_SECONDS:-3}"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_scheduled_input" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push build-all-arxiv-daily-input --date "${{ steps.generated_at.outputs.date }}" --generated-at "${{ steps.generated_at.outputs.value }}" --max-results-per-category "$max_results" --polite-delay-seconds "$polite_delay" --artifact-dir "$artifact_dir" --queue-output "$queue_out" "${queue_args[@]}" --json > "$report"
          printf 'report=%s\n' "$report" >> "$GITHUB_OUTPUT"
          printf 'artifact_dir=%s\n' "$artifact_dir" >> "$GITHUB_OUTPUT"
          printf 'queue=%s\n' "$queue_out" >> "$GITHUB_OUTPUT"
      - name: Verify scheduled Stage 1 text artifacts
        if: needs.gate.outputs.mode == 'daily-run'
        shell: bash
        run: |
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-daily-input.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-candidate-queue.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-text-delivery-policy.json"
          test -s "${{ steps.daily_input.outputs.artifact_dir }}/adp-email-brief.json"
      - name: Upload scheduled Stage 1 text artifacts
        if: always() && needs.gate.outputs.mode == 'daily-run' && steps.daily_input.outputs.artifact_dir != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-phase12-delivery-artifacts
          path: |
            ${{ steps.daily_input.outputs.report }}
            ${{ steps.daily_input.outputs.artifact_dir }}
          if-no-files-found: error
      - name: Upload candidate queue
        if: always() && needs.gate.outputs.mode == 'daily-run' && steps.daily_input.outputs.queue != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-candidate-queue
          path: ${{ steps.daily_input.outputs.queue }}
          if-no-files-found: error
      - name: Upload scheduled daily input
        if: always() && needs.gate.outputs.mode == 'daily-run' && steps.daily_input.outputs.report != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-scheduled-daily-input
          path: ${{ steps.daily_input.outputs.report }}
          if-no-files-found: error
      - name: Run scheduled mode
        id: scheduled
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-scheduled-execution.json"
          command=(python3 -m arxiv_daily_push run-scheduled-production --mode "${{ needs.gate.outputs.mode }}" --generated-at "${{ steps.generated_at.outputs.value }}" --preflight-report "${{ steps.preflight.outputs.path }}" --json)
          if [ "${{ needs.gate.outputs.mode }}" = "daily-run" ]; then command+=(--daily-input "${{ steps.daily_input.outputs.report }}"); fi
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_scheduled_execution" PYTHONPATH=arxiv-daily-push/src "${command[@]}" > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Upload scheduled execution
        if: always() && steps.scheduled.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-scheduled-execution
          path: ${{ steps.scheduled.outputs.path }}
          if-no-files-found: error
      - name: Update trial ledger
        if: always() && needs.gate.outputs.mode == 'daily-run' && steps.scheduled.outputs.path != ''
        id: trial_ledger
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-trial-ledger-update.json"
          text_ref="$(python3 -c 'import json,sys; print((json.load(open(sys.argv[1], encoding="utf-8")).get("evidence_refs") or {}).get("text_artifact_ref") or "")' "${{ steps.scheduled.outputs.path }}")"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_ledger" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push update-trial-ledger --scheduled-execution "${{ steps.scheduled.outputs.path }}" --generated-at "${{ steps.generated_at.outputs.value }}" --trial-id "${ADP_TRIAL_ID:-adp-trial-current}" --trial-ref "${ADP_TRIAL_REF:-}" --text-degradation-verified --text-artifacts-verified --text-artifact-ref "$text_ref" --scheduler-enabled --manual-rerun-verified --scheduler-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}" --real-smtp-verified --email-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/email" --resource-pressure-ok --resource-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/preflight" --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Export trial ledger state
        if: always() && needs.gate.outputs.mode == 'daily-run' && steps.trial_ledger.outputs.path != ''
        id: trial_export
        shell: bash
        run: |
          output="$RUNNER_TEMP/trial-evidence.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_export" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push export-trial-ledger-state --ledger-update "${{ steps.trial_ledger.outputs.path }}" --json > "$output" || true
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Upload trial ledger update
        if: always() && needs.gate.outputs.mode == 'daily-run' && steps.trial_ledger.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-ledger-update
          path: ${{ steps.trial_ledger.outputs.path }}
          if-no-files-found: error
      - name: Upload trial evidence ledger
        if: always() && needs.gate.outputs.mode == 'daily-run' && steps.trial_export.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-evidence-ledger
          path: ${{ steps.trial_export.outputs.path }}
          if-no-files-found: warn
