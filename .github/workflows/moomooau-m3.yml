name: MooMooAU protected M3 Budget-1 Canary

on:
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: Exact main commit to execute
        required: true
        type: string
      confirm_m3:
        description: Confirm one M3 source mutation after full remote recovery
        required: true
        type: choice
        options:
          - M3_BUDGET_ONE

permissions:
  contents: read

concurrency:
  group: moomooau-m3-budget-one-single-writer
  cancel-in-progress: false

jobs:
  m3-authority-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      beta_receipt_sha256: ${{ steps.m3-contract.outputs.beta_receipt_sha256 }}
      m3_gate_sha256: ${{ steps.m3-contract.outputs.m3_gate_sha256 }}
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Fail closed on invalid protected M3 dispatch context
        shell: bash
        env:
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          M3_CONFIRMATION: ${{ inputs.confirm_m3 }}
        run: |
          set -euo pipefail
          test "$GITHUB_ACTIONS" = "true"
          test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
          test "$GITHUB_REPOSITORY_ID" = "1300525906"
          test "$GITHUB_REPOSITORY_OWNER_ID" = "68840188"
          test "$GITHUB_ACTOR_ID" = "68840188"
          test "$GITHUB_RUN_ATTEMPT" = "1"
          test "$RUNNER_ENVIRONMENT" = "github-hosted"
          test "$GITHUB_REF" = "refs/heads/main"
          test "$GITHUB_WORKFLOW_REF" = \
            "LinzeColin/MetaDatabase/.github/workflows/moomooau-m3.yml@refs/heads/main"
          test "$EXPECTED_HEAD_SHA" = "$GITHUB_SHA"
          test "$M3_CONFIRMATION" = "M3_BUDGET_ONE"
          [[ "$EXPECTED_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]

      - name: Check out exact main tree without retained credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install hash-verified official age for the task oracle
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/age.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz
          echo "bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377  $archive" \
            | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/age" >> "$GITHUB_PATH"

      - name: Install cumulative immutable dependencies and package
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m pip install --require-hashes -r requirements/stage6.lock
          python -m pip install --no-build-isolation --no-deps .

      - name: Revalidate T0702 receipt and T0703 boundaries without protected inputs
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m ruff format --check \
            src/moomooau_archive/release_control.py \
            src/moomooau_archive/canary_runtime.py \
            src/moomooau_archive/protected_m3.py \
            src/moomooau_archive/protected_m3_entrypoint.py \
            tests/tasks/test_t0702.py \
            tests/tasks/test_t0703.py \
            machine/stages/S7/tools/validate_stage7.py
          python -m ruff check --no-cache \
            src/moomooau_archive/release_control.py \
            src/moomooau_archive/canary_runtime.py \
            src/moomooau_archive/protected_m3.py \
            src/moomooau_archive/protected_m3_entrypoint.py \
            tests/tasks/test_t0702.py \
            tests/tasks/test_t0703.py \
            machine/stages/S7/tools/validate_stage7.py
          python -m mypy --no-incremental --cache-dir "$RUNNER_TEMP/mypy-cache" \
            src/moomooau_archive/release_control.py \
            src/moomooau_archive/canary_runtime.py \
            src/moomooau_archive/protected_m3.py \
            src/moomooau_archive/protected_m3_entrypoint.py
          python -m pytest -q tests/tasks/test_t0702.py tests/tasks/test_t0703.py
          python machine/tools/validate_package.py
          python machine/tools/validate_delivery_status.py
          python machine/tools/validate_publication.py

      - name: Bind dispatch to T0702 PASS and explicit current M3 authority
        id: m3-contract
        working-directory: LinzeDatabase/MooMooAU
        shell: bash
        run: |
          set -euo pipefail
          contract="$RUNNER_TEMP/moomooau-m3-contract.json"
          python -m moomooau_archive.protected_m3_entrypoint \
            --contract-only --project-root "$PWD" > "$contract"
          python -c \
            'import json,sys; value=json.load(open(sys.argv[1], encoding="utf-8")); assert value["m3_authorized"] is True; output=open(sys.argv[2], "a", encoding="utf-8"); print("beta_receipt_sha256="+value["beta_receipt_sha256"], file=output); print("m3_gate_sha256="+value["m3_gate_sha256"], file=output)' \
            "$contract" "$GITHUB_OUTPUT"

  m3-budget-one:
    needs: m3-authority-gate
    environment: moomooau-beta
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Fail closed on non-cloud protected M3 runner
        shell: bash
        run: |
          set -euo pipefail
          test "$RUNNER_ENVIRONMENT" = "github-hosted"

      - name: Check out exact main tree without retained credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install hash-verified official age
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/age.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz
          echo "bdc69c09cbdd6cf8b1f333d372a1f58247b3a33146406333e30c0f26e8f51377  $archive" \
            | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/age" >> "$GITHUB_PATH"

      - name: Install cumulative immutable dependencies and package
        working-directory: LinzeDatabase/MooMooAU
        run: |
          python -m pip install --require-hashes -r requirements/stage6.lock
          python -m pip install --no-build-isolation --no-deps .

      - name: Execute exactly one protected M3 Budget-1 Canary
        working-directory: LinzeDatabase/MooMooAU
        env:
          MOOMOOAU_PROTECTED_ENVIRONMENT: moomooau-beta
          MOOMOOAU_BETA_CONFIG: ${{ secrets.MOOMOOAU_BETA_CONFIG }}
          MOOMOOAU_SENDER_REGISTRY: ${{ secrets.MOOMOOAU_SENDER_REGISTRY }}
          MOOMOOAU_CLASSIFICATION_REGISTRY: ${{ secrets.MOOMOOAU_CLASSIFICATION_REGISTRY }}
          MOOMOOAU_PARSER_REGISTRY: ${{ secrets.MOOMOOAU_PARSER_REGISTRY }}
          MOOMOOAU_GITHUB_APP_PRIVATE_KEY: ${{ secrets.MOOMOOAU_GITHUB_APP_PRIVATE_KEY }}
          MOOMOOAU_AGE_IDENTITY: ${{ secrets.MOOMOOAU_AGE_IDENTITY }}
          MOOMOOAU_OPAQUE_ID_KEY: ${{ secrets.MOOMOOAU_OPAQUE_ID_KEY }}
          MOOMOOAU_GMAIL_OAUTH: ${{ secrets.MOOMOOAU_GMAIL_OAUTH }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          BETA_RECEIPT_SHA256: ${{ needs.m3-authority-gate.outputs.beta_receipt_sha256 }}
          M3_GATE_SHA256: ${{ needs.m3-authority-gate.outputs.m3_gate_sha256 }}
          M3_CONFIRMATION: ${{ inputs.confirm_m3 }}
        run: >-
          python -m moomooau_archive.protected_m3_entrypoint
          --execute-protected
          --project-root "$PWD"
          --expected-head-sha "$EXPECTED_HEAD_SHA"
          --beta-receipt-sha256 "$BETA_RECEIPT_SHA256"
          --m3-gate-sha256 "$M3_GATE_SHA256"
          --confirm "$M3_CONFIRMATION"

      - name: Verify protected M3 identity plaintext was removed
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          if find /dev/shm -mindepth 1 -maxdepth 1 -type d \
            -name 'moomooau-protected-m3-*' -print -quit | grep -q .; then
            echo "::error::Protected M3 identity directory remains in tmpfs."
            exit 1
          fi
