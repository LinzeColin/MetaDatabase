name: arXiv Daily Push six-theme visual/motion gate

# WHY THIS EXISTS
# The Owner's six-theme UI/motion design language has been silently dropped by development rounds
# more than once, and the Owner has no second local copy of the source spec
# (arxiv-daily-push/docs/design/前端呈现基线_v1/). The machine contract that protects it (T077 freeze,
# P05 re-freeze) existed but NOTHING RAN IT: visual_regression_ci.py had no __main__ (bare runs exited
# 0 with zero output) and no workflow invoked it. This wires it in so that changing a theme/motion
# contract element without a recorded approval FAILS THE PUSH instead of relying on someone remembering.
#
# The gate is source-hash level (no screenshots). It also fails on partition/theme-set inconsistency,
# which catches an unregistered theme/ambience that would otherwise move only the aggregate hash and slip through.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/arxiv-daily-push-visual-gate.yml"
      - "arxiv-daily-push/deploy/cloudflare/worker_cloud.js"
      - "arxiv-daily-push/docs/pursuing_goal/v0_1/tools/visual_baseline.py"
      - "arxiv-daily-push/docs/pursuing_goal/v0_1/tools/visual_regression_ci.py"
      - "arxiv-daily-push/docs/pursuing_goal/v0_1/evidence/ADP-S7-P01-T077/visual_baseline_manifest.json"
      - "arxiv-daily-push/docs/pursuing_goal/v0_2/evidence/ADP-V02-P05-VISUAL-REFREEZE/visual_baseline_manifest.json"
      - "arxiv-daily-push/docs/design/visual_change_approvals.json"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/arxiv-daily-push-visual-gate.yml"
      - "arxiv-daily-push/deploy/cloudflare/worker_cloud.js"
      - "arxiv-daily-push/docs/pursuing_goal/v0_1/tools/visual_baseline.py"
      - "arxiv-daily-push/docs/pursuing_goal/v0_1/tools/visual_regression_ci.py"
      - "arxiv-daily-push/docs/pursuing_goal/v0_1/evidence/ADP-S7-P01-T077/visual_baseline_manifest.json"
      - "arxiv-daily-push/docs/pursuing_goal/v0_2/evidence/ADP-V02-P05-VISUAL-REFREEZE/visual_baseline_manifest.json"
      - "arxiv-daily-push/docs/design/visual_change_approvals.json"

permissions:
  contents: read

concurrency:
  group: arxiv-daily-push-visual-gate-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  visual-motion-gate:
    name: six-theme-visual-motion-contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Gate the six-theme visual/motion contract
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          gate="arxiv-daily-push/docs/pursuing_goal/v0_1/tools/visual_regression_ci.py"
          approvals="arxiv-daily-push/docs/design/visual_change_approvals.json"
          args=()
          # An APPROVED, intentional visual change must have a legitimate, auditable path -- otherwise the
          # only way to ship one is to delete this workflow, which defeats the point. Approvals are a
          # tracked file (element + reason + approver), reviewed like any other diff.
          if [ -f "$approvals" ]; then
            args+=(--approvals "$approvals")
            echo "using approvals file: $approvals"
          fi
          set +e
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp-pycache" \
            python3 -B "$gate" "${args[@]+"${args[@]}"}" | tee "$RUNNER_TEMP/visual-gate.txt"
          rc=${PIPESTATUS[0]}
          set -e
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp-pycache" \
            python3 -B "$gate" "${args[@]+"${args[@]}"}" --json > "$RUNNER_TEMP/visual-gate.json" 2>/dev/null || true
          {
            echo "## Six-theme visual/motion contract gate"
            echo ""
            echo '```'
            cat "$RUNNER_TEMP/visual-gate.txt"
            echo '```'
            if [ "$rc" -ne 0 ]; then
              echo ""
              echo "**BLOCKED.** A six-theme visual/motion contract element changed without a recorded approval,"
              echo "or an unregistered theme/ambience was introduced."
              echo ""
              echo "The design source of truth is \`arxiv-daily-push/docs/design/前端呈现基线_v1/\` (Owner-supplied;"
              echo "no second local copy exists). If this change is INTENTIONAL and approved, add an entry to"
              echo "\`arxiv-daily-push/docs/design/visual_change_approvals.json\` (element + reason + approver) and"
              echo "re-freeze the baseline via \`docs/pursuing_goal/v0_2/tools/visual_baseline_refreeze.py\`."
              echo ""
              echo "A change to the per-theme hashes is the Owner-signed six-theme identity itself and requires an"
              echo "Owner visual gate -- the re-freeze tool refuses to bless it automatically."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit "$rc"

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-visual-gate-report
          path: |
            ${{ runner.temp }}/visual-gate.txt
            ${{ runner.temp }}/visual-gate.json
          if-no-files-found: warn
