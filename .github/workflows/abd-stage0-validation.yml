name: ABD continuous validation

on:
  push:
    branches: [main, "codex/abd-**"]
    paths:
      - "ABD/**"
      - ".github/workflows/abd-stage0-validation.yml"
      - ".github/workflows/dual-plane.yml"
  pull_request:
    paths:
      - "ABD/**"
      - ".github/workflows/abd-stage0-validation.yml"
      - ".github/workflows/dual-plane.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: abd-stage0-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ABD
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"
          enable-cache: false
      - name: 安装冻结开发依赖
        run: uv sync --frozen --group dev
      - name: 验证人类平面可确定性重生
        run: |
          uv run --frozen --python 3.12 python machine/tools/render_human.py
          git diff --exit-code -- 文档
      - name: 验证 A$0 依赖与任务包合同
        run: |
          uv run --frozen --python 3.12 python machine/tools/scan_paid_dependencies.py
          uv run --frozen --python 3.12 python machine/tools/validate_pack.py
      - name: 运行 ABD 全回归
        run: uv run --frozen --python 3.12 python -m pytest -q
      - name: 验证已交付 Stage 0 的不可变收据
        run: >-
          uv run --frozen --python 3.12 python -m abd_acceptance
          --verify-existing STAGE-REVIEW-S00
      - name: 重建清单并验证全部 SHA-256
        run: |
          uv run --frozen --python 3.12 python machine/tools/update_artifact_manifest.py
          shasum -a 256 -c machine/evidence/SHA256SUMS
      - name: 验证工作流重放无仓库漂移
        run: git diff --exit-code
