name: arXiv Daily Push trial start Stage 1 text gate

on:
  workflow_dispatch:
    inputs:
      confirm_trial_start:
        description: "Set true only after PR CI is green and Stage 1 manual SMTP evidence is reviewed."
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      generated_at:
        description: "Optional ISO timestamp for deterministic evidence. Empty uses current UTC."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: arxiv-daily-push-trial-start-stage1-text
  cancel-in-progress: false

jobs:
  trial-start:
    if: inputs.confirm_trial_start == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      INPUT_GENERATED_AT: ${{ inputs.generated_at }}
      GH_TOKEN: ${{ github.token }}
      ADP_SMTP_HOST: ${{ secrets.ADP_SMTP_HOST }}
      ADP_SMTP_PORT: ${{ secrets.ADP_SMTP_PORT }}
      ADP_SMTP_USERNAME: ${{ secrets.ADP_SMTP_USERNAME }}
      ADP_SMTP_PASSWORD: ${{ secrets.ADP_SMTP_PASSWORD }}
      ADP_SCHEDULED_RUN_ENABLED: "true"
      ADP_ALLOW_SMTP_SEND: ${{ vars.ADP_ALLOW_SMTP_SEND }}
      ADP_ARXIV_MAX_RESULTS_PER_CATEGORY: ${{ vars.ADP_ARXIV_MAX_RESULTS_PER_CATEGORY }}
      ADP_ARXIV_POLITE_DELAY_SECONDS: ${{ vars.ADP_ARXIV_POLITE_DELAY_SECONDS }}
      ADP_CANDIDATE_QUEUE_INPUT_PATH: ${{ vars.ADP_CANDIDATE_QUEUE_INPUT_PATH }}
      ADP_RECENT_SOURCE_IDS: ${{ vars.ADP_RECENT_SOURCE_IDS }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Resolve generated_at
        id: generated_at
        shell: bash
        run: |
          if [ -n "$INPUT_GENERATED_AT" ]; then value="$INPUT_GENERATED_AT"; else value="$(date -u +%Y-%m-%dT%H:%M:%SZ)"; fi
          service_date="$(python3 - "$value" <<'PY'
          from __future__ import annotations

          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo
          import sys

          raw = sys.argv[1]
          text = raw[:-1] + "+00:00" if raw.endswith("Z") else raw
          dt = datetime.fromisoformat(text)
          if dt.tzinfo is None:
              dt = dt.replace(tzinfo=timezone.utc)
          print(dt.astimezone(ZoneInfo("Australia/Sydney")).date().isoformat())
          PY
          )"
          printf 'value=%s\n' "$value" >> "$GITHUB_OUTPUT"
          printf 'date=%s\n' "$service_date" >> "$GITHUB_OUTPUT"
      - name: Run production preflight
        id: preflight
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-trial-start-preflight.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_start_preflight" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push preflight-production --path . --generated-at "${{ steps.generated_at.outputs.value }}" --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Stop if preflight blocked
        if: steps.preflight.outcome != 'success'
        shell: bash
        run: exit 2
      - name: Upload trial start preflight
        if: always() && steps.preflight.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-preflight
          path: ${{ steps.preflight.outputs.path }}
          if-no-files-found: error
      - name: Build production refs input
        id: refs_input
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-production-refs-input.json"
          python3 - "$output" <<'PYREF'
          import json, sys
          json.dump({
            "runner": {"ready": True, "provider": "github-hosted", "label": "ubuntu-latest", "evidence_ref": "github-actions://runner/ubuntu-latest"},
            "smtp_secrets": {"ready": True, "secret_names": ["ADP_SMTP_HOST", "ADP_SMTP_PORT", "ADP_SMTP_USERNAME", "ADP_SMTP_PASSWORD"], "evidence_ref": "github-actions://secrets/smtp-names"},
            "workflow_vars": {"ready": True, "var_names": ["ADP_ALLOW_SMTP_SEND"], "evidence_ref": "github-actions://vars/stage1-text"},
          }, open(sys.argv[1], "w", encoding="utf-8"), ensure_ascii=False, indent=2, sort_keys=True)
          PYREF
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Run production refs plan
        id: production_refs
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-trial-start-production-refs.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_start_refs" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push plan-production-refs --readiness-input "${{ steps.refs_input.outputs.path }}" --generated-at "${{ steps.generated_at.outputs.value }}" --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Stop if production refs blocked
        if: steps.production_refs.outcome != 'success'
        shell: bash
        run: exit 2
      - name: Upload production refs
        if: always() && steps.production_refs.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-production-refs
          path: |
            ${{ steps.refs_input.outputs.path }}
            ${{ steps.production_refs.outputs.path }}
          if-no-files-found: error
      - name: Run launch readiness
        id: launch
        shell: bash
        run: |
          pr="$RUNNER_TEMP/adp-pr-info.json"; output="$RUNNER_TEMP/adp-trial-start-launch-readiness.json"
          python3 - "$pr" <<'PYPR'
          import json, sys
          json.dump({"state":"MERGED","merged":True,"draft":False,"base":"main","head_sha":"${{ github.sha }}"}, open(sys.argv[1], "w", encoding="utf-8"))
          PYPR
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_start_launch" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push plan-production-launch --path . --pr-info "$pr" --generated-at "${{ steps.generated_at.outputs.value }}" --expected-head-sha "${{ github.sha }}" --default-branch-ref "git://${{ github.repository }}@${{ github.sha }}" --production-refs-report "${{ steps.production_refs.outputs.path }}" --trial-start-workflow-ref "github-actions://${{ github.repository }}/.github/workflows/arxiv-daily-push-trial-start.yml@${{ github.sha }}" --confirm-launch --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Stop if launch readiness blocked
        if: steps.launch.outcome != 'success'
        shell: bash
        run: exit 2
      - name: Upload launch readiness
        if: always() && steps.launch.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-launch-readiness
          path: ${{ steps.launch.outputs.path }}
          if-no-files-found: error
      - name: Build bootstrap and scheduler plans
        id: plans
        shell: bash
        run: |
          bootstrap="$RUNNER_TEMP/adp-trial-start-bootstrap-plan.json"; scheduler="$RUNNER_TEMP/adp-trial-start-scheduler-plan.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_start_plans" PYTHONPATH=arxiv-daily-push/src python3 -m arxiv_daily_push plan-trial-bootstrap --path . --generated-at "${{ steps.generated_at.outputs.value }}" --json > "$bootstrap"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_start_plans" PYTHONPATH=arxiv-daily-push/src python3 -m arxiv_daily_push plan-production-scheduler --path . --generated-at "${{ steps.generated_at.outputs.value }}" --json > "$scheduler"
          printf 'bootstrap=%s\n' "$bootstrap" >> "$GITHUB_OUTPUT"; printf 'scheduler=%s\n' "$scheduler" >> "$GITHUB_OUTPUT"
      - name: Upload bootstrap plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-bootstrap-plan
          path: ${{ steps.plans.outputs.bootstrap }}
          if-no-files-found: error
      - name: Upload scheduler plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-scheduler-plan
          path: ${{ steps.plans.outputs.scheduler }}
          if-no-files-found: error
      - name: Build all-arXiv trial input
        id: source
        shell: bash
        run: |
          artifact_dir="$RUNNER_TEMP/adp-trial-start-phase12-artifacts"; report="$RUNNER_TEMP/adp-trial-start-all-arxiv-daily-input.json"; queue="$RUNNER_TEMP/adp-candidate-queue.json"; mkdir -p "$artifact_dir"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_start_source" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push build-all-arxiv-daily-input --date "${{ steps.generated_at.outputs.date }}" --generated-at "${{ steps.generated_at.outputs.value }}" --max-results-per-category "${ADP_ARXIV_MAX_RESULTS_PER_CATEGORY:-3}" --polite-delay-seconds "${ADP_ARXIV_POLITE_DELAY_SECONDS:-3}" --artifact-dir "$artifact_dir" --queue-output "$queue" --json > "$report"
          printf 'report=%s\n' "$report" >> "$GITHUB_OUTPUT"; printf 'artifact_dir=%s\n' "$artifact_dir" >> "$GITHUB_OUTPUT"; printf 'queue=%s\n' "$queue" >> "$GITHUB_OUTPUT"
      - name: Stop if source ingest blocked
        if: steps.source.outcome != 'success'
        shell: bash
        run: exit 2
      - name: Verify Stage 1 text artifacts
        shell: bash
        run: |
          test -s "${{ steps.source.outputs.artifact_dir }}/adp-text-delivery-policy.json"
          test -s "${{ steps.source.outputs.artifact_dir }}/adp-email-brief.json"
      - name: Upload all-arXiv trial input
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-all-arxiv-daily-input
          path: ${{ steps.source.outputs.report }}
          if-no-files-found: error
      - name: Upload trial start phase12 artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-phase12-artifacts
          path: ${{ steps.source.outputs.artifact_dir }}
          if-no-files-found: error
      - name: Upload trial start candidate queue
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-candidate-queue
          path: ${{ steps.source.outputs.queue }}
          if-no-files-found: error
      - name: Run SMTP delivery probe
        id: smtp
        shell: bash
        run: |
          execution="$RUNNER_TEMP/adp-trial-start-scheduled-execution.json"; smtp="$RUNNER_TEMP/adp-trial-start-smtp-delivery.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_start_smtp" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push run-scheduled-production --mode daily-run --generated-at "${{ steps.generated_at.outputs.value }}" --preflight-report "${{ steps.preflight.outputs.path }}" --daily-input "${{ steps.source.outputs.report }}" --json > "$execution"
          python3 -c 'import json,sys; r=json.load(open(sys.argv[1], encoding="utf-8")); json.dump(r.get("notification_report") or {}, open(sys.argv[2], "w", encoding="utf-8"), ensure_ascii=False, indent=2, sort_keys=True)' "$execution" "$smtp"
          printf 'execution=%s\n' "$execution" >> "$GITHUB_OUTPUT"; printf 'path=%s\n' "$smtp" >> "$GITHUB_OUTPUT"
      - name: Upload SMTP delivery probe
        if: always() && steps.smtp.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-smtp-delivery
          path: |
            ${{ steps.smtp.outputs.path }}
            ${{ steps.smtp.outputs.execution }}
          if-no-files-found: error
      - name: Build trial start gate
        id: trial_gate
        shell: bash
        run: |
          output="$RUNNER_TEMP/adp-trial-start-gate.json"
          PYTHONDONTWRITEBYTECODE=1 PYTHONPYCACHEPREFIX="$RUNNER_TEMP/adp_pycache_trial_start_gate" PYTHONPATH=arxiv-daily-push/src             python3 -m arxiv_daily_push plan-trial-start --preflight-report "${{ steps.preflight.outputs.path }}" --bootstrap-plan "${{ steps.plans.outputs.bootstrap }}" --scheduler-plan "${{ steps.plans.outputs.scheduler }}" --source-batch "${{ steps.source.outputs.report }}" --smtp-delivery "${{ steps.smtp.outputs.path }}" --generated-at "${{ steps.generated_at.outputs.value }}" --default-branch-ref "git://${{ github.repository }}@${{ github.sha }}" --runner-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/runner/ubuntu-latest" --preflight-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/preflight" --source-ingest-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/all-arxiv-stage1-text" --smtp-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/smtp" --scheduler-ref "github-actions://${{ github.repository }}/.github/workflows/arxiv-daily-push-scheduled.yml@${{ github.sha }}" --trial-state-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/trial-state-initial" --trial-start-ref "github-actions://${{ github.repository }}/actions/runs/${{ github.run_id }}/trial-start-gate" --confirm-start --json > "$output"
          printf 'path=%s\n' "$output" >> "$GITHUB_OUTPUT"
      - name: Upload trial start gate
        if: always() && steps.trial_gate.outputs.path != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: adp-trial-start-gate
          path: ${{ steps.trial_gate.outputs.path }}
          if-no-files-found: error
