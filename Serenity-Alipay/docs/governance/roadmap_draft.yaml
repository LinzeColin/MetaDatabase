          fact_level: VERIFIED
          evidence_refs: [Serenity-Alipay/docs/governance/evidence_index.yaml, governance/run_manifests/GOV-REVIEW9-S4PAT01-EVIDENCE-INDEX-20260623.json, PR-95, commit:f1a0b2b2e26fad6691c9b8d8d3da3d235de5c373, ci_run:28027304921]
