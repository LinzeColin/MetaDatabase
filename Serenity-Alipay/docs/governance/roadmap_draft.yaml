          evidence_refs: [Serenity-Alipay/docs/governance/roadmap_draft.yaml, Serenity-Alipay/docs/governance/development_events.jsonl, Serenity-Alipay/docs/governance/DEVELOPMENT_LEDGER.md]
    - phase_id: S4PB
      title: "Migration and generation"
      status: planned
      estimated_hours: 14
      stop_conditions:
        - "Focused tests fail"
        - "Generated files and canonical facts disagree"
      stop_gate:
        gate_id: S4PB-GATE
        pass_conditions:
          - "Target project validation passes"
          - "Three human files are byte-stable"
          - "Business tests do not regress"
        evidence: [validation_output, focused_test_output, diff_summary]
        fail_action: remain_in_phase
      tasks:
        - task_id: S4PBT01
          title: "Create project.yaml, roadmap.yaml, events.jsonl"
          status: planned
          estimated_hours: 6
          estimated_pct: 3.06
          depends_on: [S4PAT02, S4PAT03]
          acceptance_ids: [ACC-S4PBT01]
          fact_level: PROPOSED
        - task_id: S4PBT02
          title: "Generate three Chinese human entry files"
          status: planned
          estimated_hours: 4
          estimated_pct: 2.04
          depends_on: [S4PBT01]
          acceptance_ids: [ACC-S4PBT02]
          fact_level: PROPOSED
        - task_id: S4PBT03
          title: "Run focused tests, validate, and drift check"
          status: planned
          estimated_hours: 4
          estimated_pct: 2.04
          depends_on: [S4PBT02]
          acceptance_ids: [ACC-S4PBT03]
          fact_level: PROPOSED
    - phase_id: S4PC
      title: "Owner readability and cost acceptance"
      status: planned
      estimated_hours: 4
      stop_conditions:
        - "Owner cannot understand key model or next decision"
        - "Governance cost exceeds budget without approved exception"
      stop_gate:
        gate_id: S4PC-GATE
        pass_conditions:
          - "ROA checklist passes"
          - "Performance metrics meet target"
          - "Rollback path is executable"
        evidence: [owner_review, performance_report, rollback_test]
        fail_action: remain_in_phase
      tasks:
        - task_id: S4PCT01
          title: "Run two-minute Owner ROA review"
          status: planned
          estimated_hours: 2
          estimated_pct: 1.02
          depends_on: [S4PBT03]
          acceptance_ids: [ACC-S4PCT01]
          fact_level: PROPOSED
        - task_id: S4PCT02
          title: "Verify duration, token proxy, and rollback"
          status: planned
          estimated_hours: 2
          estimated_pct: 1.02
          depends_on: [S4PCT01]
          acceptance_ids: [ACC-S4PCT02]
          fact_level: PROPOSED
