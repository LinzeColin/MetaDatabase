        pass_conditions:
          - "All active models have formulas or exact pseudocode"
          - "Parameters have source and code references"
          - "Roadmap satisfies ID and Gate rules"
        evidence: [evidence_index, model_extraction, roadmap_draft]
        fail_action: remain_in_phase
      tasks:
