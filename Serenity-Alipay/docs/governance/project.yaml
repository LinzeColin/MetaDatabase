      - "EVID-SER-MODEL-EXTRACTION"
  -
    formula_id: "FORM-002"
    model_id: "MOD-003"
    description: "Extracted formula for MOD-003 from formula_registry.yaml."
    status: "active"
    fact_level: "EXTRACTED"
    expression: "Iterate daily closes, track running peak, compute drawdown = (peak.close - point.close) / peak.close. Max drawdown is the largest drawdown. Recovery time is days from worst trough until a later close >= worst peak, else days from trough to latest point. Recent drawdown uses last 7 points as (max_recent_close - latest_close) / max_recent_close."
    variables:
      -
        name: "peak"
        meaning: "PricePoint; daily close row; highest close observed so far"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "drawdown"
        meaning: "float; ratio; 0..unbounded by code, practically >=0"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "recovery_time_days"
        meaning: "int; days; 0..unbounded"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
    code_refs:
      - "Serenity-Alipay/app/core/metrics.py:52"
      - "Serenity-Alipay/app/core/metrics.py:79"
      - "Serenity-Alipay/app/core/metrics.py:90"
    test_refs:
      - "Serenity-Alipay/tests/test_scoring.py:70"
      - "Serenity-Alipay/tests/test_risk_gate_regression.py:8"
    evidence_refs:
      - "EVID-SER-FORMULA-REGISTRY"
      - "EVID-SER-MODEL-EXTRACTION"
  -
    formula_id: "FORM-003"
    model_id: "MOD-001"
    description: "Extracted formula for MOD-001 from formula_registry.yaml."
    status: "active"
    fact_level: "EXTRACTED"
    expression: "total_score = data_score + timeliness_score + source_score + return_score + risk_score + executable_score. data_score = max(0,25 - 8*missing_count). timeliness_score = 15 if max(missing_nav_days,missing_holding_days) <= 2 else 0. source_score = 15 if official_source_count >= 2 and no conflict, 7.5 if official_source_count >= 1 and no conflict, else 0. return_score = 15*(benchmark_wins/6). risk_score starts 0, becomes max(0,20 - 20*max_drawdown) when max_drawdown < 0.40, and is capped to min(risk_score,5) when recovery_time_days >= 365. executable_score = 10 unless rule missing or subscription/redemption/fee schedule fields are unavailable or closed."
    variables:
      -
        name: "missing_count"
        meaning: "int; fields; 0..unbounded"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "official_source_count"
        meaning: "int; sources; 0..unbounded"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "benchmark_wins"
        meaning: "int; wins; 0..6"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "max_drawdown"
        meaning: "float; ratio; 0..unbounded or None"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
    code_refs:
      - "Serenity-Alipay/app/core/scoring.py:81"
      - "Serenity-Alipay/app/core/scoring.py:105"
      - "Serenity-Alipay/app/core/scoring.py:141"
    test_refs:
      - "Serenity-Alipay/tests/test_scoring.py:70"
      - "Serenity-Alipay/tests/test_quality.py:15"
    evidence_refs:
      - "EVID-SER-FORMULA-REGISTRY"
      - "EVID-SER-MODEL-EXTRACTION"
  -
    formula_id: "FORM-004"
    model_id: "MOD-001"
    description: "Extracted formula for MOD-001 from formula_registry.yaml."
    status: "active"
    fact_level: "EXTRACTED"
    expression: "Grade decision table: if score >= 85 then Action-Ready; else if score >= 70 then Watch; else if score >= 55 then Manual Review; else Block."
    variables:
      -
        name: "score"
        meaning: "float; points; 0..100 nominal"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
    code_refs:
      - "Serenity-Alipay/app/core/scoring.py:44"
    test_refs:
      - "Serenity-Alipay/tests/test_scoring.py:70"
      - "Serenity-Alipay/tests/test_pipeline_serenity_priority.py:34"
    evidence_refs:
      - "EVID-SER-FORMULA-REGISTRY"
      - "EVID-SER-MODEL-EXTRACTION"
  -
    formula_id: "FORM-005"
    model_id: "MOD-001"
    description: "Extracted formula for MOD-001 from formula_registry.yaml."
    status: "active"
    fact_level: "EXTRACTED"
    expression: "Precise gate order: excluded or conservative -> Block/Block. max_drawdown >= 0.40 -> Block/Clear/manual_review. recovery_time_days >= 365 -> Block if return_score < 7.5 or any missing else Manual Review, action Manual Review. stale_days > 2 -> Manual Review. conflict_flag -> Manual Review. official_source_count < 2 -> cap Action-Ready to Watch and action Pause New. fallback_aggregated -> cap Action-Ready to Watch and action Pause New. executable_score == 0 -> cap Action-Ready to Watch and action Pause New. return_score == 0 -> Reduce. Action-Ready -> Increase. Watch -> Maintain."
    variables:
      -
        name: "max_drawdown"
        meaning: "float; ratio; 0..unbounded or None"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "recovery_time_days"
        meaning: "int; days; 0..unbounded or None"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "stale_days"
        meaning: "int; days; 0..unbounded"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "return_score"
        meaning: "float; points; 0..15"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
    code_refs:
      - "Serenity-Alipay/app/core/scoring.py:148"
    test_refs:
      - "Serenity-Alipay/tests/test_scoring.py:70"
      - "Serenity-Alipay/tests/test_risk_gate_regression.py:8"
    evidence_refs:
      - "EVID-SER-FORMULA-REGISTRY"
      - "EVID-SER-MODEL-EXTRACTION"
  -
    formula_id: "FORM-006"
    model_id: "MOD-001"
    description: "Extracted formula for MOD-001 from formula_registry.yaml."
    status: "active"
    fact_level: "EXTRACTED"
    expression: "benchmark_wins counts, for each window in 1m,3m,10d, one win if candidate return > Shanghai Composite return when Shanghai value exists, and one win if candidate return > S&P 500 return when S&P value exists. Equal values are not wins. Missing candidate return skips the window. return_score = 15 * benchmark_wins / 6."
    variables:
      -
        name: "candidate_return"
        meaning: "float; ratio; any float or None"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "benchmark_return"
        meaning: "float; ratio; any float or None"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "benchmark_wins"
        meaning: "int; wins; 0..6"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
