formulas:
  -
    formula_id: "FORM-001"
    model_id: "MOD-003"
    description: "Extracted formula for MOD-003 from formula_registry.yaml."
    status: "active"
    fact_level: "EXTRACTED"
    expression: "For window w, return_w = close_last / close_start(w) - 1.0. 1m uses latest date minus 31 calendar days, 3m uses latest date minus 93 calendar days, and 10d uses the point at len(points)-11. If the start point is missing or start close is 0, output None."
    variables:
      -
        name: "points"
        meaning: "list[PricePoint]; daily close rows; length >= 0 sorted by date"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "close_last"
        meaning: "float; price; latest close; nonzero not required"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
      -
        name: "close_start"
        meaning: "float; price; window start close; must be nonzero"
        source: "Serenity-Alipay/docs/governance/formula_registry.yaml"
    code_refs:
      - "Serenity-Alipay/app/core/metrics.py:21"
      - "Serenity-Alipay/app/core/metrics.py:31"
      - "Serenity-Alipay/app/core/metrics.py:39"
