model_fact_targets:
  source_status: existing_registry_reference
  active_model_ids:
    - MOD-001
    - MOD-002
    - MOD-003
    - MOD-004
    - MOD-005
  extraction_task_id: S4PAT02
roadmap_fact_targets:
  source_status: existing_governance_and_limited_history
  extraction_task_id: S4PAT03
contradiction_watchlist:
  - issue_id: S4PAT01-WATCH-FORM-008-CAP
    severity: must_preserve
    summary: "FORM-008 documents that final renormalization can raise weights above 0.30 in one-to-four-candidate cases; S4PAT02 must not present 0.30 as an unconditional invariant unless the code/test scope proves it."
    evidence_refs:
      - Serenity-Alipay/docs/governance/formula_registry.yaml
      - Serenity-Alipay/app/core/pipeline.py
      - Serenity-Alipay/tests/test_pipeline_serenity_priority.py
    followup_task_id: S4PAT02
non_scope:
  - no business code changes
  - no runtime configuration changes
  - no generated Chinese entry-file rewrite
  - no owner acceptance claim
  - no full model extraction claim
acceptance:
  status: READY_FOR_REVIEW
  acceptance_id: ACC-S4PAT01
  evidence_index_created: true
  read_scope_bounded: true
  stop_conditions_checked:
    code_doc_contradiction_unmarked: false
    tech_stack_written_as_model_parameter: false
    invented_iteration_or_hours: false
