schema_version: codexproject.evidence_index.v1
project_id: Serenity-Alipay
stage_id: S4
phase_id: S4PA
task_id: S4PAT01
acceptance_id: ACC-S4PAT01
purpose: "Bound the Serenity-Alipay pilot evidence read before any Lean v2 migration extraction. This index records which sources may be used, which facts remain deferred, and which contradictions must be preserved instead of smoothed over."
read_scope:
  mode: bounded_pilot_read
  allowed_categories:
    - README_and_handoff
    - existing_governance
    - model_implementation
    - runtime_config
    - focused_tests
    - limited_related_git_history
  excluded_categories:
    - unrelated_project_files
    - generated_output_archives
    - broad_git_history_mining
    - business_behavior_changes
fact_policy:
  verified_fact_requires:
    - implementation_ref
    - governance_or_test_ref
  reconstructed_fact_requires:
    - explicit_source_ref
    - uncertainty_or_source_limit_note
  unknown_fact_requires:
    - followup_task_id
    - owner_visible_caveat
  forbidden_claims:
    - no_template_empty_fill
    - no_fake_history
    - no_invented_iteration_or_hours
    - no_technology_stack_as_model_parameter
    - no_unqualified_formula_claim_when_watchlist_exists
evidence_refs:
  - evidence_id: EVID-SER-README-HANDOFF
    kind: owner_readable_context
    fact_level: EXTRACTED
    refs:
      - Serenity-Alipay/README.md
      - Serenity-Alipay/HANDOFF.md
    intended_use:
      - S4PAT02
      - S4PAT03
  - evidence_id: EVID-SER-EXISTING-GOVERNANCE
    kind: existing_governance_registry
    fact_level: EXTRACTED
