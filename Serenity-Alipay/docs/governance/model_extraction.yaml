    fact_level: EXTRACTED
    source_refs: [Serenity-Alipay/app/core/pipeline.py:220, Serenity-Alipay/app/core/discipline.py:15, Serenity-Alipay/app/config.py:35]
  - strategy_id: STRAT-SER-005
