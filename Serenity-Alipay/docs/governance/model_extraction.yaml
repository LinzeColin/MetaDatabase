  - strategy_id: STRAT-SER-002
    name: "Manual Serenity priority precedes score tie-breaks"
    fact_level: EXTRACTED
    source_refs: [Serenity-Alipay/app/core/pipeline.py:182, Serenity-Alipay/app/core/pipeline.py:191, Serenity-Alipay/tests/test_pipeline_serenity_priority.py:62]
  - strategy_id: STRAT-SER-003
    name: "Score only applies bounded confidence"
    fact_level: EXTRACTED
    source_refs: [Serenity-Alipay/app/core/pipeline.py:186, Serenity-Alipay/app/core/scoring.py:105, Serenity-Alipay/docs/governance/formula_registry.yaml]
  - strategy_id: STRAT-SER-004
