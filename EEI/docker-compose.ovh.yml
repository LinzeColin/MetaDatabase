# EEI data-collection + dynamic-refresh — HARD resource-capped deployment.
#
# Intended as a SEPARATE Coolify project. It never references, links to, or
# shares a network/volume with any Alpha / trading / Keycloak / Coolify service.
#
# SAFETY MODEL (see infra/ovh/RESOURCE_SAFETY_ANALYSIS.md):
#   * every service has a hard mem_limit AND memswap_limit == mem_limit, which
#     sets the container's swap ceiling to ZERO. If a service exceeds its cap it
#     is cgroup-OOM-killed (contained + restarted) instead of swapping and
#     dragging the co-tenant live-trading box into disk thrash.
#   * cpus caps keep EEI from starving the 2 vCPU box.
#   * oom_score_adj is positive so that, in the unlikely event of box-wide
#     pressure, the kernel prefers to kill EEI processes over the trading stack.
#
# Total hard cap: 320M (db) + 320M (refresh) = 640M, non-swappable.
# (The refresh cap can be this small because the publish leg is STREAMING:
# chunked statement batches over HTTPS to the worker's authenticated publish
# channel - no Node/wrangler, no full-surface materialisation, flat RSS.)
#
# Override every value marked ${...} via Coolify env / a .env.ovh file. Do NOT
# commit real secrets.

services:
  eei-db:
    image: postgres:16-alpine
    container_name: eei-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EEI_DB_NAME:-eei}
      POSTGRES_USER: ${EEI_DB_USER:-eei}
      POSTGRES_PASSWORD: ${EEI_DB_PASSWORD:?set EEI_DB_PASSWORD}
      # Deterministic small memory footprint under the 320M cap.
      POSTGRES_INITDB_ARGS: "--data-checksums"
    # Tiny-instance tuning passed as -c overrides (no fragile file mount).
    command:
      - postgres
      - -c
      - shared_buffers=96MB
      - -c
      - effective_cache_size=160MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=20
      - -c
      - wal_buffers=4MB
      - -c
      - min_wal_size=80MB
      - -c
      - max_wal_size=512MB
      - -c
      - huge_pages=off
      - -c
      - synchronous_commit=on
    volumes:
      - eei-db-data:/var/lib/postgresql/data
    # ---- HARD CAPS ----
    mem_limit: 320m
    memswap_limit: 320m        # == mem_limit => container swap ceiling = 0
    mem_reservation: 160m
    cpus: 0.75
    pids_limit: 200
    oom_score_adj: 500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EEI_DB_USER:-eei} -d ${EEI_DB_NAME:-eei}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  eei-refresh:
    build:
      context: .
      dockerfile: infra/docker/refresh.Dockerfile
    image: eei-refresh:ovh
    container_name: eei-refresh
    restart: unless-stopped
    depends_on:
      eei-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${EEI_DB_USER:-eei}:${EEI_DB_PASSWORD:?set EEI_DB_PASSWORD}@eei-db:5432/${EEI_DB_NAME:-eei}
      # SEC fair-access identity (must contain a contact email). Fails closed if unset.
      SEC_USER_AGENT: ${SEC_USER_AGENT:?set SEC_USER_AGENT}
      # Publish (--apply) leg -> the public worker's authenticated internal
      # channel. A narrow publish token only - NEVER an account-level
      # Cloudflare credential on this shared box.
      EEI_PUBLISH_URL: ${EEI_PUBLISH_URL:-https://eei.linzezhang.com/v1/internal/publish/exec}
      EEI_PUBLISH_TOKEN: ${EEI_PUBLISH_TOKEN:?set EEI_PUBLISH_TOKEN}
      # Never let a first publish wipe live D1 (entrypoint guard).
      EEI_ABORT_IF_EMPTY_UNIVERSE: ${EEI_ABORT_IF_EMPTY_UNIVERSE:-1}
    # Enrich+GLEIF sweep runs every interval (default hourly) to backfill/
    # deepen the local system-of-record; the full DELETE+INSERT republish runs
    # only every Nth cycle (default 24 => daily) to keep D1 writes in the free
    # tier. Minute-cadence freshness is owned by eei-watch below.
    command:
      - python
      - -m
      - scripts.authoritative.refresh_cycle
      - --loop
      - --interval-seconds
      - "${EEI_REFRESH_INTERVAL_SECONDS:-3600}"
      - --publish-every
      - "${EEI_PUBLISH_EVERY:-24}"
      - --enrich-batch
      - "${EEI_ENRICH_BATCH:-500}"
      - --gleif-batch
      - "${EEI_GLEIF_BATCH:-300}"
    volumes:
      - eei-refresh-state:/state
    # ---- HARD CAPS ----
    mem_limit: 320m
    memswap_limit: 320m        # == mem_limit => container swap ceiling = 0
    mem_reservation: 128m
    cpus: 1.0
    pids_limit: 256
    oom_score_adj: 500

  # Near-real-time freshness: poll SEC's global "latest filings" firehose every
  # minute, enrich only in-universe companies with a genuinely new material
  # filing, and INCREMENTALLY upsert just those rows to live D1 (a few writes
  # per filing — never a full republish). Fair-access safe (~1 cheap feed
  # request/min + at most one submissions request per newly-filed company).
  eei-watch:
    image: eei-refresh:ovh
    container_name: eei-watch
    restart: unless-stopped
    depends_on:
      eei-db:
        condition: service_healthy
      eei-refresh:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://${EEI_DB_USER:-eei}:${EEI_DB_PASSWORD:?set EEI_DB_PASSWORD}@eei-db:5432/${EEI_DB_NAME:-eei}
      SEC_USER_AGENT: ${SEC_USER_AGENT:?set SEC_USER_AGENT}
      EEI_PUBLISH_URL: ${EEI_PUBLISH_URL:-https://eei.linzezhang.com/v1/internal/publish/exec}
      EEI_PUBLISH_TOKEN: ${EEI_PUBLISH_TOKEN:?set EEI_PUBLISH_TOKEN}
      EEI_ABORT_IF_EMPTY_UNIVERSE: ${EEI_ABORT_IF_EMPTY_UNIVERSE:-1}
      # The refresh service owns migrations; the watcher must not race them.
      EEI_SKIP_MIGRATE: "1"
      EEI_WATCH_STATE: /state/.eei_watch_state.json
      EEI_WATCH_RUN_LOG: /state/.eei_watch_runs.jsonl
    command:
      - python
      - -m
      - scripts.authoritative.watch_recent_filings
      - --loop
      - --interval-seconds
      - "${EEI_WATCH_INTERVAL_SECONDS:-60}"
    volumes:
      - eei-watch-state:/state
    # ---- HARD CAPS (tiny: one feed request + one company enrich + a small
    #      incremental push per poll) ----
    mem_limit: 256m
    memswap_limit: 256m        # == mem_limit => container swap ceiling = 0
    mem_reservation: 96m
    cpus: 0.5
    pids_limit: 128
    oom_score_adj: 500
    healthcheck:
      test: ["CMD-SHELL", "test -f /state/.eei_watch_runs.jsonl || exit 1"]
      interval: 5m
      timeout: 10s
      start_period: 3m
      retries: 3

volumes:
  eei-db-data:
  eei-refresh-state:
  eei-watch-state:
