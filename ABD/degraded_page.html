<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'">
  <meta name="referrer" content="no-referrer">
  <title>ABD 服务暂不可用</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; color: #f9fafb; }
    main { width: min(42rem, calc(100% - 2rem)); padding: 2rem; border: 2px solid #fbbf24; border-radius: 1rem; background: #1f2937; }
    h1 { margin-top: 0; color: #fde68a; }
    .stop { font-weight: 800; font-size: 1.25rem; }
    p { line-height: 1.65; }
  </style>
</head>
<body>
  <main aria-labelledby="status-title">
    <h1 id="status-title">服务暂不可用</h1>
    <p class="stop">停止新建议。不要使用任何旧建议下单。</p>
    <p>当前入口或核心服务无法完成验证，所有先前建议立即失效。</p>
    <p><strong>下一步：</strong>稍后重新打开。只有系统重新显示一张新鲜、完整且通过全部证据、数值、风险与安全门的建议卡时，才由你自行完成最终下单。</p>
    <p>月度 30% 是追求、证伪和验证的目标，不是随机收益保证。</p>
    <p>普通全球网络上的中文页面不代表中国大陆境内加速、可用性或可达性保证。</p>
  </main>
</body>
</html>
