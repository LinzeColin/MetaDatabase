<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PFI v0.2.3 Stage 2 Review</title>
    <style>
      body {
        margin: 0;
        background: #f6f7f4;
        color: #17201c;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        letter-spacing: 0;
      }

      main {
        width: min(1180px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 42px 0;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 30px;
        line-height: 1.2;
      }

      .review-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .review-block {
        border: 1px solid #d8ded8;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
      }

      .review-block > h2 {
        margin: 0 0 18px;
        font-size: 20px;
      }

      .pfi-data-gate {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 18px;
      }

      .pfi-data-gate__header,
      .pfi-data-gate__metrics,
      .pfi-data-gate__checks,
      .pfi-data-gate__errors {
        border: 1px solid #d8ded8;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
      }

      .pfi-data-gate__header {
        grid-column: 1 / -1;
      }

      .pfi-data-gate__eyebrow {
        margin: 0 0 8px;
        color: #0f766e;
        font-size: 13px;
        font-weight: 700;
      }

      .pfi-data-gate__header h2,
      .pfi-data-gate__checks h3,
      .pfi-data-gate__errors h3,
      .pfi-data-gate__header p {
        margin: 0;
      }

      .pfi-data-gate__header h2 {
        font-size: 28px;
      }

      .pfi-data-gate__header p:last-child {
        margin-top: 8px;
        color: #5b6862;
      }

      .pfi-data-gate__metrics,
      .pfi-data-gate__checks,
      .pfi-data-gate__errors {
        display: grid;
        gap: 12px;
      }

      .pfi-data-gate__metric,
      .pfi-data-gate__error {
        border: 1px solid #d8ded8;
        border-radius: 8px;
        padding: 14px 16px;
      }

      .pfi-data-gate__metric {
        background: #eef5f2;
      }

      .pfi-data-gate__metric-label,
      .pfi-data-gate__metric-meta {
        color: #5b6862;
        font-size: 13px;
        font-weight: 700;
      }

      .pfi-data-gate__metric-value {
        margin-top: 8px;
        font-size: 22px;
        font-weight: 760;
        line-height: 1.25;
      }

      .pfi-data-gate__metric-meta {
        margin-top: 8px;
        color: #0f766e;
      }

      .pfi-data-gate__check {
        display: flex;
        min-height: 34px;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid #d8ded8;
        color: #5b6862;
        font-size: 14px;
      }

      .pfi-data-gate__check:last-child {
        border-bottom: 0;
      }

      .pfi-data-gate__check strong {
        color: #17201c;
      }

      .pfi-data-gate__errors {
        grid-column: 1 / -1;
      }

      .pfi-data-gate__error {
        display: grid;
        grid-template-columns: 120px 1fr 180px;
        gap: 14px;
        align-items: center;
      }

      .pfi-data-gate__error strong {
        color: #a33a2b;
      }

      .pfi-data-gate__error span {
        color: #5b6862;
      }

      .pfi-data-gate__error em {
        color: #0f766e;
        font-style: normal;
        font-weight: 700;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PFI v0.2.3 Stage 2 Review</h1>
      <div class="review-grid">
        <section class="review-block">

  </body>
</html>
