<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>过期状态</title><style>
:root{--bg:#f6f7f8;--surface:#fff;--ink:#17202a;--muted:#5d6975;--border:#d9e0e6;--blue:#215f9a;--amber:#b7791f;--red:#b42318;--teal:#0f766e;--radius:8px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{margin:0;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;letter-spacing:0}main{max-width:1080px;margin:0 auto;padding:32px}header{display:flex;justify-content:space-between;gap:18px;margin-bottom:18px;align-items:end}h1{margin:0 0 8px;font-size:28px;line-height:1.15}p{margin:0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.state-card,.summary{border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);padding:18px}.state-card span{display:inline-block;margin-bottom:8px;color:var(--blue);font-weight:760}.state-card h2{margin:0 0 8px;font-size:20px}.state-card dl{display:grid;gap:10px;margin:16px 0 0}.state-card div{border-top:1px solid var(--border);padding-top:9px}.state-card dt{color:var(--muted);font-size:12px}.state-card dd{margin:2px 0 0;font-weight:650}.summary{display:grid;gap:8px;margin-bottom:12px}.summary strong{font-size:20px}.pill{display:inline-flex;min-height:32px;align-items:center;padding:0 10px;border:1px solid var(--border);border-radius:999px;background:#eef2f4;color:var(--ink);font-weight:650}@media(max-width:760px){main{padding:18px}.grid,header{grid-template-columns:1fr;display:grid}}
</style></head><body><main><header><div><h1>过期状态</h1><p>outdated 必须显示快照日期</p></div><span class="pill">Stage 8 Phase 8.3</span></header><section class="summary"><strong>过期状态截图</strong><p>过期状态必须显示快照日期，只允许只读复核旧快照。</p></section><section class="grid"><article class="state-card">
      <span>outdated</span>
      <h2>过期状态：显示快照日期</h2>
      <p>使用旧快照，请查看快照日期：2026-06-03。</p>
      <dl>
        <div><dt>reason</dt><dd>快照已过期，必须显示快照日期。</dd></div>
        <div><dt>detail</dt><dd>快照日期：2026-06-03；当前只允许复核旧快照，不输出新财务结论。</dd></div>
        <div><dt>action</dt><dd>刷新数据源或确认旧快照仅用于只读复核。</dd></div>
      </dl>
    </article></section></main></body></html>
