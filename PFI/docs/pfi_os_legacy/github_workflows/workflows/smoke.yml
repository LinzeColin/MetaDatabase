name: PFI_OS Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install locked package and test dependencies
        run: |
          python -m pip install -r requirements.lock
          python -m pip install --no-deps -e .
      - name: Secret scan
        run: ./scripts/secretScan.sh
      - name: Compile source
        run: python -m compileall -q src
      - name: Run workspace smoke tests
        env:
          PFI_OS_ALLOW_HEAVY_SMOKE: "1"
          PYTHONPATH: src
        run: ./scripts/ciSmoke.sh
