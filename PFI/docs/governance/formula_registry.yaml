governance_spec_version: "1.0.0"
project_id: "PFI"
formulas:
  - formula_id: "FORM-PFI-001"
    model_id: "MOD-PFI-001"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "PFI scope = Stage 1 IA + Stage 2 source contracts + Stage 3 readable MVP + Stage 4 analysis MVP + Stage 5 advice/report/context export MVP + Stage 6 E2E stabilization and rollback gate - forbidden real-money execution actions."
    variables:
      - name: "stage1_entries"
        data_type: "integer"
        unit: "first-level entries"
        input_domain: "8"
      - name: "source_contracts"
        data_type: "integer"
        unit: "registered source ids"
        input_domain: "8"
      - name: "stage3_account_sources"
        data_type: "integer"
        unit: "account-map sources"
        input_domain: "7"
      - name: "stage3_status_language"
        data_type: "integer"
        unit: "owner status labels"
        input_domain: "5"
      - name: "stage4_attribution_components"
        data_type: "integer"
        unit: "components"
        input_domain: "5"
      - name: "stage4_cashflow_horizons"
        data_type: "integer"
        unit: "horizons"
        input_domain: "3"
      - name: "stage5_recommendations"
        data_type: "integer"
        unit: "recommendations"
        input_domain: "8"
      - name: "stage5_export_formats"
        data_type: "integer"
        unit: "formats"
        input_domain: "3"
      - name: "stage5_context_schema"
        data_type: "string"
        unit: "schema"
        input_domain: "pfi_context_snapshot_v1"
      - name: "stage6_total_gate_count"
        data_type: "integer"
        unit: "gates"
        input_domain: "20"
      - name: "stage6_e2e_core_sources"
        data_type: "integer"
        unit: "core sources"
        input_domain: "7"
      - name: "stage6_e2e_loops"
        data_type: "integer"
        unit: "loops"
        input_domain: "4"
      - name: "stage6_regression_gates"
        data_type: "integer"
        unit: "regression gates"
        input_domain: "4"
      - name: "stage6_rollback_steps"
        data_type: "integer"
        unit: "rollback steps"
        input_domain: "8"
      - name: "execution_mode"
        data_type: "string"
        unit: "policy"
        input_domain: "local-first and review-first"
    constraints:
      - "No automatic real-money trading."
      - "No trading password."
      - "No broker-order or payment submission."
      - "Stage 3 sync-all plan must not execute external account actions."
      - "Stage 4 analysis must not output precise conclusions when evidence is insufficient."
      - "Stage 4 consumption analysis must exclude transfers and investment events from living consumption."
      - "Stage 5 recommendations must include evidence, expected effect, tradeoff, action, and owner decision."
      - "Stage 5 reports must be reproducible and evidence-linked."
      - "Stage 5 Alpha context export must be read-only and must not modify Alpha repository."
      - "Stage 5 Alpha context must keep trading_password_available=false and live_trade_submission_authorized=false."
      - "Stage 6 E2E stabilization must keep all 20 total gates and ACC-* audit checks PASS before closeout."
      - "Stage 6 synthetic E2E must not be written as production connectivity or release-ready evidence."
      - "Stage 6 rollback plan must not move QBVS runtime or require private data migration."
    missing_policy: "If production evidence is missing, status remains not production ready."
    output_range: "Owner status is partial governance verified, not production ready."
    code_refs:
      - "PFI/src/pfi_v02/stage1_ia.py"
      - "PFI/src/pfi_v02/stage2_registry.py"
      - "PFI/src/pfi_v02/stage2_contracts.py"
      - "PFI/src/pfi_v02/stage3_read_mvp.py"
      - "PFI/src/pfi_v02/stage4_analysis_mvp.py"
      - "PFI/src/pfi_v02/stage5_advice_report_alpha.py"
      - "PFI/src/pfi_v02/stage6_e2e_stabilization.py"
    test_refs:
      - "PFI/tests/test_stage1_ia_contract.py"
      - "PFI/tests/test_stage2_data_source_registry.py"
      - "PFI/tests/test_stage3_readable_mvp.py"
      - "PFI/tests/test_stage4_analysis_mvp.py"
      - "PFI/tests/test_stage5_advice_report_alpha.py"
      - "PFI/tests/test_stage6_e2e_stabilization.py"
    evidence_refs:
      - "PFI/README.md"
