governance_spec_version: "1.0.0"
project_id: "PFI"
formulas:
  - formula_id: "FORM-PFI-001"
    model_id: "MOD-PFI-001"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "PFI scope = Stage 1 IA + Stage 2 source contracts + Stage 3 readable MVP + Stage 4 analysis MVP + Stage 5 advice/report/context export MVP + Stage 6 E2E stabilization and rollback gate - forbidden real-money execution actions."
    variables:
      - name: "stage1_entries"
        data_type: "integer"
        unit: "first-level entries"
        input_domain: "8"
      - name: "source_contracts"
        data_type: "integer"
        unit: "registered source ids"
        input_domain: "8"
      - name: "stage3_account_sources"
        data_type: "integer"
        unit: "account-map sources"
        input_domain: "7"
      - name: "stage3_status_language"
        data_type: "integer"
        unit: "owner status labels"
        input_domain: "5"
      - name: "stage4_attribution_components"
        data_type: "integer"
        unit: "components"
        input_domain: "5"
      - name: "stage4_cashflow_horizons"
        data_type: "integer"
        unit: "horizons"
        input_domain: "3"
      - name: "stage5_recommendations"
        data_type: "integer"
        unit: "recommendations"
        input_domain: "8"
      - name: "stage5_export_formats"
        data_type: "integer"
        unit: "formats"
        input_domain: "3"
      - name: "stage5_context_schema"
        data_type: "string"
        unit: "schema"
        input_domain: "pfi_context_snapshot_v1"
      - name: "stage6_total_gate_count"
        data_type: "integer"
        unit: "gates"
        input_domain: "20"
      - name: "stage6_e2e_core_sources"
        data_type: "integer"
        unit: "core sources"
        input_domain: "7"
      - name: "stage6_e2e_loops"
        data_type: "integer"
        unit: "loops"
        input_domain: "4"
      - name: "stage6_regression_gates"
        data_type: "integer"
        unit: "regression gates"
        input_domain: "4"
      - name: "stage6_rollback_steps"
        data_type: "integer"
        unit: "rollback steps"
        input_domain: "8"
      - name: "execution_mode"
        data_type: "string"
        unit: "policy"
        input_domain: "local-first and review-first"
    constraints:
      - "No automatic real-money trading."
      - "No trading password."
      - "No broker-order or payment submission."
      - "Stage 3 sync-all plan must not execute external account actions."
      - "Stage 4 analysis must not output precise conclusions when evidence is insufficient."
      - "Stage 4 consumption analysis must exclude transfers and investment events from living consumption."
      - "Stage 5 recommendations must include evidence, expected effect, tradeoff, action, and owner decision."
      - "Stage 5 reports must be reproducible and evidence-linked."
      - "Stage 5 Alpha context export must be read-only and must not modify Alpha repository."
      - "Stage 5 Alpha context must keep trading_password_available=false and live_trade_submission_authorized=false."
      - "Stage 6 E2E stabilization must keep all 20 total gates and ACC-* audit checks PASS before closeout."
      - "Stage 6 synthetic E2E must not be written as production connectivity or release-ready evidence."
      - "Stage 6 rollback plan must not move QBVS runtime or require private data migration."
      - "Stage 8 Phase 8.2 motion, feedback, haptics and durable-job UI must not alter any financial formula or publish synthetic progress as a financial value."
      - "Stage 8 Phase 8.3 accessibility, contrast, keyboard, AX and visual-regression work must not alter any financial formula, model output or parameter value."
    missing_policy: "If production evidence is missing, status remains not production ready."
    output_range: "Owner status is partial governance verified, not production ready."
    code_refs:
      - "PFI/src/pfi_v02/stage1_ia.py"
      - "PFI/src/pfi_v02/stage2_registry.py"
      - "PFI/src/pfi_v02/stage2_contracts.py"
      - "PFI/src/pfi_v02/stage3_read_mvp.py"
      - "PFI/src/pfi_v02/stage4_analysis_mvp.py"
      - "PFI/src/pfi_v02/stage5_advice_report_alpha.py"
      - "PFI/src/pfi_v02/stage6_e2e_stabilization.py"
    test_refs:
      - "PFI/tests/test_stage1_ia_contract.py"
      - "PFI/tests/test_stage2_data_source_registry.py"
      - "PFI/tests/test_stage3_readable_mvp.py"
      - "PFI/tests/test_stage4_analysis_mvp.py"
      - "PFI/tests/test_stage5_advice_report_alpha.py"
      - "PFI/tests/test_stage6_e2e_stabilization.py"
    evidence_refs:
      - "PFI/README.md"
      - "PFI/reports/pfi_v025/stage_8/phase_8_2/evidence.json"
      - "PFI/reports/pfi_v025/stage_8/phase_8_3/evidence.json"
  - formula_id: "FORM-PFI-002"
    model_id: "MOD-PFI-002"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "effective_business_date = previous_open_date(local_date - I(local_time < 06:00:00), explicit_source_closed_dates)"
    variables:
      - name: "local_date"
        data_type: "date"
        unit: "Australia/Sydney calendar date"
        input_domain: "valid timezone-aware observation"
      - name: "local_time"
        data_type: "time"
        unit: "Australia/Sydney local time"
        input_domain: "00:00:00 through 23:59:59"
      - name: "explicit_source_closed_dates"
        data_type: "date set"
        unit: "source-declared closed dates"
        input_domain: "zero or more ISO dates"
    constraints:
      - "Before 06:00 local time, start from the prior local calendar date."
      - "Saturday, Sunday, and explicit source-closed dates roll backward to the prior open date."
      - "Naive timestamps, invalid cutoffs, missing source metadata, pair-direction mismatch, and future snapshots fail closed."
      - "Ordinary runtime performs no network refresh."
    missing_policy: "If the production snapshot is absent or incomplete, rate remains null and status is blocked/not_loaded."
    output_range: "ISO local business date plus current, stale, or blocked snapshot classification."
    code_refs:
      - "PFI/src/pfi_v02/stage_v025_fx_policy.py"
    test_refs:
      - "PFI/tests/test_v025_stage2_fx_policy.py"
      - "PFI/tests/test_v025_stage2_temporal_truth.py"
    evidence_refs:
      - "PFI/docs/pfi_v025/stage_2/temporal_truth.md"
      - "PFI/reports/pfi_v025/stage_2/phase_2_2/evidence.json"
  - formula_id: "FORM-PFI-003"
    model_id: "MOD-PFI-003"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    task_ids:
      - "S3-P1-T4"
    expression: "role_decision = publishable iff proposed_role is in explicit role_registry; otherwise review_required and publish_allowed = false"
    variables:
      - name: "proposed_role"
        data_type: "namespaced string"
        unit: "account role"
        input_domain: "lowercase namespaced token"
      - name: "role_registry"
        data_type: "unique string set"
        unit: "publishable roles"
        input_domain: "explicit configuration only"
      - name: "effective_range"
        data_type: "inclusive date range"
        unit: "calendar date"
        input_domain: "effective_from through optional effective_to"
    constraints:
      - "Source names, labels, providers and filenames cannot select a role."
      - "One account_ref may have multiple roles with overlapping effective ranges."
      - "Unknown roles create an open review item and cannot publish."
      - "SourceProfile requires parser id, parser version and sha256 source hash."
    missing_policy: "Missing or unregistered role is review_required; no default role is inferred."
    output_range: "publishable AccountRoleAssignment or non-publishable RoleReviewItem."
    code_refs:
      - "PFI/src/pfi_os/domain/source_accounts.py"
      - "PFI/src/pfi_os/application/source_account_roles.py"
    test_refs:
      - "PFI/tests/test_v025_stage3_source_profiles.py"
    evidence_refs:
      - "PFI/docs/pfi_v025/stage_3/PHASE_3_1_SOURCE_ACCOUNT_IMPLEMENTATION_PLAN.md"
      - "PFI/reports/pfi_v025/stage_3/phase_3_1/evidence.json"
  - formula_id: "FORM-PFI-004"
    model_id: "MOD-PFI-004"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    task_ids:
      - "S3-P2-T1"
      - "S3-P2-T2"
      - "S3-P2-T3"
    expression: "normalized_id = SHA256(source_id || raw_record_id || source_record_hash || normalization_version)[0:20]; group_id = SHA256(rule_id || rule_hash || sorted(normalized_ids))[0:20]; economic_event_id = SHA256(group_id || event_type || policy_version || policy_hash)[0:20]"
    variables:
      - name: "source_record_identity"
        data_type: "provenance tuple"
        unit: "record identity"
        input_domain: "explicit source_id, raw_record_id and sha256 source_record_hash"
      - name: "group_members"
        data_type: "unique sorted token tuple"
        unit: "normalized transaction ids"
        input_domain: "exact explicit link-reference group or singleton"
      - name: "event_policy"
        data_type: "versioned deterministic policy"
        unit: "event-type impact flags"
        input_domain: "registered event types only"
    constraints:
      - "Amount is a positive canonical decimal string with at most six places; currency is uppercase three-letter and direction is explicit."
      - "Grouping cannot use amount equality, time proximity, source name, provider label or filename."
      - "Unknown event types require review and cannot publish."
      - "Event time is the earliest explicit transaction_time in the group."
    missing_policy: "Missing mandatory fields or unregistered event type fails closed; no inferred default is published."
    output_range: "Stable normalized, group and economic-event identifiers plus explicit impact flags."
    code_refs:
      - "PFI/src/pfi_os/domain/economic_events.py"
      - "PFI/src/pfi_os/application/economic_event_pipeline.py"
    test_refs:
      - "PFI/tests/test_v025_stage3_interconnection.py"
    evidence_refs:
      - "PFI/reports/pfi_v025/stage_3/phase_3_2/event_type_matrix.json"
      - "PFI/reports/pfi_v025/stage_3/phase_3_2/evidence.json"
  - formula_id: "FORM-PFI-005"
    model_id: "MOD-PFI-004"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    task_ids:
      - "S3-P2-T4"
    expression: "ledger_idempotency_key = SHA256(canonical_json(economic_event_id, group_id, sorted(raw_ids), sorted(normalized_ids), event_type, occurred_at, policy_version, policy_hash, impact_flags, sorted(postings)))"
    variables:
      - name: "ledger_lineage"
        data_type: "ordered canonical object"
        unit: "event identity"
        input_domain: "complete raw, normalized, group and economic-event lineage"
      - name: "postings"
        data_type: "normalized posting tuple"
        unit: "per-record amount, currency and direction"
        input_domain: "one posting per normalized transaction"
    constraints:
      - "Canonical JSON uses UTF-8, sorted keys and deterministic posting order."
      - "Every normalized transaction is represented exactly once in postings."
      - "Amounts from different postings or currencies are not aggregated without an FX policy."
      - "This Phase proves key determinism only; persistence and real duplicate-import verification remain Phase 3.3."
    missing_policy: "Incomplete lineage or posting coverage prevents ledger publication."
    output_range: "sha256:<64 lowercase hex> idempotency key and deterministic ledger_event_id."
    code_refs:
      - "PFI/src/pfi_os/domain/economic_events.py"
      - "PFI/src/pfi_os/application/economic_event_pipeline.py"
    test_refs:
      - "PFI/tests/test_v025_stage3_interconnection.py"
    evidence_refs:
      - "PFI/reports/pfi_v025/stage_3/phase_3_2/lineage_samples_redacted.json"
      - "PFI/reports/pfi_v025/stage_3/phase_3_2/evidence.json"
  - formula_id: "FORM-PFI-006"
    model_id: "MOD-PFI-005"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    task_ids:
      - "S3-P3-T1"
      - "S3-P3-T2"
    expression: "publish = accepted_upstream AND nonzero_amount AND structured_mapping_resolved AND NOT missing_required_link_role_or_offset; insert_once(ledger_idempotency_key); otherwise route exactly once to a locatable review reason"
    variables:
      - name: "real_source_record"
        data_type: "immutable parsed record"
        unit: "source record"
        input_domain: "Git-object snapshot with unique transaction_id and raw_id"
      - name: "publication_registry"
        data_type: "idempotency-key map"
        unit: "ledger event"
        input_domain: "deterministic Phase 3.2 LedgerEvent candidates"
    constraints:
      - "Source is read from an immutable Git blob and cannot be mutated."
      - "Financial fixture fallback, source-name inference and amount/time heuristic grouping are forbidden."
      - "Unresolved transfer and refund records cannot publish and must enter review queue."
      - "Date-only source time is represented at UTC start-of-date without claiming transaction-time precision."
    missing_policy: "Missing structured link, account role, refund offset, accepted state or nonzero amount routes to review with no publication."
    output_range: "One published LedgerEvent per new idempotency key or one opaque review item per unresolved input record."
    code_refs:
      - "PFI/src/pfi_os/application/stage3_reconciliation.py"
    test_refs:
      - "PFI/tests/test_v025_stage3_idempotency.py"
      - "PFI/tests/test_v025_stage12_release_gates.py"
    evidence_refs:
      - "PFI/reports/pfi_v025/stage_3/phase_3_3/idempotency_result.json"
      - "PFI/reports/pfi_v025/stage_3/phase_3_3/reconciliation_summary.json"
      - "PFI/reports/pfi_v025/stage_3/phase_3_3/evidence.json"
      - "PFI/reports/pfi_v025/stage_12/phase_12_1/real_data_e2e.json"
      - "PFI/reports/pfi_v025/stage_12/phase_12_1/evidence.json"
  - formula_id: "FORM-PFI-007"
    model_id: "MOD-PFI-005"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    task_ids:
      - "S3-P3-T3"
    expression: "metric_event_set = unique(economic_event_id where impact_flag(metric)=true); read_model_hash = SHA256(canonical(metric event-set hashes, unique ledger idempotency-key set)); every page binds this snapshot hash"
    variables:
      - name: "economic_event_set"
        data_type: "unique token set"
        unit: "economic events per metric"
        input_domain: "published lineage-complete LedgerEvents"
      - name: "page_binding"
        data_type: "page-to-hash map"
        unit: "read-model snapshot"
        input_domain: "homepage, consumption, investment, cashflow and report"
    constraints:
      - "One economic_event_id counts at most once per metric."
      - "Page identity is excluded from read_model_hash."
      - "No financial amount or private identifier is emitted by this evidence contract."
    missing_policy: "Conflicting ledger events for one economic_event_id fail closed."
    output_range: "Per-metric event counts/set hashes plus one page-independent read_model_hash."
    code_refs:
      - "PFI/src/pfi_os/application/stage3_reconciliation.py"
    test_refs:
      - "PFI/tests/test_v025_stage3_no_double_count.py"
    evidence_refs:
      - "PFI/reports/pfi_v025/stage_3/phase_3_3/event_type_matrix.json"
      - "PFI/reports/pfi_v025/stage_3/phase_3_3/read_model_contract.json"
      - "PFI/reports/pfi_v025/stage_3/phase_3_3/evidence.json"
  - formula_id: "FORM-PFI-008"
    model_id: "MOD-PFI-006"
    assumption_ids:
      - "ASM-PFI-001"
      - "ASM-PFI-002"
    status: "active"
    fact_level: "EXTRACTED"
    task_ids:
      - "S4-P1-T2"
      - "S4-P1-T3"
      - "S4-P1-T4"
    expression: "expected_closing_balance = opening_balance + confirmed_net_flows + adjustments; discrepancy = observed_closing_balance - expected_closing_balance; ready iff discrepancy = 0 and complete source lineage exists; otherwise value = null"
    variables:
      - name: "opening_balance"
        data_type: "Decimal"
        unit: "source currency"
        input_domain: "source-proven account snapshot"
      - name: "confirmed_net_flows"
        data_type: "Decimal"
        unit: "source currency"
        input_domain: "confirmed ledger flows for the same coverage interval"
      - name: "adjustments"
        data_type: "Decimal"
        unit: "source currency"
        input_domain: "explicit source-proven adjustments only"
      - name: "observed_closing_balance"
        data_type: "Decimal"
        unit: "source currency"
        input_domain: "source-proven account snapshot"
    constraints:
      - "All amounts are finite Decimal values; float input is rejected."
      - "Tolerance is exact Decimal zero; no unexplained rounding tolerance is introduced."
      - "Missing source, coverage, as_of or content hash prevents calculation and value remains null."
      - "Transaction availability does not authorize opening or closing balance inference."
      - "confirmed_zero requires complete evidence; every other non-ready state has value null."
    missing_policy: "Any incomplete account/liability snapshot or reconciliation lineage returns an explicit non-ready metric state with null value."
    output_range: "ready with exact closing balance, confirmed_zero with complete evidence, or a fail-closed non-ready state with null value."
    code_refs:
      - "PFI/src/pfi_os/application/read_models/account_balance.py"
    test_refs:
      - "PFI/tests/test_v025_stage4_accounts_read_model.py"
      - "PFI/tests/test_v025_stage4_metric_states.py"
    evidence_refs:
      - "PFI/reports/pfi_v025/stage_4/phase_4_1/cash_read_model.json"
      - "PFI/reports/pfi_v025/stage_4/phase_4_1/no_false_zero_result.json"
      - "PFI/reports/pfi_v025/stage_4/phase_4_1/evidence.json"
  - formula_id: "FORM-PFI-009"
    model_id: "MOD-PFI-007"
    assumption_ids: ["ASM-PFI-001", "ASM-PFI-002"]
    status: "active"
    fact_level: "EXTRACTED"
    task_ids: ["S4-P2-T2", "S4-P2-T4"]
    expression: "cost_basis_original = acquisition_cost_ex_fees + capitalized_fee_total; cost basis method must be explicit"
    variables:
      - name: "acquisition_cost_ex_fees"
        data_type: "Decimal"
        unit: "original currency"
        input_domain: "source-proven explicit amount"
      - name: "capitalized_fee_total"
        data_type: "Decimal"
        unit: "original currency"
        input_domain: "explicit non-negative amount"
      - name: "cost_basis_method"
        data_type: "registered token"
        unit: "policy"
        input_domain: "source_reported|specific_identification|fifo|weighted_average"
    constraints:
      - "Amounts are finite Decimal values; float input is rejected."
      - "Cost-basis method must be explicit and registered; unknown methods never calculate."
      - "Fees are explicit and never inferred as already included or excluded."
    missing_policy: "Missing holding, fee or method evidence prevents calculation and value remains null."
    output_range: "Exact fee-inclusive cost basis in original currency, or a fail-closed null metric state."
    code_refs: ["PFI/src/pfi_os/domain/holdings.py", "PFI/src/pfi_os/application/read_models/investment.py"]
    test_refs: ["PFI/tests/test_v025_stage4_holdings_valuation.py"]
    evidence_refs: ["PFI/reports/pfi_v025/stage_4/phase_4_2/cost_basis_policy.json", "PFI/reports/pfi_v025/stage_4/phase_4_2/evidence.json"]
  - formula_id: "FORM-PFI-010"
    model_id: "MOD-PFI-007"
    assumption_ids: ["ASM-PFI-001", "ASM-PFI-002"]
    status: "active"
    fact_level: "EXTRACTED"
    task_ids: ["S4-P2-T3", "S4-P2-T4"]
    expression: "market_value_original = quantity * price; market_value_cny = market_value_original * fx_rate; cost_basis_cny = cost_basis_original * fx_rate; unrealized_pnl_cny = market_value_cny - cost_basis_cny"
    variables:
      - name: "quantity"
        data_type: "Decimal"
        unit: "instrument units"
        input_domain: "source-proven holding snapshot"
      - name: "price"
        data_type: "Decimal"
        unit: "original currency per unit"
        input_domain: "positive market-price snapshot"
      - name: "fx_rate"
        data_type: "Decimal"
        unit: "CNY per original currency"
        input_domain: "positive BASE_TO_CNY snapshot or CNY identity 1"
      - name: "valuation_as_of"
        data_type: "RFC3339 datetime"
        unit: "time"
        input_domain: "not before quantity/price/FX timestamps"
    constraints:
      - "Price instrument and currency must match the holding snapshot."
      - "quantity_as_of, price_as_of and fx_effective_at must not be after valuation_as_of."
      - "Non-CNY valuations require direction BASE_TO_CNY; CNY uses identity rate 1 without an invented FX snapshot."
      - "Arithmetic is exact Decimal with no Phase 4.2 rounding."
    missing_policy: "Any missing or misaligned holding, price or required FX dependency returns an explicit non-ready null metric state."
    output_range: "Exact original/CNY market value, CNY cost basis and unrealized PnL, or a fail-closed null metric state."
    code_refs: ["PFI/src/pfi_os/domain/valuation.py", "PFI/src/pfi_os/application/read_models/investment.py"]
    test_refs: ["PFI/tests/test_v025_stage4_holdings_valuation.py"]
    evidence_refs: ["PFI/reports/pfi_v025/stage_4/phase_4_2/valuation_contract.json", "PFI/reports/pfi_v025/stage_4/phase_4_2/investment_read_model.json", "PFI/reports/pfi_v025/stage_4/phase_4_2/evidence.json"]
  - formula_id: "FORM-PFI-011"
    model_id: "MOD-PFI-008"
    assumption_ids: ["ASM-PFI-001", "ASM-PFI-002"]
    status: "active"
    fact_level: "EXTRACTED"
    task_ids: ["S4-P3-T1", "S4-P3-T3"]
    expression: "source_snapshot_sum_cny = sum(explicit source-reported CNY snapshot values); transaction events never infer missing balances"
    variables:
      - name: "source_reported_snapshot_values"
        data_type: "list[Decimal]"
        unit: "CNY"
        input_domain: "complete, source-proven snapshots only"
      - name: "source_state"
        data_type: "registered metric status"
        unit: "state"
        input_domain: "ready|confirmed_zero or an explicit non-ready state"
    constraints:
      - "Only complete source-proven snapshot values participate in the sum."
      - "Transaction rows, counts and event impacts never synthesize an absent balance."
      - "All non-ready states have value null; confirmed_zero requires complete evidence."
    missing_policy: "Any missing dependency returns its explicit non-ready state with null value and blocks the dependent aggregate."
    output_range: "Exact Decimal CNY sum for complete evidence, confirmed_zero for complete zero evidence, or null."
    code_refs: ["PFI/src/pfi_os/application/read_models/metric_state.py", "PFI/src/pfi_os/application/read_models/unified.py"]
    test_refs: ["PFI/tests/test_v025_stage4_cross_page_consistency.py"]
    evidence_refs: ["PFI/reports/pfi_v025/stage_4/phase_4_3/core_metric_states.json", "PFI/reports/pfi_v025/stage_4/phase_4_3/no_false_zero_result.json", "PFI/reports/pfi_v025/stage_4/phase_4_3/evidence.json"]
  - formula_id: "FORM-PFI-012"
    model_id: "MOD-PFI-008"
    assumption_ids: ["ASM-PFI-001", "ASM-PFI-002"]
    status: "active"
    fact_level: "EXTRACTED"
    task_ids: ["S4-P3-T1", "S4-P3-T3"]
    expression: "net_worth_cny = account_assets_cny + investment_market_value_cny - liabilities_cny"
    variables:
      - name: "account_assets_cny"
        data_type: "Decimal"
        unit: "CNY"
        input_domain: "ready or complete confirmed-zero account aggregate"
      - name: "investment_market_value_cny"
        data_type: "Decimal"
        unit: "CNY"
        input_domain: "ready or complete confirmed-zero PIT investment aggregate"
