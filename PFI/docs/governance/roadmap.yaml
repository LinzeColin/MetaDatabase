        name: "投资分析、消费分析"
        objective: "提供本地只读智能分析 MVP，不新增真实同步、支付或实盘执行。"
        status: "completed"
        estimated_hours: 4
        estimated_pct: 100
        stop_conditions:
          - "无证据归因、无证据风险、无证据异常"
          - "低置信度消费分类不进复核"
          - "QBVS 入口丢失"
        stop_gate:
          gate_id: "PFI-S4-ANALYSIS-MVP-GATE"
          pass_criteria:
            - "S4 read-model 覆盖 4A/4B"
            - "收益归因 precision_policy 阻止精确伪结论"
            - "消费 summary 排除 transfer/investment"
            - "现金流 forecast 分离 life_cash 和 investment_cash"
          evidence:
            - "PFI/docs/pfi_v02/STAGE4_ANALYSIS_MVP.md"
            - "PFI/tests/test_stage4_analysis_mvp.py"
          failure_action: "fix_and_rerun"
        tasks:
          - task_id: "S4PZT01"
            name: "Stage 4 closeout、本机入口刷新与缓存清理"
            objective: "证明 Stage 4 投资分析和消费分析 acceptance、stop condition、validation、入口和缓存清理均完成。"
            status: "completed"
            estimated_hours: 4
            estimated_pct: 100
            dependencies:
