schema_version: "codexproject.roadmap.v1"
roadmap_kind: "product"
project_id: "PFI"
total_estimated_hours: 12
completed_estimated_hours: 12
current_stage_id: "S4"
current_phase_id: "S4P"
current_task_id: "S4PZT01"
next_gate_id: "S5-START-GATE"
stages:
  - stage_id: "S2"
    name: "数据源与低操作自动同步 MVP"
    person_goal: "把 PFI 根项目的真实能力、边界、参数和下一步阻塞写成 owner 可读事实。"
    status: "completed"
    estimated_hours: 4
    estimated_pct: 100
    stop_conditions:
      - "自动实盘下单"
      - "交易密码或支付提交动作"
      - "把未验证生产能力写成已就绪"
    stop_gate:
      gate_id: "PFI-GOV-GATE"
      pass_criteria:
        - "PFI 根三基 Markdown 存在且无无后缀副本"
        - "PFI 根治理文件通过项目治理验证"
        - "Stage 1+2 合同测试通过"
        - "旧 QBVS lifecycle smoke 通过"
        - "本地 PFI.app 入口指向 canonical PFI"
      evidence:
        - "PFI/docs/governance"
      failure_action: "blocked"
    phases:
      - phase_id: "S2P"
        name: "多数据源合同与低操作导入"
        objective: "记录并验收已存在 Stage 1/2 合同，不新增生产声明。"
        status: "completed"
        estimated_hours: 4
        estimated_pct: 100
        stop_conditions:
          - "缺少中文 owner 入口"
          - "三基文件不是 Markdown"
        stop_gate:
          gate_id: "PFI-GOV-GATE"
          pass_criteria:
            - "本 PR 验证命令通过"
            - "Stage 2 2A-2H acceptance audit 全部 PASS"
          evidence:
            - "PFI/功能清单.md"
            - "PFI/开发记录.md"
            - "PFI/模型参数文件.md"
          failure_action: "fix_and_rerun"
        tasks:
          - task_id: "PFI-MD-001"
            name: "PFI 根项目三基 Markdown 与治理文件补齐"
            objective: "把当前注册 PFI 根项目三基入口改成 Markdown，并补齐最小治理事实文件。"
            status: "completed"
            estimated_hours: 4
            estimated_pct: 75
            dependencies: []
            acceptance_ids:
              - "ACC-PFI-MD-001"
            acceptance:
              - acceptance_id: "ACC-PFI-MD-001"
                description: "PFI 根三基入口和最小治理文件通过本地项目治理验证。"
                evidence_refs:
                  - "PFI/docs/governance"
            test_commands:
              - "python scripts/validate_project_governance.py --project PFI"
              - "python -m unittest tests.governance.test_human_entry_markdown_contract -q"
            test_results:
              - "Project governance validation: errors 0 / warnings 0"
              - "Human-entry Markdown contract: Ran 2 tests / OK"
            evidence_refs:
              - "PFI/docs/governance/project.yaml"
              - "PFI/docs/governance/roadmap.yaml"
            risks:
              - "生产联通和实盘执行仍未验证。"
            rollback: "Revert this PR."
            current_result: "PFI 根三基入口已改为 .md。"
            completed_version: "0.2.0"
          - task_id: "S2PZT01"
            name: "Stage 2 closeout 与本地入口验收"
            objective: "证明 Stage 2 2A-2H acceptance、stop condition、validation、入口和缓存清理均完成。"
            status: "completed"
            estimated_hours: 0
            estimated_pct: 100
            dependencies:
              - "PFI-MD-001"
            acceptance_ids:
              - "ACC-PFI-S2-CLOSEOUT"
            acceptance:
              - acceptance_id: "ACC-PFI-S2-CLOSEOUT"
                description: "Stage 2 所有 phase/task 的本地合同、旧 QBVS smoke、治理验证、本机入口和缓存清理通过。"
                evidence_refs:
                  - "PFI/docs/pfi_v02/STAGE2_ACCEPTANCE_AUDIT.md"
                  - "PFI/docs/pfi_v02/STAGE2_DATA_SYNC_MVP.md"
            test_commands:
              - "PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python3 -B -m unittest tests.test_stage1_ia_contract tests.test_stage1_core_models tests.test_stage1_classification_rules tests.test_stage2_data_source_registry tests.test_stage2_cba_csv_import tests.test_stage2_alipay_import tests.test_stage2_non_csv_contracts -q"
              - "cd PFI/modules/qbvs_lab && PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 -B -m unittest tests.test_s3pct02_lifecycle -q"
              - "python3 scripts/validate_project_governance.py --project PFI"
              - "python3 -B -m unittest tests.governance.test_human_entry_markdown_contract -q"
            test_results:
              - "Stage 1+2 contracts: Ran 45 tests / OK"
              - "Legacy QBVS lifecycle smoke: Ran 1 test / OK"
              - "Project governance validation: errors 0 / warnings 0"
              - "Human-entry Markdown contract: Ran 2 tests / OK"
            evidence_refs:
              - "PFI/docs/pfi_v02/STAGE2_ACCEPTANCE_AUDIT.md"
              - "PFI/HANDOFF.md"
            risks:
              - "真实账户联通、真实凭证、生产运行和实盘执行仍未验证。"
            rollback: "Revert the Stage 2 closeout documentation commit; do not move QBVS runtime."
            current_result: "Stage 2 local contract acceptance complete; production readiness not claimed."
            completed_version: "0.2.0"
  - stage_id: "S3"
    name: "首页、账户、账本可读 MVP"
    person_goal: "Owner 打开 PFI 后能读懂当前财务状态，并完成同步、复核、查看建议、生成报告四个主动作。"
    status: "completed"
    estimated_hours: 4
    estimated_pct: 100
    stop_conditions:
      - "首页依赖真实账户才可运行"
      - "unknown 静默入账"
      - "同步全部执行外部登录、支付或券商操作"
      - "隐藏旧策略回测、盘感训练或大数据模拟器入口"
    stop_gate:
      gate_id: "PFI-S3-READABLE-MVP-GATE"
      pass_criteria:
        - "Stage 3 3A-3D acceptance matrix 全部 PASS"
        - "Stage 3 contract test 通过"
        - "Web shell 8 个一级入口可见"
        - "旧 QBVS lifecycle smoke 通过"
        - "本地 PFI.app 入口指向 canonical PFI"
      evidence:
        - "PFI/docs/pfi_v02/STAGE3_READABLE_MVP.md"
        - "PFI/src/pfi_v02/stage3_read_mvp.py"
      failure_action: "blocked"
    phases:
      - phase_id: "S3P"
        name: "首页、账户、账本、低操作 UX"
        objective: "提供本地只读 readable MVP，不新增真实同步或实盘执行。"
        status: "completed"
        estimated_hours: 4
        estimated_pct: 100
        stop_conditions:
          - "首页建议无证据"
          - "数据源和账户混用"
          - "转账进入消费统计"
          - "技术状态暴露到首页"
        stop_gate:
          gate_id: "PFI-S3-READABLE-MVP-GATE"
          pass_criteria:
            - "S3 read-model 覆盖 3A-3D"
            - "同步全部计划 does_not_execute=true"
            - "状态语言为 owner-readable 五状态"
          evidence:
            - "PFI/docs/pfi_v02/STAGE3_READABLE_MVP.md"
            - "PFI/tests/test_stage3_readable_mvp.py"
          failure_action: "fix_and_rerun"
        tasks:
          - task_id: "S3PZT01"
            name: "Stage 3 closeout、本机入口刷新与缓存清理"
            objective: "证明 Stage 3 首页、账户、账本和低操作 UX acceptance、stop condition、validation、入口和缓存清理均完成。"
            status: "completed"
            estimated_hours: 4
            estimated_pct: 100
            dependencies:
              - "S2PZT01"
            acceptance_ids:
              - "ACC-PFI-S3-READABLE-MVP"
            acceptance:
              - acceptance_id: "ACC-PFI-S3-READABLE-MVP"
                description: "Stage 3 所有 phase/task 的本地只读 read-model、Web shell 8 入口、旧 QBVS smoke、治理验证、本机入口和缓存清理通过。"
                evidence_refs:
                  - "PFI/docs/pfi_v02/STAGE3_READABLE_MVP.md"
                  - "PFI/tests/test_stage3_readable_mvp.py"
            test_commands:
              - "PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python3 -B -m unittest tests.test_stage1_ia_contract tests.test_stage1_core_models tests.test_stage1_classification_rules tests.test_stage2_data_source_registry tests.test_stage2_cba_csv_import tests.test_stage2_alipay_import tests.test_stage2_non_csv_contracts tests.test_stage3_readable_mvp -q"
              - "cd PFI/modules/qbvs_lab && PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 -B -m unittest tests.test_s3pct02_lifecycle -q"
              - "node --check PFI/web/app/shell.js"
              - "python3 scripts/validate_project_governance.py --project PFI"
              - "python3 -B -m unittest tests.governance.test_human_entry_markdown_contract -q"
            test_results:
              - "Stage 1+2+3 contracts: Ran 59 tests / OK"
              - "Legacy QBVS lifecycle smoke: Ran 1 test / OK"
              - "Project governance validation: errors 0 / warnings 0"
              - "Human-entry Markdown contract: Ran 2 tests / OK"
              - "Stage 3 contract: Ran 13 tests / OK"
              - "Python compile: OK"
              - "Web shell syntax: OK"
            evidence_refs:
              - "PFI/docs/pfi_v02/STAGE3_READABLE_MVP.md"
              - "PFI/HANDOFF.md"
            risks:
              - "真实账户联通、真实凭证、生产运行和实盘执行仍未验证。"
              - "Stage 3 FX fixture 不是实时汇率。"
            rollback: "Revert the Stage 3 closeout commit; keep QBVS runtime path unchanged."
            current_result: "Stage 3 local readable MVP acceptance complete; production readiness not claimed."
            completed_version: "0.2.0"
  - stage_id: "S4"
    name: "投资与消费智能分析 MVP"
    person_goal: "Owner 能从记录升级到分析，看到投资收益/风险/行为和消费预算/订阅/异常/现金流。"
    status: "completed"
    estimated_hours: 4
    estimated_pct: 100
    stop_conditions:
      - "投资/消费混算"
      - "数据不足却给精确结论"
      - "缺交易数据仍生成行为结论"
      - "转账或投资事件计入生活消费"
      - "生活现金和投资现金混淆"
      - "隐藏旧策略回测、盘感训练或大数据模拟器入口"
    stop_gate:
      gate_id: "PFI-S4-ANALYSIS-MVP-GATE"
      pass_criteria:
        - "Stage 4 4A/4B acceptance matrix 全部 PASS"
        - "Stage 4 contract test 通过"
        - "Web shell 投资管理和消费管理显示分析能力"
        - "旧 QBVS lifecycle smoke 通过"
        - "本地 PFI.app 入口指向 canonical PFI"
      evidence:
        - "PFI/docs/pfi_v02/STAGE4_ANALYSIS_MVP.md"
        - "PFI/src/pfi_v02/stage4_analysis_mvp.py"
      failure_action: "blocked"
    phases:
