limitations:
  - statement: "生产联通、真实账户凭证、实盘执行、自动付款或券商提交动作未验证。"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "PFI/README.md"
  - statement: "Stage 5 Alpha 只读出口不修改 Alpha repo，不新增 Alpha/Ralpha/System 一级入口。"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "PFI/docs/pfi_v02/STAGE5_ADVICE_REPORT_ALPHA_EXPORT.md"
  - statement: "Stage 6 synthetic E2E 只证明本地 V0.2 可运行、可验证、可回滚；真实数据连接和生产发布证据仍需独立 gate。"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "PFI/docs/pfi_v02/STAGE6_E2E_STABILIZATION.md"
  - statement: "v0.2.5 Phase 2.1 只确认交易 Git object 来源 ready、operational SQLite metadata partial；余额、负债、持仓、价格和生产 FX 尚未绑定 source-level aggregate metadata，均为 not_loaded；所有指标仍 blocked/null。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S2-P21"
  - statement: "v0.2.5 Phase 2.2 只实现时间与 FX 状态合同；生产 FX source/rate 未加载，显式闭市日列表当前为空，旧 v0.2.2 snapshot 仅作非绑定 reference，不能冒充当前生产 snapshot。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S2-P22"
  - statement: "v0.2.5 Phase 2.3 的三次真实性能样本只证明 immutable 交易 snapshot 可被只读解析，不是生产 SLA；该 Phase evidence 是 whole review 前的历史 candidate，由后续 Stage 2 whole-review evidence 统一收口。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S2-P23"
  - statement: "Stage 2 接受不消除 residual risks：canonical private root/operational SQLite 观察权限为 0755/0644；production FX、余额、负债、持仓和市场价格仍 not_loaded；七个非 transaction_time 时间字段仍 not_verified。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S2-WHOLE"
  - statement: "v0.2.5 Phase 3.1 只建立 source/account metadata 合同与 deterministic role routing；不读取真实财务记录，不证明真实账户映射、parser 语义正确性、review queue 持久化、standardization、economic event、ledger 或 reconciliation。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S3-P31"
  - statement: "v0.2.5 Phase 3.2 只证明 typed contract 与确定性规则；没有读取真实财务数据，没有执行真实重复导入、对账、持久化 unique constraint、review queue lifecycle 或 production financial acceptance。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S3-P32"
  - statement: "Stage 3 接受是 pass_with_review_queue：1250 条缺 explicit link/effective roles 的转账候选与 249 条缺 offset 的退款候选未确认且禁止发布；review queue persistence、余额/持仓/估值、production 与最终人工验收均未完成。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S3-WHOLE"
  - statement: "v0.2.5 Phase 4.2 只证明持仓、显式成本与 PIT 估值能力合同以及当前 aggregate source 的 fail-closed read model；真实持仓、价格与生产 FX 均 not_loaded，production cost-basis method 为 null，三个投资指标均未计算。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S4-P42"
  - statement: "v0.2.5 Phase 4.3 只完成 12/12 phase tasks 的 candidate evidence；七个核心指标当前全部 not_loaded/null，消费双口径金融计算属于 Stage 5，Stage 4 whole-stage review 与 transition acceptance 尚未执行。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S4-P43"
  - statement: "Stage 4 接受为 pass_with_not_loaded_sources：账户余额、负债、持仓、市场价格与生产 FX 未加载，七个核心指标为 null，生产成本基础与真实估值未运行；接受仅证明 fail-closed、无假零和跨页同 hash。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S4-WHOLE"
  - statement: "v0.2.5 Phase 5.1 只完成公式/参数/单位/可信度治理；4.81 仅是方向单元测试示例，生产 FX 仍为 null/not_loaded；双消费、投资与现金流公式、真实数据不变量、敏感性和模型有效性属于 Phase 5.2/5.3，均未开始。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S5-P51"
  - statement: "v0.2.5 Phase 5.2 只完成财务公式 capability 与 fail-closed 合同；测试金额是 deterministic contract examples，不是生产数据或模型有效性证据。真实数据不变量、变形测试、敏感性、模型卡、UI/report 实际挂链和 Stage 5 whole-stage review 均留给 Phase 5.3 或后续 gate。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S5-P52"
  - statement: "v0.2.5 Phase 5.3 在 immutable transaction snapshot 上只验证 FORM-PFI-015/019 的真实数据性质和 FORM-PFI-020 结构约束；FORM-PFI-016/017/018、分类准确率、历史/样本外及 actual UI/report render binding 均未被交易证据覆盖，保持 blocked/open。Stage 5 whole-stage review 尚未开始。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S5-P53"
  - statement: "Stage 5 接受为 pass_with_explicit_blocked_models：四项财务指标已在正式三页面同源显示，但 FORM-PFI-016/017 缺余额、持仓、价格或生产 FX，FORM-PFI-018 缺完整 dated chain，FORM-PFI-020 缺 accuracy/OOS ground truth；这些残余未被 transition acceptance 解锁。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S5-WHOLE"
  - statement: "v0.2.5 Phase 6.1 只完成一级导航、alias、canonical strategy-lab 与 DOM 去重；二级页面 job-to-be-done、独有数据/操作/状态、breadcrumb/focus/scroll/no-JS fallback 行为以及完整 history/a11y 验收仍属于 Phase 6.2/6.3。旧 v0.2.3/v0.2.4 route tests 中要求 /home、/sources-upload 和双移动导航的断言已被 v0.2.5 Roadmap 附录明确 supersede。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S6-P61"
  - statement: "v0.2.5 Phase 6.2 证明 45 个二级页面合同、path deep link、页面差异化、title/breadcrumb/focus/scroll 和 no-JS fallback；完整 back/forward/reload/repeated-click/invalid-route、keyboard 与 a11y tree acceptance 仍属于 Phase 6.3，Stage 6 whole-stage review 未开始。"
    fact_level: "VERIFIED"
    evidence_refs:
      - "EVID-PFI-V025-S6-P62"
  - statement: "v0.2.5 Phase 6.3 只证明 canonical History API、浏览器恢复行为、无效 route、键盘导航和 10-entry accessibility tree；Stage 6 whole-stage independent review、整改/复审与 user acceptance 尚未开始，因此 Stage 6 仍为 in_progress，不能进入 Stage 7。"
    fact_level: "VERIFIED"
