  "formulas": [
    {
      "formula_id": "amount_cny",
      "name_zh": "金额折算为人民币",
      "purpose_zh": "把不同原币金额统一成 CNY 主口径。",
      "inputs": [
        "original_amount",
        "original_currency",
        "fx_to_cny_rate",
        "fx_snapshot_id"
      ],
      "outputs": [
        "amount_cny"
      ],
      "logic_zh": "金额_CNY = 原始金额 × 原币兑 CNY 汇率。",
      "example_zh": "例如：500 AUD × 4.6874 = 2343.70 CNY。",
      "variable_aliases": {
        "original_amount": "原始金额",
        "original_currency": "原始币种",
        "fx_to_cny_rate": "原币兑 CNY 汇率",
        "fx_snapshot_id": "汇率快照 ID",
        "amount_cny": "CNY 金额"
      }
    },
    {
      "formula_id": "gross_consumption_cny",
      "name_zh": "消费总流出金额",
      "purpose_zh": "衡量现金从用户体系流出的总压力。",
      "inputs": [
        "living_consumption_cny",
        "investment_deposit_cny",
        "fund_subscription_cny",
        "bullion_purchase_cny",
        "investment_buy_cny",
        "financial_fee_cny",
        "refund_offset_cny"
      ],
      "outputs": [
        "gross_consumption_cny"
      ],
      "logic_zh": "消费总流出 = 生活消费 + 投资入金 + 基金申购 + 黄金申购 + 投资买入 + 金融费用 - 退款抵消。",
      "example_zh": "生活消费 1200 + 基金申购 800 - 退款 100 = 消费总流出 1900 CNY。",
      "variable_aliases": {
        "gross_consumption_cny": "消费总流出金额",
        "living_consumption_cny": "生活消费金额",
        "investment_deposit_cny": "投资入金金额",
        "fund_subscription_cny": "基金申购金额",
        "bullion_purchase_cny": "黄金申购金额",
        "investment_buy_cny": "投资买入金额",
        "financial_fee_cny": "金融费用",
        "refund_offset_cny": "退款抵消金额"
      }
    },
    {
      "formula_id": "living_consumption_cny",
      "name_zh": "生活消费金额",
      "purpose_zh": "衡量普通生活支出，不让投资入金污染生活消费判断。",
      "inputs": [
        "ordinary_life_spend_cny",
        "excluded_investment_flow_cny",
        "excluded_internal_transfer_cny"
      ],
      "outputs": [
        "living_consumption_cny"
      ],
      "logic_zh": "生活消费只包含普通生活消费，排除投资入金、基金申购、投资买入、内部转账和信用卡还款。",
      "example_zh": "餐饮 80 + 交通 20，基金申购 800 排除，生活消费 = 100 CNY。",
      "variable_aliases": {
        "ordinary_life_spend_cny": "普通生活支出",
        "excluded_investment_flow_cny": "排除的投资流出",
        "excluded_internal_transfer_cny": "排除的内部转账",
        "living_consumption_cny": "生活消费金额"
      }
    },
    {
