  "formulas": [
    {
      "formula_id": "amount_cny",
      "name_zh": "金额折算为人民币",
      "purpose_zh": "把不同原币金额统一成 CNY 主口径。",
      "inputs": [
        "original_amount",
        "original_currency",
        "fx_to_cny_rate",
        "fx_snapshot_id"
      ],
      "outputs": [
        "amount_cny"
      ],
      "logic_zh": "金额_CNY = 原始金额 × 原币兑 CNY 汇率。",
      "example_zh": "例如：500 AUD × 4.6874 = 2343.70 CNY。",
      "variable_aliases": {
        "original_amount": "原始金额",
        "original_currency": "原始币种",
        "fx_to_cny_rate": "原币兑 CNY 汇率",
        "fx_snapshot_id": "汇率快照 ID",
        "amount_cny": "CNY 金额"
      }
    },
    {
      "formula_id": "gross_consumption_cny",
      "name_zh": "消费总流出金额",
      "purpose_zh": "衡量现金从用户体系流出的总压力。",
      "inputs": [
        "living_consumption_cny",
        "investment_deposit_cny",
        "fund_subscription_cny",
        "bullion_purchase_cny",
        "investment_buy_cny",
        "financial_fee_cny",
        "refund_offset_cny"
      ],
      "outputs": [
        "gross_consumption_cny"
      ],
      "logic_zh": "消费总流出 = 生活消费 + 投资入金 + 基金申购 + 黄金申购 + 投资买入 + 金融费用 - 退款抵消。",
      "example_zh": "生活消费 1200 + 基金申购 800 - 退款 100 = 消费总流出 1900 CNY。",
      "variable_aliases": {
        "gross_consumption_cny": "消费总流出金额",
        "living_consumption_cny": "生活消费金额",
        "investment_deposit_cny": "投资入金金额",
        "fund_subscription_cny": "基金申购金额",
        "bullion_purchase_cny": "黄金申购金额",
        "investment_buy_cny": "投资买入金额",
        "financial_fee_cny": "金融费用",
        "refund_offset_cny": "退款抵消金额"
      }
    },
    {
      "formula_id": "living_consumption_cny",
      "name_zh": "生活消费金额",
      "purpose_zh": "衡量普通生活支出，不让投资入金污染生活消费判断。",
      "inputs": [
        "ordinary_life_spend_cny",
        "excluded_investment_flow_cny",
        "excluded_internal_transfer_cny"
      ],
      "outputs": [
        "living_consumption_cny"
      ],
      "logic_zh": "生活消费只包含普通生活消费，排除投资入金、基金申购、投资买入、内部转账和信用卡还款。",
      "example_zh": "餐饮 80 + 交通 20，基金申购 800 排除，生活消费 = 100 CNY。",
      "variable_aliases": {
        "ordinary_life_spend_cny": "普通生活支出",
        "excluded_investment_flow_cny": "排除的投资流出",
        "excluded_internal_transfer_cny": "排除的内部转账",
        "living_consumption_cny": "生活消费金额"
      }
    },
    {
      "formula_id": "confidence_score",
      "name_zh": "置信度评分",
      "purpose_zh": "决定分类、匹配和关联是否可自动接受或需要人工复核。",
      "inputs": [
        "field_completeness",
        "amount_direction",
        "rule_hit",
        "merchant_counterparty",
        "interconnection_match",
        "history_consistency",
        "penalty"
      ],
      "outputs": [
        "confidence_score"
      ],
      "logic_zh": "置信度 = 字段完整度 30 + 金额方向 10 + 规则命中 20 + 商户/对手方 15 + Interconnection 15 + 历史一致性 10 - 扣分项。",
      "example_zh": "字段 25 + 方向 10 + 规则 15 + 商户 10 + 关联 0 + 历史 8 = 68，低于 70 进入复核。",
      "variable_aliases": {
        "confidence_score": "置信度评分",
        "field_completeness": "字段完整度分",
        "amount_direction": "金额方向分",
        "rule_hit": "规则命中分",
        "merchant_counterparty": "商户/对手方分",
        "interconnection_match": "关联匹配分",
        "history_consistency": "历史一致性分",
        "penalty": "扣分项"
      }
    },
    {
      "formula_id": "future_cash_balance",
      "name_zh": "未来现金余额",
      "purpose_zh": "预测生活现金是否能覆盖支出、还款和计划投资入金。",
      "inputs": [
        "current_life_cash",
        "expected_income",
        "expected_refund",
        "expected_fixed_spend",
        "expected_flexible_spend",
        "expected_repayment",
        "planned_investment_deposit",
        "planned_investment_return"
      ],
      "outputs": [
        "future_cash_balance"
      ],
      "logic_zh": "未来现金余额 = 当前生活现金 + 预计收入 + 预计退款/报销 - 预计固定支出 - 预计弹性支出 - 预计还款 - 计划投资入金 + 计划投资回流。",
      "example_zh": "当前现金 10000 + 收入 5000 - 固定支出 4000 - 投资入金 3000 = 8000 CNY。",
      "variable_aliases": {
        "current_life_cash": "当前生活现金",
        "expected_income": "预计收入",
