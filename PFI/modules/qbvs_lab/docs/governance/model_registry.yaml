governance_spec_version: "1.0.0"
project_id: "PFI_BIG_DATA_SIMULATOR"
assumptions:
  - assumption_id: "ASM-001"
    name: "ReviewOnly boundary"
    content: "QBVS/PFI_BIG_DATA_SIMULATOR artifacts are external evidence only; they must not write QuantLab source, QuantLab database, approved strategy libraries, or execute live trading."
    why_needed: "README.md boundary, AGENTS.md, QUANTLAB_INTEGRATION_CONTRACT.json, HANDSHAKE_PROTOCOL.json"
    evidence_ref: "README.md boundary, AGENTS.md, QUANTLAB_INTEGRATION_CONTRACT.json, HANDSHAKE_PROTOCOL.json"
    applicability: "All models in this governance baseline"
    violation_impact: "If violated, validation outputs could be misused as production trading actions."
    falsification_or_validation: "Verify bundle/adapter/campaign manifests keep writes_quantlab_database=false and external_evidence_only."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-002"
    name: "OHLCV input adequacy"
    content: "Backtests and validation windows require normalized OHLCV-like bars with datetime and close, at least 30 bars for normalization and longer windows for rolling validation."
    why_needed: "qbvs/backtest.py normalize_ohlcv and window code"
    evidence_ref: "qbvs/backtest.py normalize_ohlcv and window code"
    applicability: "Backtest, validation, quality and task models"
    violation_impact: "Insufficient or malformed bars fail validation or return error rows."
    falsification_or_validation: "Run tests/test_core.py backtest, rolling and quality cases."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-003"
    name: "Deterministic strategy catalog"
    content: "Behavior strategy IDs are deterministic products of enumerated base weights, dip triggers, sell triggers, trend rules and risk rules."
    why_needed: "qbvs/strategies.py generate_strategy_specs"
    evidence_ref: "qbvs/strategies.py generate_strategy_specs"
    applicability: "Behavior strategy generation and all validation modes"
    violation_impact: "Changing enumeration changes strategy universe and traceability IDs."
    falsification_or_validation: "Run test_strategy_factory_has_at_least_200_specs."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-004"
    name: "User acceptance floor"
    content: "User-facing acceptance floor is total-return gap >= -8%, annualized gap >= -3%, and drawdown improvement >= -0.005 versus buy-and-hold."
    why_needed: "README.md and compare_to_buy_hold/promotion configs"
    evidence_ref: "README.md and compare_to_buy_hold/promotion configs"
    applicability: "Candidate selection, bundle export and readiness audit"
    violation_impact: "Changing thresholds changes external candidate promotion."
    falsification_or_validation: "Run promotion, bundle and goal audit tests."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-005"
    name: "Fast screening is not final evidence"
    content: "Fast vectorized screening may rank candidates but finalists require exact backtest rerun before approval."
    why_needed: "README.md fast-screening boundary and quantlab_bundle.py requires_exact_validation"
    evidence_ref: "README.md fast-screening boundary and quantlab_bundle.py requires_exact_validation"
    applicability: "Fast screening and QuantLab bundle export"
    violation_impact: "Fast results could be misread as final approval if exact rerun gate is removed."
    falsification_or_validation: "Run fast bundle exact-required tests."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-006"
    name: "Public data is not tradability proof"
    content: "Yahoo public history and fallback universes are validation inputs, not proof of account-level tradability."
    why_needed: "README.md, BACKUP_MANIFEST.md, universe_seed.py summaries"
    evidence_ref: "README.md, BACKUP_MANIFEST.md, universe_seed.py summaries"
    applicability: "Data-source and universe seed models"
    violation_impact: "Overclaiming tradability could cause invalid deployment decisions."
    falsification_or_validation: "Check universe summaries and Moomoo readiness gates."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-007"
    name: "Moomoo/OpenD readiness gate"
    content: "Moomoo history fetch requires reachable OpenD socket and futu/moomoo SDK availability."
    why_needed: "qbvs/datasources.py probe_moomoo_opend and cache_moomoo_history"
    evidence_ref: "qbvs/datasources.py probe_moomoo_opend and cache_moomoo_history"
    applicability: "Moomoo cache and goal audit models"
    violation_impact: "Unavailable provider must block account-level validation claims."
    falsification_or_validation: "Run datasource probe tests or probe command."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-008"
    name: "Historical iteration count discipline"
    content: "The single scoped git commit for this imported path is reconstructive evidence only, not a confirmed iteration count."
    why_needed: "git log --max-count=50 -- PFI/modules/qbvs_lab"
    evidence_ref: "git log --max-count=50 -- PFI/modules/qbvs_lab"
    applicability: "Development ledger"
    violation_impact: "Counting commits as iterations would fabricate development history."
    falsification_or_validation: "Keep Confirmed iterations separate from reconstructed events."
    status: "active"
    fact_level: "RECONSTRUCTED"
