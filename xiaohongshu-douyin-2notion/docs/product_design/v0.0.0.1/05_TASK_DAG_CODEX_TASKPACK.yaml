preauthorized_reversible_decisions:
- Use normal permissively licensed dependencies after lock, SBOM and license scan.
- Use SQLite WAL, versioned migrations, outbox and unique constraints.
- Add fixtures, tests, redaction and feature flags without further approval.
- Pin upstream commits and keep a prior pin as rollback.
- Lower concurrency or disable a non-core model/provider when reliability, privacy or budget gates fail.
- Use synthetic fixtures to continue development before real account inputs are available.
- Refactor internal modules without changing public contracts or data boundaries.
mandatory_pause_conditions:
- A new third party would receive private content or credentials.
- A platform control, CAPTCHA or access restriction would need to be bypassed.
- A dependency license is unknown or incompatible with the intended distribution.
- A destructive migration has no tested backup and rollback.
- A requested change expands beyond Alpha scope or enables VPS data plane.
- A secret/private-content/CDN leak is detected.
- Acceptance contracts conflict and no conservative interpretation exists.
