governance_spec_version: "1.0.0"
project_id: "FIFA"
assumptions:
  - assumption_id: "ASM-001"
    statement: "TAB/public odds snapshots are read-only research inputs and do not authorize automated wagering."
    why_needed: "All scoring and report gates must preserve the research-only safety boundary."
    evidence_refs:
      - "FIFA/README.md"
      - "FIFA/AGENTS.md"
      - "FIFA/tab-research-pipeline/README.md"
      - "governance/stage_gates/s3pd/fifa_fail_closed_tests.log"
    applies_to:
      - "MOD-001"
      - "MOD-002"
      - "MOD-003"
      - "MOD-005"
      - "MOD-009"
      - "MOD-010"
    violation_impact: "Using stale, private, or unauthorized data could create unsafe executable recommendations."
    validation_method: "Run safety gates, raw refresh gates, public artifact scans, and S3PDT02 fail-closed export tests before publication."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-002"
    statement: "Decimal odds must be finite numeric values greater than 1.0 before probability transforms."
    why_needed: "Invalid prices would corrupt implied probability, no-vig probability, EV, and edge calculations."
    evidence_refs:
      - "FIFA/tab-research-pipeline/tab_research/odds.py:12"
      - "FIFA/tab-research-pipeline/tests/test_pipeline.py:1013"
    applies_to:
      - "MOD-001"
      - "MOD-002"
    violation_impact: "The pipeline raises ValueError or blocks market rows instead of scoring invalid odds."
    validation_method: "Shared decimal odds tests and market integrity gate tests."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-003"
    statement: "Candidate edges are heuristic research signals and require curated support or manual review before action."
    why_needed: "The scoring model combines market-derived probabilities with hard-coded overlays and gates."
    evidence_refs:
      - "FIFA/tab-research-pipeline/tab_research/model.py:25"
      - "FIFA/tab-research-pipeline/tab_research/model.py:143"
    applies_to:
      - "MOD-002"
      - "MOD-004"
    violation_impact: "Uncurated or unsupported selections are downgraded to watch/no bet or reject."
    validation_method: "Candidate generation and gate tests in test_pipeline.py."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-004"
    statement: "Execution stake must remain AUD 0 when formal raw, private-position, or manual approval gates are blocked."
    why_needed: "The project is explicitly research-only until all gates pass."
    evidence_refs:
      - "FIFA/tab-research-pipeline/tab_research/provider_manual_verification.py:502"
      - "FIFA/tab-research-pipeline/tab_research/automation_candidate.py:169"
      - "FIFA/docs/HANDOFF.md"
    applies_to:
      - "MOD-003"
      - "MOD-008"
      - "MOD-009"
      - "MOD-010"
    violation_impact: "Recommendations must be visible only as research candidates, not executable wagers."
    validation_method: "Provider/manual/automation tests assert AUD 0 and blocked publish states."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-005"
    statement: "Public artifacts must not expose account, session, private position, local private path, or TAB UI sensitive markers."
    why_needed: "Reports and dashboards are public-safe outputs while private My Bets data remains isolated."
    evidence_refs:
      - "FIFA/tab-research-pipeline/tab_research/safety.py:9"
      - "FIFA/tab-research-pipeline/tab_research/safety.py:128"
    applies_to:
      - "MOD-007"
      - "MOD-010"
    violation_impact: "Publication and automation readiness fail closed."
    validation_method: "audit_output_safety and audit_public_artifact_safety tests."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-006"
    statement: "Provider coverage and credit policies are operational gates, not proof of value or betting profitability."
    why_needed: "Coverage ratios and credit reserve determine whether more data collection is safe."
    evidence_refs:
      - "FIFA/tab-research-pipeline/tab_research/provider_kpi.py:98"
      - "FIFA/tab-research-pipeline/tab_research/provider_alternate_plan.py:556"
    applies_to:
      - "MOD-008"
      - "MOD-009"
    violation_impact: "The system pauses provider batches or routes to manual verification."
    validation_method: "Provider command-center and credit-reserve tests."
    status: "active"
    fact_level: "EXTRACTED"
  - assumption_id: "ASM-007"
    statement: "The legacy softmax prediction MVP is implemented under legacy and is not the active TAB research execution path."
    why_needed: "Legacy formulas are preserved for traceability without promoting them to active operational behavior."
    evidence_refs:
      - "FIFA/legacy/fifa-analysis-system/README.md:140"
      - "FIFA/legacy/fifa-analysis-system/app/config.py:9"
    applies_to:
      - "MOD-011"
    violation_impact: "Legacy weights must not be used as current active TAB candidate parameters without a migration task."
    validation_method: "Legacy README and app service inspection."
    status: "active"
    fact_level: "EXTRACTED"
