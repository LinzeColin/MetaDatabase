  - formula_id: "FORM-002"
    model_id: "MOD-002"
    assumption_ids:
      - "ASM-001"
      - "ASM-002"
      - "ASM-003"
      - "ASM-004"
    status: "active"
    expression: "total_goals=clamp(0.7+3.4*(1-under_25_probability),1.1,3.6); ratio=clamp(home_market_probability/max(away_market_probability,0.01),0.15,6.0); home_share=1/(1+exp(-0.55*ln(ratio))); xg=max(0.2,total_goals*share); Poisson score probabilities multiply home and away Poisson masses; breakeven=1/odds; edge=model_probability-breakeven; EV=model_probability*odds-1; stake_policy applies quality gates and EV/edge thresholds."
    variables:
      - name: "home_market_probability"
        data_type: "float"
        unit: "probability"
        input_domain: "[0, 1]"
      - name: "away_market_probability"
        data_type: "float"
        unit: "probability"
        input_domain: "[0, 1]"
      - name: "under_25_probability"
        data_type: "float"
        unit: "probability"
        input_domain: "[0, 1]"
      - name: "home_xg"
        data_type: "float"
        unit: "expected goals"
        input_domain: ">= 0.2 before overlay; >= 0.1 after overlay"
      - name: "expected_value"
        data_type: "float"
        unit: "return per unit stake"
        input_domain: "model_probability*odds-1"
      - name: "edge"
        data_type: "float"
        unit: "probability points"
        input_domain: "model_probability minus breakeven probability"
    constraints: "Reject odds below 1.30, Result odds above 15.0, selected unsupported longshots at odds >= 5.0, unsupported markets, and specific mismatch matches outside Result."
    missing_policy: "Invalid odds raise ValueError; unsupported curated evidence returns watch_or_no_bet or reject_quality_gate with zero stake."
    output_range: "stake_unit in {0.0, 0.25, 0.5}; stake_aud is rounded stake_unit*unit_aud; decision enum reject_quality_gate, watch_or_no_bet, marginal_small_stake, small_stake."
    normalization: "Market probabilities are taken from no-vig or model inputs; Poisson score grid multiplies normalized Poisson masses for scores 0..12."
    boundary_conditions: "Away probability denominator floored at 0.01; ratio clamped to 0.15..6.0; total goals clamped to 1.1..3.6; xG floored."
    fallback: "Default rationale/risk text is used when no MODEL_QUALITY_NOTES entry exists; stake defaults to zero when gates fail."
    code_refs:
      - "FIFA/tab-research-pipeline/tab_research/model.py:80"
      - "FIFA/tab-research-pipeline/tab_research/model.py:92"
      - "FIFA/tab-research-pipeline/tab_research/model.py:104"
