    missing_policy: "first_number falls back to 0 for absent position summary fields; allocation returns zero adjusted stakes when candidates, target, or base total are absent."
    output_range: "Current-window target and candidate allocations are non-negative AUD amounts."
    normalization: "Candidate weights are normalized by active_weight before target allocation."
    boundary_conditions: "Minimum executable stake is AUD 10; rounded amounts are rebalanced and capped to target."
