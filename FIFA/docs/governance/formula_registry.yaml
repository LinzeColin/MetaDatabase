      - "ASM-002"
    status: "active"
    expression: "parse_decimal_odds rejects bool, non DECIMAL_ODDS_RE strings, non-finite values, and odds <= 1.0; implied_probability=1/odds; no_vig_probability_i=(1/odds_i)/sum_j(1/odds_j)."
    variables:
      - name: "odds"
        data_type: "float or numeric string"
        unit: "decimal odds"
        input_domain: "finite value greater than 1.0"
      - name: "implied_probability"
        data_type: "float"
        unit: "probability"
        input_domain: "(0, 1)"
      - name: "no_vig_probability_i"
        data_type: "float"
        unit: "probability"
        input_domain: "[0, 1]"
    constraints: "Input odds must parse through require_decimal_odds; no-vig inverse total must be positive and finite."
    missing_policy: "Invalid or missing odds returns None in parse_decimal_odds or raises ValueError through require_decimal_odds."
    output_range: "implied probability and no-vig probabilities are positive probabilities; no-vig vector sums to 1.0 within floating precision."
    normalization: "No-vig probabilities divide each inverse price by the total inverse price."
    boundary_conditions: "Odds <= 1.0, bool values, NaN, infinity, and malformed strings are rejected."
    fallback: "No numeric fallback; fail closed with None or ValueError."
    code_refs:
      - "FIFA/tab-research-pipeline/tab_research/odds.py:12"
      - "FIFA/tab-research-pipeline/tab_research/odds.py:62"
      - "FIFA/tab-research-pipeline/tab_research/model.py:72"
