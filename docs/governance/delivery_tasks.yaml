    scope: "Current T1307/A209 implementation slice has a resumable operator soak runner, checkpoint JSONL, readiness artifact, CI-safe 3-second validation, real 4h local operator soak evidence, a read-only 24h progress monitor, an explicit background supervisor, a detached watchdog contract, repository-local background heartbeat artifact, A209 finalization preflight, and operational evidence parameters PARAM-069 through PARAM-071 plus PARAM-079, PARAM-082, PARAM-090, PARAM-091 and PARAM-092 for watchdog cadence, stale threshold, heartbeat schema binding, invariant heartbeat non-closure, Playwright runtime path and wall-clock budget policy. The supervisor observes existing live PID state, refuses double-starts, dry-runs recovery by default, requires --auto-resume plus --execute before launching a paused run, blocks resume when a failed window exists, and is bound into clean-room release packaging. The watchdog runs CI-safe one-cycle dry-runs by default, can be detached with --execute --auto-resume for background recovery, observes live PIDs without launching a second process, resumes only paused successful checkpoints, reports stale live PIDs without killing them, and now exposes an explicit --allow-operator-intervention-status verification flag so make verify can accept the correct fail-closed OPERATOR_INTERVENTION_REQUIRED state after a failed checkpoint without changing the payload or closing A209. The heartbeat records the current operator/watchdog PIDs, completed/remaining windows and non-closure semantics under artifacts/tests/a209 without treating partial runtime evidence as release-ready; it can validate BACKGROUND_SOAK_OPERATOR_INTERVENTION_REQUIRED when failed windows are present and now also consumes watchdog output so stale live checkpoint observations become heartbeat intervention instead of normal running status. The evidence validator now separates structurally invalid evidence (FAIL) from a declared failed operator run (FAILED_OPERATOR_EVIDENCE), and --require-release-ready still fails unless 4h and 24h artifacts are both PASS. The finalization preflight converts heartbeat plus evidence-validation status into an operator decision artifact, reports operator-intervention states for failed chains, and blocks downstream release-gate refresh until 288/288 release-ready evidence exists. This run records that the origin/main A209 chain failed at window 32/288 with 31 PASS and 1 FAIL because elapsed_wall_seconds 397.8961 exceeded the old 375 second 300s-window budget; the follow-up fd66 chain also failed at window 15/288 with elapsed_wall_seconds 398.4896. The operator runner and evidence validator now use measured_duration_seconds + max(180, measured_duration_seconds * 0.5) to allow bounded host scheduling and browser-process overhead while still rejecting serialized double wall-clock evidence such as 300s measured / 600s elapsed. 24h operator evidence remains required before completion."
