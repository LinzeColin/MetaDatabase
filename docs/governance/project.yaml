    expression: "0.28*source_authority + 0.18*locator_precision + 0.14*temporal_fit + 0.16*cross_source_confirmation + 0.12*source_independence + 0.12*entity_resolution_quality"
    description: "衡量证据可信度与可定位性"
    status: "active"
    fact_level: "EXTRACTED"
    semantic_status: "MACHINE_VERIFIED"
