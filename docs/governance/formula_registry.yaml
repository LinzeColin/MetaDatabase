      - name: "weight_i"
        data_type: "number"
        unit: "ratio"
        input_domain: "0..1; group sum 1.0"
        description: "Configured component weight."
      - name: "QualityFactor"
        data_type: "number"
        unit: "ratio"
        input_domain: "0..1"
        description: "Evidence quality adjustment factor."
      - name: "CoverageFactor"
        data_type: "number"
        unit: "ratio"
        input_domain: "0..1"
        description: "Available data coverage adjustment factor."
    constraints:
      - "output_range=0..100"
      - "default_threshold=minimum adjusted priority >= 46"
