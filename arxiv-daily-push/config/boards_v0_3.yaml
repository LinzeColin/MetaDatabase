# 板块注册表（V0.3）——五板块与各自数据源的唯一真相。
# Owner 指令（2026-07-15）：板块二～五上线并**扩展数据源**；每板块的数据源
# （名称/平台/网站/订阅方式/官方性/节奏）在雷达页逐板块透明展示。
# 新来源 = 此处一行配置（02_系统架构/功能清单.md）。所有 feed_url 均经真实探测可用
# （2026-07-15）；不可用的（限流/无 RSS）如实标注并由健康纳管自动停用。
# 边界：板块二～四为「雷达浏览流」——真实抓取、雷达可见、来源健康纳管（连续 3 次
# 失败自动停用并跳过），但**不进入每日精选候选池**（池整合与多样性上限 10→17 是
# 任务包明文的独立提案，须走 提案→回放→应用→回执）。板块五为跨板块聚合视图。
registry_ver: boards-v03-2
boards:
  - id: board1
    name: 板块一 · 研究前沿
    status: live_selection   # 每日精选闭环所在板块
    note: arXiv 每日一篇精选闭环（+bioRxiv 影子）；另附多条预印本浏览流（不入精选池，仅雷达浏览）。
    sources:
      - id: arxiv-cs
        name: arXiv（cs.AI / cs.LG / stat.ML）
        platform: arXiv.org 官方 API
        website: https://arxiv.org
        method: api
        official: true
        cadence: 每日
        doc_source_id: SRC-ARXIV   # 精选闭环主库计数/健康从 documents/sources 表读取
      - id: biorxiv-shadow
        name: bioRxiv 生物预印本（影子）
        platform: bioRxiv 官方 API
        website: https://www.biorxiv.org
        method: api
        official: true
        cadence: 每日（影子零入库，上板后参选）
      - id: arxiv-cscl
        name: arXiv cs.CL（计算语言学 / NLP）
        platform: arXiv.org 官方 RSS
        website: https://arxiv.org/list/cs.CL/recent
        feed_url: http://export.arxiv.org/rss/cs.CL
        method: rss
        official: true
        cadence: 每日
      - id: arxiv-cscv
        name: arXiv cs.CV（计算机视觉）
        platform: arXiv.org 官方 RSS
        website: https://arxiv.org/list/cs.CV/recent
        feed_url: http://export.arxiv.org/rss/cs.CV
        method: rss
        official: true
        cadence: 每日
      - id: medrxiv
        name: medRxiv 医学预印本
        platform: medRxiv 官方 API
        website: https://www.medrxiv.org
        feed_url: https://connect.medrxiv.org/medrxiv_xml.php?subject=all
        method: rss
        official: true
        cadence: 每日
