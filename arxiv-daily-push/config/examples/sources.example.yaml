sources:
  - source_id: arxiv
    source_type: arxiv
    enabled: true
    phase: phase3_adapter
    api_base_url: https://export.arxiv.org/api/query
    default_scope: all_arxiv_primary_archives
    legacy_debug_query: cat:cs.AI
    default_sort_by: submittedDate
    default_sort_order: descending
    max_results_per_primary_archive: 3
    candidate_queue_artifact: adp-candidate-queue
    acknowledgement: Thank you to arXiv for use of its open access interoperability.
    rate_limit_policy: polite_retry_with_backoff
    phase12_policy: bounded_per_archive_atom_summary_scan_no_pdf_download
future_source_types:
  - rss
  - github
  - standards
  - industry_reports
  - web_pages
  - books
  - courses
  - podcasts
  - user_documents
