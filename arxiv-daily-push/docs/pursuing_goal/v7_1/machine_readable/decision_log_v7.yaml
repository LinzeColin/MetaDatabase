  reason: 兼顾并行开发与生产安全。
  status: owner_required
- decision_id: DEC-V7.1-003
  date: '2026-06-24'
  decision: 新增 S2PM 七任务，覆盖安全、原子恢复、outbox、自动生命周期、压力故障、UI 和独立复审。
  reason: 保证后续 Agent 可连续、稳定地接手并以运行证据验收。
  status: owner_required
