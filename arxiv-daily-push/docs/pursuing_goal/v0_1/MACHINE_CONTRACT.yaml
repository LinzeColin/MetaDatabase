  one_task_per_run: true
  default_max_files_per_task: 12
  no_big_bang: true
  two_failures_switch_path: true
  implementer_must_not_self_sign_gate: true
  answer_six_start_questions_before_coding: true
  completion_marker: IMPLEMENTATION_READY_FOR_INDEPENDENT_VERIFICATION

