pursuing_goal_sha256: "eace98cb48e72357724d0cf26acfae574768f3d398c78781feea9851dc4dec2c"
pursuing_goal_one_line: "在不破坏已上线 MVP、六主题高级动效与实时稳定运行的前提下，以单一事实源、A0–A2 官方原文、2016+ 可恢复历史、证据化人话内容、可回测预测和量化成本收益为硬约束，逐 Stage/Phase 将 ADP 建成多板块、全面、权威、及时、深度且长期稳定的前沿认知系统。"

# —— 权威顺序（高 → 低；见 PRECEDENCE.md）——
