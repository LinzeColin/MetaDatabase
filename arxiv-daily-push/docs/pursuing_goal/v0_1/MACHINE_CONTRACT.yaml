  - multitenancy
  - pricing_TAM_commercial_tiers
  - full_navigation_redesign
  - replacement_visual_identity
  - source_levels_A3_plus
  - generic_saas_ia

# —— Owner Gate（仅这些点需 Owner 参与）——
