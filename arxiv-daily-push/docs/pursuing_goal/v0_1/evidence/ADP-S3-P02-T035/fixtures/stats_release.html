<html><head><title>2024年国民经济运行情况 - 国家统计局</title></head><body>
<div class="content"><h1>2024年国民经济运行情况</h1>
<p>初步核算，2024年，国内生产总值1349084亿元，按不变价格计算，同比增长5.0%。分产业看，第一产业增加值91414亿元，同比增长3.5%。</p>
<p>全年规模以上工业增加值同比增长5.8%；环比增长0.9%。社会消费品零售总额487895亿元，同比增长3.5%。</p>
<p>全国居民消费价格（CPI）比上年上涨0.2%。全国固定资产投资514374亿元，同比增长3.2%。</p>
</div></body></html>
