schema_version: adp.acceptance_contract.v1
taskpack_version: 1.2.0
default_blocking: true
status_rule: PASS_requires_executed_oracle_and_exact_subject_evidence
fail_closed_states: [FAIL, BLOCKED, NOT_RUN, UNKNOWN]

acceptances:
