    task_ids: [ADP-V12-S0-T001]
    oracle: 七个语义角色各有且仅有一个根级文件，verifier authoritative ingest 成功并提取 10 个 Task 与 33 个 Acceptance ID。
    test_ids: [TST-V12-S0-ROLE-INGEST]
    evidence: verifier taskpack-lock、完整包摘要、七角色摘要、确定性 source snapshot
    blocking: true

