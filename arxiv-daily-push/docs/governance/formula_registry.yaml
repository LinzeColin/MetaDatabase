governance_spec_version: "1.0.0"
project_id: "arxiv-daily-push"
formulas:
  - formula_id: "FORM-ADP-001"
    model_id: "MOD-ADP-001"
    assumption_ids: ["ASM-ADP-001"]
    status: "active"
    expression: "If any Phase 1 required command is missing, status is blocked. Else if any future runtime command is missing or free disk is below the video/TTS threshold, status is warn. Else status is pass."
    variables:
      - name: "missing_required_commands"
        data_type: "list[str]"
        unit: "commands"
        input_domain: "subset of phase1_required_commands"
      - name: "missing_future_runtime_commands"
        data_type: "list[str]"
        unit: "commands"
        input_domain: "subset of future_runtime_commands"
      - name: "free_gib"
        data_type: "float"
        unit: "GiB"
        input_domain: "0..unbounded"
    constraints: "Required command failures dominate warning-level future runtime gaps."
    missing_policy: "Unavailable command paths are represented as unavailable command_status entries."
    output_range: "blocked, warn, or pass"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/doctor.py"]
    test_refs: ["arxiv-daily-push/tests/test_doctor.py", "arxiv-daily-push/tests/test_cli.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_01.md"]
  - formula_id: "FORM-ADP-002"
    model_id: "MOD-ADP-001"
    assumption_ids: ["ASM-ADP-002"]
    status: "active"
    expression: "subject = [arXiv Daily Push][STATUS][date] summary. Body is a fixed key-value report containing project, run_id, date, timezone, status, phase, stage, claim_gate, publication, release_url, report_path, queue_health, degradation, next_action, and sha256."
    variables:
      - name: "status"
        data_type: "str"
        unit: "label"
        input_domain: "any string normalized to uppercase"
      - name: "run_id"
        data_type: "str"
        unit: "identifier"
        input_domain: "non-secret run label"
      - name: "recipient"
        data_type: "str"
        unit: "email"
        input_domain: "configured recipient"
    constraints: "Renderer does not read SMTP secrets and does not send mail."
    missing_policy: "Default status, run_id, summary, date, phase, and stage are used for dry-run preview."
    output_range: "EmailNotification subject, recipient, and body"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/notifications.py"]
    test_refs: ["arxiv-daily-push/tests/test_notifications.py"]
    evidence_refs: ["arxiv-daily-push/config/examples/notification.example.yaml"]
  - formula_id: "FORM-ADP-005"
    model_id: "MOD-ADP-004"
    assumption_ids: ["ASM-ADP-003", "ASM-ADP-004"]
    status: "active"
    expression: "Each contract object must include required fields and use the allowed enum set for its type; P0 EvidenceClaim records must include a stable locator such as stable_url, page, section, table, figure, or quote."
    variables:
      - name: "contract_kind"
        data_type: "str"
        unit: "enum"
        input_domain: "source_item, evidence_claim, lesson, storyboard, publication"
      - name: "required_fields"
        data_type: "list[str]"
        unit: "field names"
        input_domain: "contract-specific required fields"
      - name: "enum_value"
        data_type: "str"
        unit: "enum value"
        input_domain: "declared parameter enum sets"
    constraints: "Validation is dependency-free and has no network, filesystem write, or media side effect."
    missing_policy: "Missing required field creates a validation error instead of imputation."
    output_range: "empty error list for pass or one or more validation error strings"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/contracts.py"]
    test_refs: ["arxiv-daily-push/tests/test_contracts.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_02.md"]
  - formula_id: "FORM-ADP-006"
    model_id: "MOD-ADP-004"
    assumption_ids: ["ASM-ADP-004"]
    status: "active"
    expression: "A RunRecord transition is valid only when next_state belongs to ALLOWED_TRANSITIONS[current_state]; completed, blocked, and failed are terminal."
    variables:
      - name: "current_state"
        data_type: "str"
        unit: "state"
        input_domain: "RUN_STATES"
      - name: "next_state"
        data_type: "str"
        unit: "state"
        input_domain: "RUN_STATES"
      - name: "state_history"
        data_type: "list[object]"
        unit: "transition records"
        input_domain: "ordered transition list"
    constraints: "Skipped states and unrecognized states fail closed."
    missing_policy: "Missing RunRecord fields create validation errors."
    output_range: "validated transition or validation error"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/state_machine.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_state_machine.py", "arxiv-daily-push/tests/test_cli.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_02.md"]
  - formula_id: "FORM-ADP-007"
    model_id: "MOD-ADP-005"
    assumption_ids: ["ASM-ADP-003", "ASM-ADP-005"]
    status: "active"
    expression: "Build URL = ARXIV_API_BASE_URL + encoded search_query, start, max_results, sortBy, sortOrder where 1 <= max_results <= 50; parse each Atom entry into SourceItem with arXiv-specific metadata under metadata.arxiv."
    variables:
      - name: "search_query"
        data_type: "str"
        unit: "arXiv query"
        input_domain: "arXiv API search query"
      - name: "max_results"
        data_type: "int"
        unit: "entries"
        input_domain: "1..50 for Phase 3"
      - name: "atom_entry"
        data_type: "xml element"
        unit: "entry"
        input_domain: "Atom entry with arxiv namespace extensions"
    constraints: "No bulk download, PDF download, or scheduled ingest in Phase 3."
    missing_policy: "Malformed Atom XML or API error entries raise ArxivAdapterError."
    output_range: "arXiv API URL or list[SourceItem]"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/arxiv_adapter.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_arxiv_adapter.py", "arxiv-daily-push/tests/fixtures/arxiv_atom_sample.xml"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_03.md", "https://info.arxiv.org/help/api/basics.html", "https://info.arxiv.org/help/api/user-manual.html"]
  - formula_id: "FORM-ADP-003"
    model_id: "MOD-ADP-002"
    assumption_ids: ["ASM-ADP-003", "ASM-ADP-006"]
    status: "active"
    expression: "selection_score = sum(normalized_component_signal * component_weight) across frontier_signal, evidence_reliability, novelty, transfer_value, problem_importance, taxonomy_priority, waiting_time, and diversity; weights sum to 100."
    variables:
      - name: "normalized_component_signal"
        data_type: "float"
        unit: "ratio"
        input_domain: "0..1"
      - name: "component_weight"
        data_type: "float"
        unit: "points"
        input_domain: "5, 10, 15, or 20 depending on component"
    constraints: "Same input must produce the same score; arXiv metadata conflicts and unsupported evidence block eligibility before ranking."
    missing_policy: "Missing P0 evidence or missing component signal makes the item ineligible instead of imputing a score."
    output_range: "0..100 points plus blocking reasons for ineligible candidates"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/ranking.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_ranking.py", "arxiv-daily-push/tests/fixtures/ranking_candidates.json"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_04.md", "arxiv-daily-push/docs/pursuing_goal/06_PURSUING_GOAL_READY_PROMPT.md"]
  - formula_id: "FORM-ADP-004"
    model_id: "MOD-ADP-003"
    assumption_ids: ["ASM-ADP-003", "ASM-ADP-007"]
    status: "active"
    expression: "Publish is allowed only if every P0 claim has a Claim ID, source locator, supported status, and compatible metadata; arXiv preprint peer-review status cannot be upgraded without independent non-arXiv evidence."
    variables:
      - name: "claim"
        data_type: "EvidenceClaim"
        unit: "claim"
        input_domain: "reported_result, author_claim, system_inference, analogy, uncertainty, metadata"
    constraints: "Any unsupported P0 claim blocks publication."
    missing_policy: "Missing locator or parse failure creates a blocking result."
    output_range: "publish_allowed true or false plus Claim Ledger, Publication status, and blocking reasons"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/evidence_gate.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_evidence_gate.py", "arxiv-daily-push/tests/fixtures/claim_ledger_input.json"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_05.md", "arxiv-daily-push/docs/pursuing_goal/06_PURSUING_GOAL_READY_PROMPT.md"]

  - formula_id: "FORM-ADP-008"
    model_id: "MOD-ADP-006"
    assumption_ids: ["ASM-ADP-008"]
    status: "active"
    expression: "A Lesson can be generated only when the Claim Ledger status is pass, at least one supported claim exists, Lesson.claim_ids are all supported Claim Ledger claim IDs, every section claim_id is present in Lesson.claim_ids, and every section body includes visible [claim_id] markers."
    variables:
      - name: "ledger_status"
        data_type: "str"
        unit: "status"
        input_domain: "pass or blocked"
      - name: "supported_claim_ids"
        data_type: "list[str]"
        unit: "claim identifiers"
        input_domain: "Claim Ledger claims where support_status=supported"
      - name: "section_claim_ids"
        data_type: "list[str]"
        unit: "claim identifiers"
        input_domain: "per-section Lesson claim references"
    constraints: "Unsupported, unverified, conflicted, or unregistered claim IDs cannot enter Lesson.claim_ids or section claim_ids."
    missing_policy: "Missing supported evidence creates a LessonGenerationError rather than generated filler text."
    output_range: "valid Lesson JSON or LessonGenerationError"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/lesson.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_lesson.py", "arxiv-daily-push/tests/fixtures/lesson_input.json"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_06.md", "arxiv-daily-push/docs/pursuing_goal/06_PURSUING_GOAL_READY_PROMPT.md"]

  - formula_id: "FORM-ADP-009"
    model_id: "MOD-ADP-007"
    assumption_ids: ["ASM-ADP-009"]
    status: "active"
    expression: "Narration can be generated only in dry_run mode; audio_synthesis_allowed, audio_write_allowed, and model_download_allowed must be false; each narration segment must map to one Lesson section and use only Lesson claim IDs."
    variables:
      - name: "tts_mode"
        data_type: "str"
        unit: "mode"
        input_domain: "dry_run"
      - name: "audio_synthesis_allowed"
        data_type: "bool"
        unit: "flag"
        input_domain: "false in Phase 7"
      - name: "segment_claim_ids"
        data_type: "list[str]"
        unit: "claim identifiers"
        input_domain: "subset of Lesson.claim_ids"
    constraints: "Phase 7 cannot write audio paths, download models, or synthesize voice output."
    missing_policy: "Invalid Lesson input or real TTS request creates NarrationError rather than media output."
    output_range: "valid Narration dry-run JSON or NarrationError"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/narration.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_narration.py", "arxiv-daily-push/tests/fixtures/narration_input.json"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_07.md", "arxiv-daily-push/docs/pursuing_goal/06_PURSUING_GOAL_READY_PROMPT.md"]

  - formula_id: "FORM-ADP-010"
    model_id: "MOD-ADP-008"
    assumption_ids: ["ASM-ADP-010"]
    status: "active"
    expression: "Storyboard can be generated only as dry-run JSON; video_render_allowed, media_write_allowed, and asset_download_allowed must be false; each scene must map to narration claim IDs."
    variables:
      - name: "video_render_allowed"
        data_type: "bool"
        unit: "flag"
        input_domain: "false in Phase 8"
      - name: "media_write_allowed"
        data_type: "bool"
        unit: "flag"
        input_domain: "false in Phase 8"
      - name: "scene_claim_ids"
        data_type: "list[str]"
        unit: "claim identifiers"
        input_domain: "subset of Narration.claim_ids"
    constraints: "Phase 8 cannot render video, write media paths, or download external assets."
    missing_policy: "Invalid narration input or media path output creates VideoPlanError rather than media output."
    output_range: "valid Storyboard dry-run JSON or VideoPlanError"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/video.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_video.py", "arxiv-daily-push/tests/fixtures/video_input.json"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_08.md"]

  - formula_id: "FORM-ADP-011"
    model_id: "MOD-ADP-009"
    assumption_ids: ["ASM-ADP-011"]
    status: "active"
    expression: "The dry-run pipeline succeeds only when the publication gate passes and RunRecord transitions follow created > health_checked > source_collected > evidence_bound > lesson_ready > storyboard_ready > publication_ready > notified > completed."
    variables:
      - name: "publish_allowed"
        data_type: "bool"
        unit: "flag"
        input_domain: "Claim Ledger publication gate output"
      - name: "run_state_sequence"
        data_type: "list[str]"
        unit: "states"
        input_domain: "allowed RunRecord transition graph"
    constraints: "Real SMTP, Release upload, and scheduler execution are not performed in Phase 9."
    missing_policy: "Failed evidence gate or invalid RunRecord raises PipelineError."
    output_range: "succeeded dry-run payload or PipelineError"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/pipeline.py"]
    test_refs: ["arxiv-daily-push/tests/test_pipeline.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_09.md"]

  - formula_id: "FORM-ADP-012"
    model_id: "MOD-ADP-010"
    assumption_ids: ["ASM-ADP-012", "ASM-ADP-002"]
    status: "active"
    expression: "A Phase 10 handoff is valid only when the input RunRecord current_state is completed and scheduler_enabled, github_actions_runner_enabled, unattended_execution_allowed, release_upload_allowed, and real_smtp_send_enabled are all false; otherwise the handoff is blocked."
    variables:
      - name: "run_record_state"
        data_type: "str"
        unit: "state"
        input_domain: "RunRecord.current_state"
      - name: "external_side_effect_flags"
        data_type: "map[str,bool]"
        unit: "flags"
        input_domain: "scheduler, runner, release, unattended, and SMTP booleans"
      - name: "blocking_reasons"
        data_type: "list[str]"
        unit: "reasons"
        input_domain: "non-empty disabled external side-effect explanation list"
    constraints: "Phase 10 cannot run a scheduler, upload a Release, execute unattended, or send real SMTP mail."
    missing_policy: "Missing RunRecord, incomplete RunRecord, missing gates, or missing blocking reasons creates a HandoffError or validation error."
    output_range: "valid handoff preview or HandoffError/validation errors"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/handoff.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_handoff.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_10.md"]

  - formula_id: "FORM-ADP-013"
    model_id: "MOD-ADP-011"
    assumption_ids: ["ASM-ADP-013", "ASM-ADP-014", "ASM-ADP-015"]
    status: "active"
    expression: "A Phase 11 acceptance package is valid when the Phase 10 handoff is valid; production acceptance is pass only if evidence comes from the adp-trial-evidence-v1 report, 30-day trial, scheduler, Release, SMTP, and resource requirements all pass, and each passed requirement has a non-empty evidence_ref. If any production requirement, evidence_ref, or validator marker is missing, accepted_for_production must be false and blocking_reasons must be non-empty."
    variables:
      - name: "handoff_valid"
        data_type: "bool"
        unit: "flag"
        input_domain: "validate_handoff output is empty"
      - name: "production_requirements"
        data_type: "list[object]"
        unit: "requirement records"
        input_domain: "30-day trial, scheduler, Release, SMTP, and resource evidence gates"
      - name: "accepted_for_production"
        data_type: "bool"
        unit: "flag"
        input_domain: "true only when every production requirement passes"
      - name: "evidence_ref"
        data_type: "str"
        unit: "reference"
        input_domain: "non-empty stable evidence reference for every passed requirement"
      - name: "evidence_validator"
        data_type: "str"
        unit: "validator id"
        input_domain: "adp-trial-evidence-v1"
    constraints: "Dry-run handoff readiness is separate from production acceptance; raw manual booleans cannot be converted into a production pass."
    missing_policy: "Missing operational evidence, missing evidence references, or missing trial validator report creates blocked production acceptance with explicit no-claim flags."
    output_range: "acceptance package with production_acceptance_status pass or blocked"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/acceptance.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_acceptance.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11.md", "arxiv-daily-push/docs/phase_records/PHASE_11_TRIAL_EVIDENCE_VALIDATOR.md"]

  - formula_id: "FORM-ADP-014"
    model_id: "MOD-ADP-012"
    assumption_ids: ["ASM-ADP-015", "ASM-ADP-002"]
    status: "active"
    expression: "A trial evidence report passes only when at least 30 unique daily dates exist, source_id and publication_id values are unique, every daily run is succeeded or degraded, every P0 claim is traceable, no duplicate or unsupported publication is recorded, no misleading failure output is published, every daily run has RunRecord, Release, SMTP, and resource refs, the scheduler records 05:00 target and 04:45 health check with manual rerun evidence, weekly and monthly replay evidence exists, recovery drill evidence exists, real SMTP targets linzezhang35@gmail.com, and resource pressure evidence covers disk, memory, cache, Git artifacts, and secrets."
    variables:
      - name: "daily_runs"
        data_type: "list[object]"
        unit: "run records"
        input_domain: "30 or more daily run evidence objects"
      - name: "scheduler"
        data_type: "object"
        unit: "evidence"
        input_domain: "enabled scheduler, target time, health check, rerun ref"
      - name: "email"
        data_type: "object"
        unit: "evidence"
        input_domain: "real SMTP delivery evidence for configured recipient"
      - name: "resource_pressure"
        data_type: "object"
        unit: "evidence"
        input_domain: "disk, memory, cache, Git artifact, and secret hygiene flags"
    constraints: "The validator reads JSON metadata and refs only; it does not schedule jobs, upload releases, send SMTP mail, render media, or inspect secrets."
    missing_policy: "Missing, duplicate, false, or unreferenced evidence creates blocked production evidence."
    output_range: "trial evidence report with production_evidence_status pass or blocked plus operational_evidence for acceptance"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/trial.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_trial.py", "arxiv-daily-push/tests/test_acceptance.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_TRIAL_EVIDENCE_VALIDATOR.md"]

  - formula_id: "FORM-ADP-015"
    model_id: "MOD-ADP-013"
    assumption_ids: ["ASM-ADP-016", "ASM-ADP-002"]
    status: "active"
    expression: "Production preflight passes only when all required runtime commands are available, required secret environment keys are present without logging values, free disk is at least 80 GiB, memory is at least 8 GiB, Git tracked/untracked files contain no forbidden media/model/secret artifacts or oversized files, and local cache/staging/render/media/model/voice/release asset directories are empty."
    variables:
      - name: "required_commands"
        data_type: "list[str]"
        unit: "commands"
        input_domain: "python3, git, node, npm, gh, ffmpeg, docker, codex"
      - name: "required_secret_keys"
        data_type: "list[str]"
        unit: "environment variable names"
        input_domain: "SMTP, Release target, and self-hosted runner label key names"
      - name: "disk_free_gib"
        data_type: "float"
        unit: "GiB"
        input_domain: "0..unbounded"
      - name: "memory_total_gib"
        data_type: "float"
        unit: "GiB"
        input_domain: "0..unbounded"
      - name: "git_artifact_violations"
        data_type: "list[object]"
        unit: "files"
        input_domain: "tracked and untracked Git file paths"
    constraints: "Secret values and Codex auth are never read or printed; the preflight does not schedule, upload, send mail, render media, or download models."
    missing_policy: "Any missing command, missing secret key, low resource value, Git artifact violation, or non-empty local artifact directory blocks production_run_allowed."
    output_range: "production preflight report with status pass or blocked"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/production_preflight.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_production_preflight.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_PRODUCTION_PREFLIGHT.md"]

  - formula_id: "FORM-ADP-016"
    model_id: "MOD-ADP-014"
    assumption_ids: ["ASM-ADP-017", "ASM-ADP-016", "ASM-ADP-002"]
    status: "active"
    expression: "A production trial bootstrap plan passes only when the workflow and runbook exist, workflow_dispatch is present without schedule, confirm_production_trial is required before self-hosted execution, production preflight appears before project tests, the preflight JSON artifact is uploaded, required GitHub secret names and Release target variable are mapped, Codex auth is not referenced, and Release/SMTP side effects are absent."
    variables:
      - name: "workflow_text"
        data_type: "str"
        unit: "file contents"
        input_domain: "GitHub Actions workflow file"
      - name: "runbook_text"
        data_type: "str"
        unit: "file contents"
        input_domain: "production trial runbook"
      - name: "bootstrap_checks"
        data_type: "list[object]"
        unit: "checks"
        input_domain: "manual dispatch, runner, preflight, artifact, secret, and side-effect checks"
    constraints: "Bootstrap mode does not enable scheduled production, upload a Release, send SMTP mail, log secret values, or read Codex auth."
    missing_policy: "Missing workflow, runbook, confirmation guard, preflight-first order, artifact upload, secret mapping, or runbook evidence path blocks trial_bootstrap_ready."
    output_range: "trial bootstrap plan with status pass or blocked"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/trial_bootstrap.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_trial_bootstrap.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_TRIAL_BOOTSTRAP_WORKFLOW.md"]

  - formula_id: "FORM-ADP-017"
    model_id: "MOD-ADP-015"
    assumption_ids: ["ASM-ADP-018", "ASM-ADP-003"]
    status: "active"
    expression: "A live arXiv source batch passes only when a small Atom query fetch succeeds, all parsed entries validate as SourceItem objects, at least one item is not in seen_source_ids, PDF download and bulk harvest are disabled, and TLS/network/API/Atom errors are absent. If all fetched items are already seen or any fetch/parse/validation error occurs, the batch is blocked with reasons."
    variables:
      - name: "search_query"
        data_type: "str"
        unit: "arXiv API query"
        input_domain: "configured arXiv search query"
      - name: "max_results"
        data_type: "int"
        unit: "items"
        input_domain: "1..25"
      - name: "seen_source_ids"
        data_type: "set[str]"
        unit: "source IDs"
        input_domain: "prior published source_id values"
      - name: "source_items"
        data_type: "list[SourceItem]"
        unit: "records"
        input_domain: "parsed arXiv Atom entries"
    constraints: "The ingest command does not download PDFs, perform bulk metadata harvest, write repository files, or bypass TLS verification."
    missing_policy: "Network, TLS, API, Atom parse, SourceItem validation, or duplicate-only conditions produce a blocked SourceBatch."
    output_range: "SourceBatch with status pass or blocked"
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/source_ingest.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
    test_refs: ["arxiv-daily-push/tests/test_source_ingest.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_LIVE_ARXIV_INGEST.md", "https://info.arxiv.org/help/api/user-manual.html"]

  - formula_id: "FORM-ADP-018"
    model_id: "MOD-ADP-016"
    assumption_ids: ["ASM-ADP-019", "ASM-ADP-002"]
    status: "active"
