schema_version: "codexproject.roadmap.v1"
roadmap_kind: "product"
project_id: "arxiv-daily-push"
current_stage_id: "S2"
current_phase_id: "S2PC"
current_task_id: "S2PCT02"
next_gate_id: "S2PC-GATE-V7-2-REVALIDATION"
total_estimated_hours: 10.5
completed_estimated_hours: 8.5
stages:
  -
    stage_id: "S2"
    name: "Stage 2 多来源证据推进"
    person_goal: "在不破坏 Stage 1 arXiv accepted 和本机 local runner 策略的前提下，逐来源推进真实数据链路、队列、ledger、邮件预览和 shadow 证据。"
    status: "in_progress"
    stop_conditions:
      - "V7.2 current contract gate 或 agent revalidation 未通过时宣称 STAGE2_PRODUCTION_ACCEPTED"
      - "bioRxiv/medRxiv 或 Nature shadow 影响正式 arXiv 邮件"
      - "启用 SMTP、Release、GitHub schedule、video 或正式生产 inclusion"
    stop_gate:
      gate_id: "INTEGRATED_PRODUCTION_ACCEPTED -> DAILY_OPERATION"
      status: "blocked_by_v7_2_revalidation_and_final_production_gates"
      pass_conditions:
        - "V7.2 root contract、CURRENT、AGENTS、三基文件和 CI contract hash gate 合并"
        - "active/completed Stage2 agents record V7.2 revalidation receipts before new work"
        - "B1 来源级与板块级 replay/shadow/email gates 全部通过"
        - "Stage 1 arXiv local runner 无回归"
      evidence_refs:
        - "EVID-ADP-S2PBT01-REAL-REPLAY-SHADOW"
        - "EVID-ADP-DELIVERY-TASKS"
    phases:
      -
        phase_id: "S2PB"
        name: "B1 preprint source shadow promotion"
        objective: "将 legacy S2P1T01 作为 V7 alias S2PBT01 推进 bioRxiv/medRxiv metadata-only source evidence。"
        status: "in_progress"
        stop_conditions:
          - "改写历史 task/event ID"
          - "把 no-send evidence 当作 formal production inclusion"
          - "发生 V6/V7 命名或合同冲突但未标记 R-CONFLICT"
        stop_gate:
          gate_id: "S2PB-GATE-V7-CONTRACT-BLOCKED"
          status: "in_progress"
          pass_conditions:
            - "S2PBT01/S2P1T01 evidence persisted"
            - "formal production flags remain false"
            - "V7/root contract gate later reconciles alias"
          evidence_refs:
            - "EVID-ADP-S2P1T01-PREPRINT"
            - "EVID-ADP-S2PBT01-REAL-REPLAY-SHADOW"
        tasks:
          -
            task_id: "S2PBT01"
            name: "bioRxiv 与 medRxiv no-send shadow source evidence"
            objective: "完成 metadata-only adapter、source gate、queue/ledger/email preview、30-date real replay 和 48h shadow evidence，并保持 formal production false。"
            status: "completed"
            estimated_hours: 2.5
            total_hours_percent: "23.81%"
            dependencies:
              - "ARXIV_PRODUCTION_ACCEPTED"
              - "ADP-S1P5T05"
            acceptance_ids:
              - "ADP-ACC-S2P1T01-SOURCE-PROMOTION"
            test_commands:
              - "python3 -m unittest arxiv-daily-push/tests/test_preprint_adapter.py arxiv-daily-push/tests/test_stage2_sources.py ... -q"
              - "stage2-preprint-replay-shadow --start-date 2024-01-01 --count 30"
              - "scripts/validate_project_governance.py --changed-only --enforce-sync --semantic"
            evidence_refs:
              - "governance/run_manifests/ADP-S2P1T01-PREPRINT-SOURCE-PROMOTION-20260624.json"
              - "governance/run_manifests/ADP-S2PBT01-REAL-REPLAY-SHADOW-EVIDENCE-20260624.json"
            risk: "V7/root contract gates 未完成前不能纳入正式生产、不能启用邮件发送或 schedule。"
            rollback: "Revert S2PBT01/S2P1T01 source adapter, shadow/replay code, registry records, manifests, and rendered governance sync."
      -
        phase_id: "S2PC"
        name: "D2 Nature/top-journal shadow foundation"
        objective: "将 legacy S2P2T01 作为 V7.2-inherited canonical S2PCT01 推进 Nature/top-journal metadata-only no-send shadow evidence，并继续到 S2PCT02 Science 主刊 metadata-only shadow。"
        status: "in_progress"
        stop_conditions:
          - "把 Nature metadata-only RSS 当作 full text 或正式 peer-review extraction"
          - "把 S2PCT01 shadow evidence 当作 D2 source-domain acceptance"
          - "启用 SMTP、Release、GitHub schedule、video 或正式生产 inclusion"
        stop_gate:
          gate_id: "S2PC-GATE-V7-CONTRACT-BLOCKED"
          status: "in_progress"
          pass_conditions:
            - "S2PCT01/S2P2T01 Nature evidence persisted"
            - "formal production flags remain false"
            - "V7.2 production stop gates and S2PMT07 independent review pass before acceptance"
          evidence_refs:
            - "governance/run_manifests/ADP-S2P2T01-TOP-JOURNAL-SHADOW-FOUNDATION-20260624.json"
            - "arxiv-daily-push/docs/phase_records/PHASE_S2P2T01_TOP_JOURNAL_SHADOW_FOUNDATION.md"
        tasks:
          -
            task_id: "S2PCT01"
            legacy_alias: "S2P2T01"
            name: "Nature/top-journal metadata-only no-send shadow evidence"
            objective: "完成 official Nature RSS adapter、s41586 main-journal filter、SourceItem mapping、queue/ledger/email preview 和 no-send canary evidence。"
            status: "completed"
            estimated_hours: 2
            total_hours_percent: "19.05%"
            dependencies:
              - "S2PBT01"
            acceptance_ids:
              - "ACC-S2PCT01-NATURE"
            test_commands:
              - "python3 -m unittest arxiv-daily-push/tests/test_top_journal_adapter.py arxiv-daily-push/tests/test_stage2_sources.py -q"
              - "stage2-top-journal-shadow-daily using the live Nature batch under /tmp/adp_s2p2_nature_live_20260624"
            evidence_refs:
              - "governance/run_manifests/ADP-S2P2T01-TOP-JOURNAL-SHADOW-FOUNDATION-20260624.json"
              - "arxiv-daily-push/tests/test_top_journal_adapter.py"
              - "arxiv-daily-push/tests/test_stage2_sources.py"
              - "https://github.com/LinzeColin/CodexProject/pull/119"
            risk: "V7.2 production stop gates 和 S2PMT07 未完成前不能纳入正式生产、不能启用邮件发送或 schedule，Nature metadata 不能被误读为全文抽取。"
            rollback: "Revert S2PCT01/S2P2T01 Nature adapter, shadow daily code, fixtures, tests, phase record, manifest, and rendered governance sync."
          -
            task_id: "S2PCT02"
            legacy_alias: "S2P2T02"
            name: "Science main-journal metadata-only no-send shadow evidence"
            objective: "在 S2PCT01 Nature 框架稳定后，接入 Science 主刊 metadata-only discovery path，识别 Research/Report/Review/Perspective 等类型，并保持 D2 source-domain acceptance 与 production inclusion false。"
            status: "planned"
            estimated_hours: 2
            total_hours_percent: "19.05%"
            dependencies:
              - "S2PCT01"
            acceptance_ids:
              - "ACC-S2PCT02-SCIENCE"
            test_commands:
              - "planned: Science source adapter focused tests"
              - "planned: Science no-send shadow daily with separate queue/ledger/email preview"
            evidence_refs:
              - "arxiv-daily-push/docs/pursuing_goal/v7_2/machine_readable/roadmap_v7_2.yaml"
            risk: "错误文章类型、重复 DOI、全文/订阅墙越界、或 Science shadow 污染正式 arXiv 邮件必须阻断；不得宣称 D2_SOURCE_DOMAIN_ACCEPTED 或 Stage2 production accepted。"
            rollback: "Remove planned S2PCT02 governance entry if Science implementation is deferred or superseded."
  -
    stage_id: "S5"
    name: "项目迁移与三文件重建"
    person_goal: "逐项目把治理真相保留下来，把治理计算从每次开发动作中移出去。"
    status: "in_progress"
    stop_conditions:
      - "一次 PR 同时迁移多个项目"
      - "无证据事实被写入 VERIFIED"
      - "业务测试失败被忽略"
    stop_gate:
      gate_id: "S5-GATE"
      status: "open"
      pass_conditions:
        - "10/10 项目通过结构、准确性和人类可读验收"
        - "迁移过程中无批量空泛文档"
      evidence_refs:
        - "migration_PRs"
        - "full_readonly_baseline"
        - "project_acceptance_matrix"
    phases:
      -
        phase_id: "S5PB"
        name: "剩余项目治理压缩迁移"
        objective: "收敛现有大量治理文档，保留有用事实并恢复三文件。"
        status: "in_progress"
        stop_conditions:
          - "任何项目缺少 owner-readable 三文件"
          - "未知事实被写成 VERIFIED"
        stop_gate:
          gate_id: "S5PB-GATE"
          status: "in_progress"
          pass_conditions:
            - "全部 10 个项目 Lean v2 合规"
            - "三文件均非索引页"
            - "每项目 focused tests 通过"
          evidence_refs:
            - "ten_project_matrix"
            - "validation_all"
            - "owner_signoffs"
        tasks:
          -
            task_id: "S5PBT05"
            name: "迁移 arxiv-daily-push"
            objective: "提取 Stage 1 accepted、本地 runner、source promotion、delivery/evidence gate 与 Roadmap。"
            status: "completed"
            estimated_hours: 4
            total_hours_percent: "2.04%"
            dependencies:
              - "S5PBT04"
            acceptance_ids:
              - "ACC-S5PBT05"
            test_commands:
              - "python -B -m unittest ...test_review9_s5pbt05_* -q"
              - "python -B scripts/lean_governance.py check-render --project arxiv-daily-push"
              - "python -B scripts/lean_governance.py validate --changed-only --enforce-sync --semantic --base-ref origin/main"
            evidence_refs:
              - "arxiv-daily-push/docs/governance/project.yaml"
              - "arxiv-daily-push/docs/governance/roadmap.yaml"
              - "arxiv-daily-push/docs/governance/events.jsonl"
              - "governance/run_manifests/GOV-REVIEW9-S5PBT05-ARXIV-DAILY-PUSH-CANONICAL-RENDER-20260624.json"
            risk: "范围扩张、Stage 1 accepted 误读、Stage 2 ready 被误写成已实现或治理回归"
            rollback: "Revert only this task commit; retain the read-only audit evidence."
