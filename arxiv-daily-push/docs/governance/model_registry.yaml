governance_spec_version: "1.0.0"
project_id: "arxiv-daily-push"
assumptions:
  - assumption_id: "ASM-ADP-001"
    statement: "Phase 1 is limited to repository foundation, CLI doctor/version, dry-run notification rendering, schemas, config examples, and governance records."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/README.md", "arxiv-daily-push/AGENTS.md", "arxiv-daily-push/docs/phase_records/PHASE_01.md"]
    status: "active"
  - assumption_id: "ASM-ADP-002"
    statement: "Email is the system notification channel and linzezhang35@gmail.com is the recipient."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/src/arxiv_daily_push/config.py", "arxiv-daily-push/config/examples/notification.example.yaml"]
    status: "active"
  - assumption_id: "ASM-ADP-003"
    statement: "The first implemented source is arXiv, while source interfaces remain generic for future data sources."
    fact_level: "PROPOSED"
    evidence_refs: ["arxiv-daily-push/docs/pursuing_goal/06_PURSUING_GOAL_READY_PROMPT.md"]
    status: "active"
  - assumption_id: "ASM-ADP-004"
    statement: "Phase 2 implements only offline generic contracts and RunRecord state validation; it does not fetch sources or generate publishable content."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_02.md", "arxiv-daily-push/src/arxiv_daily_push/contracts.py", "arxiv-daily-push/src/arxiv_daily_push/state_machine.py"]
    status: "active"
  - assumption_id: "ASM-ADP-005"
    statement: "Phase 3 implements the first arXiv adapter with offline fixture tests and no scheduled or bulk ingestion."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_03.md", "arxiv-daily-push/src/arxiv_daily_push/arxiv_adapter.py", "arxiv-daily-push/tests/fixtures/arxiv_atom_sample.xml"]
    status: "active"
  - assumption_id: "ASM-ADP-006"
    statement: "Phase 4 ranks only explicit candidate inputs with supported P0 evidence and non-conflicting metadata; it does not extract claims or fetch live sources."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_04.md", "arxiv-daily-push/src/arxiv_daily_push/ranking.py", "arxiv-daily-push/tests/test_ranking.py"]
    status: "active"
  - assumption_id: "ASM-ADP-007"
    statement: "Phase 5 builds a Claim Ledger from explicit evidence claims and blocks publication on unsupported P0 claims, metadata conflicts, or unsupported arXiv peer-review claims."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_05.md", "arxiv-daily-push/src/arxiv_daily_push/evidence_gate.py", "arxiv-daily-push/tests/test_evidence_gate.py"]
    status: "active"
  - assumption_id: "ASM-ADP-008"
    statement: "Phase 6 generates deterministic Chinese Lesson JSON only from supported Claim Ledger evidence and does not create narration, TTS, video, runner automation, or SMTP output."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_06.md", "arxiv-daily-push/src/arxiv_daily_push/lesson.py", "arxiv-daily-push/tests/test_lesson.py"]
    status: "active"
  - assumption_id: "ASM-ADP-009"
    statement: "Phase 7 generates dry-run narration/TTS plan JSON from Lesson objects and blocks audio synthesis, model downloads, audio writes, and media retention."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_07.md", "arxiv-daily-push/src/arxiv_daily_push/narration.py", "arxiv-daily-push/tests/test_narration.py"]
    status: "active"
  - assumption_id: "ASM-ADP-010"
    statement: "Phase 8 generates Storyboard JSON and video media gate outputs in dry-run mode while blocking rendering, media writes, and asset downloads."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_08.md", "arxiv-daily-push/src/arxiv_daily_push/video.py", "arxiv-daily-push/tests/test_video.py"]
    status: "active"
  - assumption_id: "ASM-ADP-011"
    statement: "Phase 9 runs a local daily dry-run pipeline across evidence, lesson, narration, storyboard, publication, RunRecord, and email preview without scheduler, Release upload, or real SMTP send."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_09.md", "arxiv-daily-push/src/arxiv_daily_push/pipeline.py", "arxiv-daily-push/tests/test_pipeline.py"]
    status: "active"
models:
  - model_id: "MOD-ADP-001"
    name: "Phase 1 readiness and notification dry-run gate"
    kind: "deterministic rule engine"
    purpose: "Classify local Phase 1 readiness and render non-secret dry-run email notifications."
    owner: "arxiv-daily-push"
    status: "active"
    fact_level: "EXTRACTED"
    model_version: "adp-foundation-v1"
    assumption_ids: ["ASM-ADP-001", "ASM-ADP-002"]
    formula_ids: ["FORM-ADP-001", "FORM-ADP-002"]
    parameter_ids: ["PARAM-ADP-001", "PARAM-ADP-002", "PARAM-ADP-003", "PARAM-ADP-004", "PARAM-ADP-005", "PARAM-ADP-006", "PARAM-ADP-007", "PARAM-ADP-008"]
    inputs: ["current PATH", "current disk usage", "notification status", "run_id", "summary", "date"]
    outputs: ["doctor status", "missing required commands", "missing future runtime commands", "dry-run email subject", "dry-run email body"]
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/doctor.py", "arxiv-daily-push/src/arxiv_daily_push/notifications.py"]
    config_refs: ["arxiv-daily-push/src/arxiv_daily_push/config.py", "arxiv-daily-push/config/examples/notification.example.yaml"]
    test_refs: ["arxiv-daily-push/tests/test_doctor.py", "arxiv-daily-push/tests/test_notifications.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_01.md"]
  - model_id: "MOD-ADP-004"
    name: "Generic data contract and RunRecord state gate"
    kind: "deterministic contract/state validator"
    purpose: "Validate SourceItem, EvidenceClaim, Lesson, Storyboard, Publication, and RunRecord boundaries without network or media side effects."
    owner: "arxiv-daily-push"
    status: "active"
    fact_level: "EXTRACTED"
    model_version: "adp-contracts-v1"
    assumption_ids: ["ASM-ADP-003", "ASM-ADP-004"]
    formula_ids: ["FORM-ADP-005", "FORM-ADP-006"]
    parameter_ids: ["PARAM-ADP-020", "PARAM-ADP-021", "PARAM-ADP-022", "PARAM-ADP-023", "PARAM-ADP-024", "PARAM-ADP-025", "PARAM-ADP-026", "PARAM-ADP-027", "PARAM-ADP-028"]
    inputs: ["SourceItem", "EvidenceClaim", "Lesson", "Storyboard", "Publication", "RunRecord", "current_state", "next_state"]
    outputs: ["validation errors", "validated RunRecord", "transition result"]
    code_refs: ["arxiv-daily-push/src/arxiv_daily_push/contracts.py", "arxiv-daily-push/src/arxiv_daily_push/state_machine.py", "arxiv-daily-push/src/arxiv_daily_push/cli.py"]
