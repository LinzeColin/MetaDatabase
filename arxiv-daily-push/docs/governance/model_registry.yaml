    test_refs: ["arxiv-daily-push/tests/test_contracts.py", "arxiv-daily-push/tests/test_state_machine.py", "arxiv-daily-push/tests/test_cli.py"]
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_02.md"]
  - model_id: "MOD-ADP-005"
    name: "arXiv Atom source adapter"
    kind: "deterministic source adapter"
    purpose: "Build bounded arXiv API URLs and map Atom entries into generic SourceItem records."
    owner: "arxiv-daily-push"
    status: "active"
    fact_level: "EXTRACTED"
    model_version: "adp-arxiv-adapter-v1"
    assumption_ids: ["ASM-ADP-003", "ASM-ADP-005"]
    formula_ids: ["FORM-ADP-007"]
    parameter_ids: ["PARAM-ADP-029", "PARAM-ADP-030", "PARAM-ADP-031", "PARAM-ADP-032", "PARAM-ADP-033", "PARAM-ADP-034"]
