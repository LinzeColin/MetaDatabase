governance_spec_version: "1.0.0"
project_id: "arxiv-daily-push"
assumptions:
  - assumption_id: "ASM-ADP-001"
    statement: "Phase 1 is limited to repository foundation, CLI doctor/version, dry-run notification rendering, schemas, config examples, and governance records."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/README.md", "arxiv-daily-push/AGENTS.md", "arxiv-daily-push/docs/phase_records/PHASE_01.md"]
    status: "active"
  - assumption_id: "ASM-ADP-002"
    statement: "Email is the system notification channel and linzezhang35@gmail.com is the recipient."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/src/arxiv_daily_push/config.py", "arxiv-daily-push/config/examples/notification.example.yaml"]
    status: "active"
  - assumption_id: "ASM-ADP-003"
    statement: "The first implemented source is arXiv, while source interfaces remain generic for future data sources."
    fact_level: "PROPOSED"
    evidence_refs: ["arxiv-daily-push/docs/pursuing_goal/06_PURSUING_GOAL_READY_PROMPT.md"]
    status: "active"
  - assumption_id: "ASM-ADP-004"
    statement: "Phase 2 implements only offline generic contracts and RunRecord state validation; it does not fetch sources or generate publishable content."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_02.md", "arxiv-daily-push/src/arxiv_daily_push/contracts.py", "arxiv-daily-push/src/arxiv_daily_push/state_machine.py"]
    status: "active"
  - assumption_id: "ASM-ADP-005"
    statement: "Phase 3 implements the first arXiv adapter with offline fixture tests and no scheduled or bulk ingestion."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_03.md", "arxiv-daily-push/src/arxiv_daily_push/arxiv_adapter.py", "arxiv-daily-push/tests/fixtures/arxiv_atom_sample.xml"]
    status: "active"
  - assumption_id: "ASM-ADP-006"
    statement: "Phase 4 ranks only explicit candidate inputs with supported P0 evidence and non-conflicting metadata; it does not extract claims or fetch live sources."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_04.md", "arxiv-daily-push/src/arxiv_daily_push/ranking.py", "arxiv-daily-push/tests/test_ranking.py"]
    status: "active"
  - assumption_id: "ASM-ADP-007"
    statement: "Phase 5 builds a Claim Ledger from explicit evidence claims and blocks publication on unsupported P0 claims, metadata conflicts, or unsupported arXiv peer-review claims."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_05.md", "arxiv-daily-push/src/arxiv_daily_push/evidence_gate.py", "arxiv-daily-push/tests/test_evidence_gate.py"]
    status: "active"
  - assumption_id: "ASM-ADP-008"
    statement: "Phase 6 generates deterministic Chinese Lesson JSON only from supported Claim Ledger evidence and does not create narration, TTS, video, runner automation, or SMTP output."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_06.md", "arxiv-daily-push/src/arxiv_daily_push/lesson.py", "arxiv-daily-push/tests/test_lesson.py"]
    status: "active"
  - assumption_id: "ASM-ADP-009"
    statement: "Phase 7 generates dry-run narration/TTS plan JSON from Lesson objects and blocks audio synthesis, model downloads, audio writes, and media retention."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_07.md", "arxiv-daily-push/src/arxiv_daily_push/narration.py", "arxiv-daily-push/tests/test_narration.py"]
    status: "active"
  - assumption_id: "ASM-ADP-010"
    statement: "Phase 8 generates Storyboard JSON and video media gate outputs in dry-run mode while blocking rendering, media writes, and asset downloads."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_08.md", "arxiv-daily-push/src/arxiv_daily_push/video.py", "arxiv-daily-push/tests/test_video.py"]
    status: "active"
  - assumption_id: "ASM-ADP-011"
    statement: "Phase 9 runs a local daily dry-run pipeline across evidence, lesson, narration, storyboard, publication, RunRecord, and email preview without scheduler, Release upload, or real SMTP send."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_09.md", "arxiv-daily-push/src/arxiv_daily_push/pipeline.py", "arxiv-daily-push/tests/test_pipeline.py"]
    status: "active"
  - assumption_id: "ASM-ADP-012"
    statement: "Phase 10 builds a runner/release/email dry-run handoff from a completed RunRecord while keeping scheduler, GitHub Actions runner, Release upload, unattended execution, and real SMTP send disabled."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_10.md", "arxiv-daily-push/src/arxiv_daily_push/handoff.py", "arxiv-daily-push/tests/test_handoff.py"]
    status: "active"
  - assumption_id: "ASM-ADP-013"
    statement: "Phase 11 generates a truthful acceptance and handoff readiness package; production acceptance remains blocked unless real 30-day trial, scheduler, Release, SMTP, and resource evidence is supplied."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11.md", "arxiv-daily-push/src/arxiv_daily_push/acceptance.py", "arxiv-daily-push/tests/test_acceptance.py"]
    status: "active"
  - assumption_id: "ASM-ADP-014"
    statement: "Production acceptance pass requires non-empty evidence references for every true operational evidence flag."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_EVIDENCE_REF_HARDENING.md", "arxiv-daily-push/src/arxiv_daily_push/acceptance.py", "arxiv-daily-push/tests/test_acceptance.py"]
    status: "active"
  - assumption_id: "ASM-ADP-015"
    statement: "Production acceptance pass requires operational evidence generated by the 30-day trial evidence validator, not raw manually supplied booleans."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_TRIAL_EVIDENCE_VALIDATOR.md", "arxiv-daily-push/src/arxiv_daily_push/trial.py", "arxiv-daily-push/tests/test_trial.py"]
    status: "active"
  - assumption_id: "ASM-ADP-016"
    statement: "Scheduled production execution must be blocked unless runtime commands, secret environment keys, disk, memory, Git artifact hygiene, and local cache/staging checks pass without logging secret values."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_PRODUCTION_PREFLIGHT.md", "arxiv-daily-push/src/arxiv_daily_push/production_preflight.py", "arxiv-daily-push/tests/test_production_preflight.py"]
    status: "active"
  - assumption_id: "ASM-ADP-017"
    statement: "Production trial startup is manual-only until prerequisites pass; the GitHub bootstrap workflow must run preflight before trial work, upload preflight evidence, and avoid Release upload or SMTP sending."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_TRIAL_BOOTSTRAP_WORKFLOW.md", "arxiv-daily-push/src/arxiv_daily_push/trial_bootstrap.py", ".github/workflows/arxiv-daily-push-production-trial.yml"]
    status: "active"
  - assumption_id: "ASM-ADP-018"
    statement: "Live arXiv source ingest uses the official Atom API in small windows, filters duplicate source IDs, avoids PDF/bulk download, and fails closed on network, TLS, API, Atom, or SourceItem errors."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_LIVE_ARXIV_INGEST.md", "arxiv-daily-push/src/arxiv_daily_push/source_ingest.py", "arxiv-daily-push/tests/test_source_ingest.py"]
    status: "active"
  - assumption_id: "ASM-ADP-019"
    statement: "SMTP notification transport defaults to dry-run, requires explicit allow-send for real mail, uses only external environment keys for secrets, requires TLS, and never logs SMTP secret values or email body text."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_SMTP_DELIVERY.md", "arxiv-daily-push/src/arxiv_daily_push/smtp_delivery.py", "arxiv-daily-push/tests/test_notifications.py"]
    status: "active"
  - assumption_id: "ASM-ADP-020"
    statement: "GitHub Release transport defaults to dry-run, requires explicit allow-upload for real Release creation, uses ADP_RELEASE_TARGET or --target, avoids clobber upload, and never logs Release notes, secrets, gh stdout, or gh stderr."
    fact_level: "EXTRACTED"
    evidence_refs: ["arxiv-daily-push/docs/phase_records/PHASE_11_RELEASE_DELIVERY.md", "arxiv-daily-push/src/arxiv_daily_push/release_delivery.py", "arxiv-daily-push/tests/test_release_delivery.py"]
    status: "active"
