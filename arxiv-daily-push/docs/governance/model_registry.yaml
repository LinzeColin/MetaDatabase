models:
  -
    model_id: "MOD-ADP-001"
    name: "Phase 1 readiness and notification dry-run gate"
    kind: "deterministic rule engine"
    purpose: "Classify local Phase 1 readiness and render non-secret dry-run email notifications."
    owner: "arxiv-daily-push"
    status: "active"
    fact_level: "EXTRACTED"
    model_version: "adp-foundation-v1"
    assumption_ids:
      - "ASM-ADP-001"
      - "ASM-ADP-002"
    formula_ids:
      - "FORM-ADP-001"
      - "FORM-ADP-002"
    parameter_ids:
      - "PARAM-ADP-001"
      - "PARAM-ADP-002"
      - "PARAM-ADP-003"
      - "PARAM-ADP-004"
      - "PARAM-ADP-005"
      - "PARAM-ADP-006"
      - "PARAM-ADP-007"
      - "PARAM-ADP-008"
    inputs:
      - "current PATH"
      - "current disk usage"
      - "notification status"
      - "run_id"
      - "summary"
      - "date"
    outputs:
      - "doctor status"
      - "missing required commands"
      - "missing future runtime commands"
      - "dry-run email subject"
      - "dry-run email body"
    code_refs:
      - "arxiv-daily-push/src/arxiv_daily_push/doctor.py"
      - "arxiv-daily-push/src/arxiv_daily_push/notifications.py"
    config_refs:
      - "arxiv-daily-push/src/arxiv_daily_push/config.py"
      - "arxiv-daily-push/config/examples/notification.example.yaml"
    test_refs:
      - "arxiv-daily-push/tests/test_doctor.py"
      - "arxiv-daily-push/tests/test_notifications.py"
    evidence_refs:
      - "arxiv-daily-push/docs/phase_records/PHASE_01.md"
  -
    model_id: "MOD-ADP-004"
    name: "Generic data contract and RunRecord state gate"
    kind: "deterministic contract/state validator"
