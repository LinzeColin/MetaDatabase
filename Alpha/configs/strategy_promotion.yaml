# 晋级实盘判定 v3 — 四条全绿自动激活（owner 预签授权模式）
# v3(2026-07-17): owner 选乙——黄金叠加为保底线,门槛按其证据下缘 0.6%/月 校准;持续寻优条款生效
# v2(2026-07-17): owner 裁定月均门槛 5% -> 1.8%(校准到略高于顶级基金长期水平)
gate_conditions:
  - id: "PROMO-1"
    name: "回测证据"
    rule: "含费用模型的 >= 3 年回测：月均净收益 >= 0.6% 且最大回撤 <= 15%"
  - id: "PROMO-2"
    name: "行为一致"
    rule: "3 个完整交易日 Paper 的成交率/信号频率/滑点与回测同分布（偏差带内）"
  - id: "PROMO-3"
    name: "速度核验"
    rule: "3 日 Paper 折算月化速度 >= 目标的 60%（小样本容忍带）"
  - id: "PROMO-4"
    name: "工程零违规"
    rule: "敞口/单笔/频控/幂等/对账/状态机全程零违规，可用性 >= 99.5%，通知 p95 <= 5s"
on_all_green: "校验 runtime/LIVE_AUTHORIZATION.json（预签）-> 自动切换 MICRO_LIVE -> 即时邮件通知 owner"
on_any_red: "保持 Paper，零成本进入调参循环，邮件报告未达标项与原因；owner 可随时改门槛或停止"
never: ["自动加资", "跳过任何一条门禁", "用文献数字替代自建回测"]
honesty_note: "0.6%/月 ≈ 年化 7.4%,为保底线资格门槛(黄金叠加样本外 0.662% 的容错下缘)而非收益承诺;搜索循环持续寻找更优结构,经同口径证据+月度评审可替换主力"
