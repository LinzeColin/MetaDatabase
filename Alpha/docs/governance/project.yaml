        unit: "shares/contracts"
        input_domain: ">0"
      -
        name: "side"
        data_type: "string"
        unit: "enum"
        input_domain: "buy or sell"
    constraints:
      - "max_notional must be configured >0."
      - "idempotency key is required."
    missing_policy: "Missing numeric values coerce through intent.get defaults to 0 and reject."
    output_range: "allowed boolean; status rejected or approved_for_owner_review."
