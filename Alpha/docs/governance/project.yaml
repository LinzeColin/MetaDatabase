formulas:
  -
    formula_id: "FORM-001"
    model_id: "MOD-001"
    description: "从 Alpha formula_registry.yaml 抽取的 MOD-001 公式或精确伪代码。"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "For each symbol and lookback in (5,10,20): total_return=end/start-1; drawdown=min(close/running_max-1); oos_return and hit_rate come from positive momentum one-step-forward windows; score=total_return+0.5*oos_return+0.01*hit_rate-abs(drawdown); rank desc by (decision=='promote_to_paper', score)."
    variables:
      -
        name: "close"
        data_type: "float"
        unit: "fixture price"
        input_domain: ">0"
      -
        name: "lookback"
        data_type: "integer"
        unit: "trading rows"
        input_domain: "5,10,20"
      -
        name: "score"
        data_type: "float"
        unit: "dimensionless"
        input_domain: "unbounded"
    constraints:
      - "Skip symbol/lookback when close row count <= lookback."
      - "Ranking uses risk_score decision before score."
    missing_policy: "Missing or insufficient rows are skipped by len(closes) <= lookback."
    output_range: "candidate_count >= 0; score unbounded float rounded to 6 decimals."
    code_refs:
      - "Alpha/backend/app/services/strategy_iteration.py:28"
      - "Alpha/backend/app/services/strategy_iteration.py:82"
    test_refs:
      - "Alpha/tests/test_strategy_iteration.py:4"
    implementation_refs:
      - "Alpha/backend/app/services/strategy_iteration.py::run_strategy_tournament"
      - "Alpha/backend/app/services/strategy_iteration.py::_simple_drawdown"
      - "Alpha/backend/app/services/strategy_iteration.py::_walk_forward_momentum"
      - "Alpha/backend/app/services/risk.py::risk_score"
    semantic_status: "MACHINE_VERIFIED"
    evidence_refs:
      - "EVID-ALPHA-FORMULA-REGISTRY"
  -
    formula_id: "FORM-002"
    model_id: "MOD-002"
    description: "从 Alpha formula_registry.yaml 抽取的 MOD-002 公式或精确伪代码。"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "risk_score=max(100 - 30*I(abs(max_drawdown)>0.10) - 20*I(trade_count<10) - 20*I(turnover>3), 0); decision='promote_to_paper' if score>=70 else 'hold_research'; if score<50 decision='reject'."
    variables:
      -
        name: "max_drawdown"
        data_type: "float"
        unit: "ratio"
        input_domain: "any numeric; absolute value compared to 0.10"
      -
        name: "trade_count"
        data_type: "integer"
        unit: "trades"
        input_domain: ">=0"
      -
        name: "turnover"
        data_type: "float"
        unit: "ratio"
        input_domain: ">=0"
    constraints:
      - "Missing metrics default to 0 in dict lookups."
      - "Score floor is 0."
    missing_policy: "metrics.get defaults missing max_drawdown, trade_count, and turnover to 0."
    output_range: "risk_score >= 0; decision in promote_to_paper, hold_research, reject."
    code_refs:
      - "Alpha/backend/app/services/risk.py:22"
    test_refs:
      - "Alpha/tests/test_strategy_iteration.py:4"
    implementation_refs:
      - "Alpha/backend/app/services/risk.py::risk_score"
    semantic_status: "MACHINE_VERIFIED"
    evidence_refs:
      - "EVID-ALPHA-FORMULA-REGISTRY"
  -
    formula_id: "FORM-003"
    model_id: "MOD-003"
    description: "从 Alpha formula_registry.yaml 抽取的 MOD-003 公式或精确伪代码。"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "Reject in order: kill_switch_active; missing idempotency_key; side not buy/sell; quantity<=0 or price<=0 or notional<=0; max_notional<=0; notional>max_notional. Otherwise allowed=True and status=approved_for_owner_review."
    variables:
