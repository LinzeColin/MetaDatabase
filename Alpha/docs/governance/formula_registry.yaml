      - name: "close"
        data_type: "float"
        unit: "fixture price"
        input_domain: ">0"
      - name: "lookback"
        data_type: "integer"
        unit: "trading rows"
        input_domain: "5,10,20"
      - name: "score"
        data_type: "float"
        unit: "dimensionless"
        input_domain: "unbounded"
    constraints: ["Skip symbol/lookback when close row count <= lookback.", "Ranking uses risk_score decision before score."]
    missing_policy: "Missing or insufficient rows are skipped by len(closes) <= lookback."
    output_range: "candidate_count >= 0; score unbounded float rounded to 6 decimals."
